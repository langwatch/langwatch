apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
type: Opaque
stringData:
  # Virtual key from LangWatch AI Gateway — create one at:
  #   LangWatch UI > Settings > AI Providers > Create Virtual Key
  GATEWAY_API_KEY: "lw_vk_live_<your-virtual-key>"

  # Project API key — create one at:
  #   LangWatch UI > Settings > API Keys > Create API Key
  LANGWATCH_API_KEY: "sk-lw-<your-api-key>"
