apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
type: Opaque
stringData:
  # Service-to-service auth between the control plane and this pod.
  # The control plane sends `Authorization: Bearer <this>` on every
  # /chat request; the manager rejects requests that don't match.
  # MUST also be set as LANGY_INTERNAL_SECRET on the control plane.
  #
  # Generate a fresh secret:
  #   openssl rand -hex 32
  LANGY_INTERNAL_SECRET: "<32-byte-hex-secret>"
