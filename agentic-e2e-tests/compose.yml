# E2E test environment — extends compose.dev.yml with test-specific overrides
#
# Usage from repo root:
#   make test-e2e          # Full lifecycle: infra + migrate + build + test + teardown
#   make test-e2e-up       # Start infrastructure only
#   make test-e2e-down     # Stop infrastructure
#
# Uses isolated DB (testdb), isolated ports, and test-specific env vars.
# See agentic-e2e-tests/README.md for full documentation.

include:
  - path: ../compose.dev.yml

services:
  # Override app: different port, test DB, test env vars
  app:
    ports:
      - "5570:5560"
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      NODE_ENV: development
      DATABASE_URL: postgresql://prisma:prisma@postgres:5432/testdb
      REDIS_URL: redis://redis:6379
      OPENSEARCH_NODE_URL: http://opensearch:9200
      LANGWATCH_NLP_SERVICE: http://langwatch_nlp:5561
      LANGEVALS_ENDPOINT: http://langevals:5562
      NEXTAUTH_SECRET: test-secret-for-e2e
      NEXTAUTH_URL: http://localhost:5570
      SKIP_CLICKHOUSE_MIGRATE: "true"

  # Override postgres: use testdb instead of mydb, expose on host port 5433
  postgres:
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: prisma
      POSTGRES_PASSWORD: prisma
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prisma -d testdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Override redis: expose on host port 6380
  redis:
    ports:
      - "6380:6379"

  # Override opensearch: expose on host port 9201
  opensearch:
    ports:
      - "9201:9200"
      - "9601:9600"
