                - cell "Can equipment purchases be included as eligible costs, or only leases?" [ref=e1268]:
                  - paragraph [ref=e1269]: Can equipment purchases be included as eligible costs, or only leases?
                - cell [ref=e1270]:
                  - generic [ref=e1271]: "Both equipment **purchases** and **leases** are eligible costs for most Dutch innovation subsidies, but they are treated very differently in your budget. The most important rule to remember is: **You can almost never claim the full purchase price of a piece of equipment.** You can only claim the costs that correspond to the duration of the project and the extent to which the equipment is used for the project. Here is the breakdown of how to include both: ### 1. Equipment Purchases (Afschrijving) If you buy a machine, laboratory equipment, or specialized hardware, you must use **depreciation (afschrijving)**. * **The Rule:** You only claim the \"value loss\" of the equipment during the months it is used for the project. * **The Formula:** `(Purchase price - Residual value) / Lifespan in months × Months used for the project`. * **Example:** * You buy a 3D printer for **€10,000**. * The economic lifespan is 5 years (60 months). * The project lasts 12 months. * Eligible cost: `(€10,000 / 60) × 12 = €2,000`. * *Note: You only get the subsidy percentage (e.g., 35%) of that €2,000.* ### 2. Leasing Equipment Leasing is often simpler for a subsidy budget because the monthly costs are clearly defined. * **Operational Lease:** The monthly lease payments during the project period are generally fully eligible. * **Financial Lease:** This is treated like a purchase. You claim the depreciation, but the **interest (rente)** and financing costs are **not eligible**. * **Pass/Fail Tip:** Ensure the lease contract starts *after* you have submitted your subsidy application. --- ### 3. Critical \"Pass/Fail\" Criteria for Equipment #### A. Pro-Rata Use (Utilization Rate) If you buy a machine but only use it for the subsidized innovation project 50% of the time (and use it for regular production the other 50%), you may only claim **50% of the depreciation**. * **Action:** You must keep a logbook or usage record to prove the equipment was used specifically for the project activities. #### B. Second-Hand Equipment You can include second-hand equipment, but only if: 1. You have a declaration from the seller that the equipment was **never** purchased with the help of a previous Dutch or European subsidy. 2. The price does not exceed the market value. #### C. Ineligible Equipment The following are almost always **rejected**: * **Standard Office Equipment:** Laptops, monitors, and standard office furniture are considered \"overhead\" and are covered by the fixed percentage (forfait) mentioned earlier. * **Vehicles:** Standard company cars or trucks are not eligible unless they are a core part of the technical innovation (e.g., a prototype electric drivetrain). --- ### 4. Actionable Feedback for your Financial Plan: 1. **Check the Lifespan:** Most Dutch grants follow the tax office (Belastingdienst) rules for depreciation (usually 5 years for machines/tools). Do not try to \"speed up\" depreciation to 2 years to get more subsidy; the RVO will correct this. 2. **Describe the Necessity:** In your project plan, clearly explain *why* this specific equipment is needed. If the RVO thinks you could have rented it for cheaper or used an existing lab, they may scrap the cost. 3. **The \"Investment State\" (Investeringsstaat):** If your project involves many pieces of equipment, create a separate spreadsheet (Investeringsstaat) that calculates the depreciation for each item and include the total in your budget. **Quick Tip:** If the total depreciation amount is very small (e.g., less than €500), it is often better to leave it out. The administrative burden of tracking the usage of small items often outweighs the small amount of subsidy you receive. **Are you planning to buy new equipment specifically for this project, or use existing machinery?**"
