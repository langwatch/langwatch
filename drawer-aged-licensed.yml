                - cell "I need to write a project plan for an innovation subsidy. What are the key sections reviewers expect?" [ref=e1221]:
                  - paragraph [ref=e1222]: I need to write a project plan for an innovation subsidy. What are the key sections reviewers expect?
                - cell [ref=e1223]:
                  - generic [ref=e1224]: "In the Dutch subsidy landscape (managed by agencies like **RVO**, **NWO**, or regional developers like **InnovationQuarter**), reviewers are looking for a balance between high-risk innovation and high-certainty execution. To pass a technical and economic assessment, your project plan should be structured around these seven core sections. --- ### 1. The Problem and \"State of the Art\" Reviewers first want to know: *Why does this need to exist, and why hasn't it been done before?* * **The Gap:** Clearly define the technical or societal bottleneck you are solving. * **State of the Art:** Describe the current best-available technology on the market. You must prove that your solution goes significantly beyond what is currently available. * **Reviewer’s Tip:** If a reviewer can find a similar product with a quick Google search, your \"innovation\" score will drop. Be specific about the technical limitations of existing solutions. ### 2. The Innovation (Technical Novelty) This is the heart of the proposal. In Dutch subsidies like the **WBSO** or **MIT**, this is where you define your \"Technical Challenges.\" * **The \"How\":** Describe the new principle, architecture, or algorithm. * **TRL Level:** State your current Technology Readiness Level (e.g., TRL 3 - Proof of Concept) and where you aim to be at the end (e.g., TRL 6 - Prototype in relevant environment). * **Technical Risks:** Don't hide the risks. Reviewers expect them. Explain what might fail and how you plan to mitigate those failures. ### 3. Project Plan and Work Packages (WPs) A vague timeline is a red flag. Reviewers look for a structured \"Work Breakdown Structure.\" * **Work Packages:** Divide the project into 3–5 phases (e.g., WP1: Requirements & Design, WP2: Iterative Development, WP3: Validation/Testing). * **Deliverables & Milestones:** Each WP must have a tangible output (a report, a prototype, a test result). * **Go/No-Go Moments:** Identify critical points where you evaluate if the project is still viable. This shows professional project management. ### 4. Market Potential and Commercialization Dutch reviewers (especially for **MIT** or **EIC Accelerator**) are very focused on \"Valorization\"—how this innovation turns into Euros and jobs. * **Target Market:** Don't say \"The global AI market.\" Say \"SMEs in the Dutch manufacturing sector with 50-200 employees.\" * **Business Model:** How will you make money? (SaaS, licensing, hardware sales?) * **Competitive Advantage:** Why will customers choose you over established players? Focus on the \"Unique Selling Point\" (USP). ### 5. Impact (Societal and Economic) In the Netherlands, innovation is often tied to the **Mission-Driven Top Sectors** (Energy Transition, Circular Economy, Health, etc.). * **Societal Contribution:** Does it reduce CO2? Does it lower healthcare costs? Does it save water? Use quantifiable metrics where possible. * **Economic Impact:** Estimate the increase in turnover and the number of Full-Time Equivalents (FTEs) you will hire in the 3–5 years following the project. ### 6. The Team and Partnership Reviewers invest in people as much as ideas. * **Capability:** Prove the team has the technical expertise to build the product and the commercial expertise to sell it. * **Cooperation:** If it’s a collaborative project (e.g., MIT R&D Collaboration), explain why these specific partners need each other. What is the \"synergy\"? ### 7. Budget and Finance The budget must be \"sober and realistic\" (*sober en doelmatig*). * **Eligible Costs:** Ensure you only include costs allowed by the specific subsidy (usually internal hours, materials, and some third-party outsourcing). * **Additionality (Incentive Effect):** You must explain why you need the subsidy. A common phrase is: *\"Without this subsidy, the project would be too high-risk to fund internally, or the time-to-market would be delayed by X years.\"* * **Funding Gap:** Show that you have the remaining 50%–65% of the funding ready (through own funds, investors, or loans). --- ### The \"Reviewer’s Lens\" – 3 Final Checks: 1. **Consistency:** Does the budget match the Work Packages? If WP2 requires heavy coding, but your budget shows no software engineer hours, the plan will be rejected. 2. **Specificity:** Avoid \"marketing speak.\" Use data, citations, and technical specifications. 3. **The \"So What?\" Factor:** After reading the plan, the reviewer should clearly understand why the Dutch government should spend taxpayer money on *your* company instead of someone else's. **Which specific subsidy are you aiming for?** (e.g., WBSO, MIT, DEI+, or a regional grant?) I can give you more tailored advice for that specific framework."
