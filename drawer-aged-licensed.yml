                - cell "What happens if our VOG expires between submission and the grant decision?" [ref=e892]:
                  - paragraph [ref=e893]: What happens if our VOG expires between submission and the grant decision?
                - cell [ref=e894]:
                  - generic [ref=e895]: "In the vast majority of Dutch subsidy schemes, the **date of submission** is the only date that matters for the validity of your VOG. If your VOG was valid (e.g., less than 3 or 6 months old) on the day you officially submitted your application, **it does not matter if it \"expires\" while you are waiting for the decision.** Here is a detailed breakdown of how this works during the review process: ### 1. The \"Peildatum\" (Reference Date) In Dutch administrative law, the \"peildatum\" is the moment the application is received. As a reviewer, I check: * **Step 1:** What was the date of submission? (e.g., October 1st). * **Step 2:** What was the issue date on the VOG? (e.g., August 1st). * **Result:** The VOG was 2 months old at the time of submission. **This is a PASS**, even if the final decision on your grant isn't made until February of the following year. ### 2. When would you need a new one? There are only a few specific scenarios where an \"expired\" VOG during the decision phase would cause an issue: * **Significant Changes in Leadership:** If a new director or board member joins your organization *after* you submitted the application but *before* the decision is made, you must notify the subsidy provider. We will likely request a **new VOG** for that specific person. * **The \"Hersteltermijn\" (Correction Period):** If your initial application was incomplete and we asked you to resubmit parts of it, the \"reference date\" might shift to the date of your resubmission. If your VOG was borderline old, this delay could push it past the 3- or 6-month limit. * **Integrity Doubts (Wet BIBOB):** If the government receives a signal of potential criminal activity during the decision period, they have the right to request a fresh VOG or conduct a more intensive \"BIBOB\" integrity screening, regardless of the age of your current certificate. * **Multi-year Subsidies:** Some very large, multi-year grants require you to submit a fresh VOG every 1 or 2 years as part of the \"progress reporting\" (*voortgangsrapportage*). This will be explicitly stated in your grant award letter (*verleningsbeschikking*). ### 3. Actionable Feedback for your situation * **Don't apply for a new one yet:** If you have already submitted your application and the VOG was valid at that time, you do not need to do anything. Save your money and wait for the decision. * **Keep the original:** Ensure you keep the original VOG (paper or digital file with the official signature) in your administration. Sometimes, during the final audit (*vaststelling*) after the project is finished, an auditor may ask to see the original document that was valid at the start. * **Check for \"Continuous Screening\":** If your subsidy is in the **childcare or education sector**, you might be subject to *Continue Screening*. In this case, you don't need a new certificate; the system automatically alerts the government if a new relevant criminal record entry appears. **Summary:** As long as the VOG met the \"age requirement\" on the day you clicked **Submit**, you have passed that criteria. The clock effectively stops once the application is in our hands."
