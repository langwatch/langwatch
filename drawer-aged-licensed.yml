                - cell "Does the screening profile on the VOG need to match the specific subsidy program?" [ref=e939]:
                  - paragraph [ref=e940]: Does the screening profile on the VOG need to match the specific subsidy program?
                - cell [ref=e941]:
                  - generic [ref=e942]: "**Yes, the screening profile must match the risks and requirements of the specific subsidy program.** A VOG is not a \"generic\" clearance; it is a targeted check. If the screening profile on your VOG does not align with the nature of the subsidy, your application will likely be rejected or flagged for a correction. Here is why the profile matters and how to ensure yours passes the review. --- ### 1. Why the Profile Must Match Justis (the issuing body) looks at different types of criminal offenses depending on the profile selected. * **Example A:** If you apply for a **Financial Subsidy** (e.g., for business innovation), the reviewer needs to know you haven't committed fraud or money laundering. They will look for **Profile 25 (Money)**. * **Example B:** If you apply for a **Social/Youth Subsidy**, the reviewer needs to know you have no history of violence or crimes against minors. They will look for **Profile 80 (Vulnerable Persons)**. If you submit a VOG with a \"Taxi Driver\" profile for a \"Healthcare Innovation\" subsidy, it is considered **invalid**, because Justis did not check for the specific risks relevant to healthcare. --- ### 2. Pass/Fail Criteria for Screening Profiles | Result | Scenario | | :--- | :--- | | **PASS** | The profile number/description matches exactly what is requested in the subsidy guidelines (e.g., \"Profile 25\"). | | **PASS** | You used the \"General Profile\" (*Algemeen screeningsprofiel*) and checked all relevant sub-boxes requested by the subsidy provider. | | **FAIL** | The profile is for a completely different industry (e.g., a VOG for a liquor license used for a tech grant). | | **FAIL** | The profile is too narrow (e.g., it only checks for \"driving behavior\" when the subsidy involves handling large sums of money). | --- ### 3. How to Identify the Correct Profile To ensure your VOG passes, check these three sources in order: 1. **The Subsidy Desk/Portal:** Most Dutch government portals (like RVO or DUS-I) provide a pre-filled **\"Employer's Declaration\"** (*Werkgeversverklaring*) or a specific link to Justis. **Use this link.** It automatically selects the correct profile. 2. **The Subsidy Regulation (*Subsidieregeling*):** Look for the \"Integrity\" or \"VOG\" section in the formal policy document. It will often list a profile number (e.g., *Screeningsprofiel 25*). 3. **The \"General Profile\" Rule:** If no specific profile is mentioned, most subsidies require a check on **\"Information\" (Profile 11, 12, 13)** and **\"Money\" (Profile 25)**. --- ### 4. Actionable Feedback * **Check your current VOG:** Look at the section titled *\"Omschrijving van de werkzaamheden\"* (Description of activities) or *\"Screeningsprofiel\"*. Does it mention the same activities you will be doing for the subsidy? * **Don't \"Recycle\" old VOGs:** Even if your VOG is recent (e.g., 2 months old), if it was issued for a different job or a different purpose (like getting a mortgage or a different grant), it may have the wrong profile. * **When in Doubt, Ask:** If the subsidy guidelines are unclear, contact the subsidy officer **before** applying for the VOG. Justis charges a fee for every application, and they will not refund you if you choose the wrong profile. **Summary:** If your subsidy involves public money, ensure **Profile 25 (Geld/Money)** is at least one of the checked boxes. If it involves people, ensure **Profile 80** is included. Using the wrong profile is a \"Hard Fail\" in the review process."
