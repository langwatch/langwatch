                - cell "Are there common mistakes applicants make that lead to automatic rejection?" [ref=e704]:
                  - paragraph [ref=e705]: Are there common mistakes applicants make that lead to automatic rejection?
                - cell [ref=e706]:
                  - generic [ref=e707]: "Yes, there are several \"fatal errors\" that lead to immediate rejection, often before a human even reads your project ideas. In the Dutch subsidy world, these are known as **afwijzingsgronden**. As a small foundation, pay special attention to these five categories: ### 1. The \"UBO\" and \"KvK\" Mismatch Since 2022, Dutch regulators have become extremely strict about the **UBO-register** (Ultimate Beneficial Owners). * **The Mistake:** Your foundation hasn't registered its board members in the UBO register, or the names in the register don't match the names on your application. * **The Result:** Automatic rejection on administrative grounds. * **How to avoid:** Check your *Kamer van Koophandel* (KvK) extract today. Ensure all board members are correctly listed and that your UBO registration is finalized. ### 2. The \"Pre-mature Start\" (Het verbod op een voortijdige start) This is the most common \"heartbreak\" rejection. * **The Mistake:** You sign a contract with a supplier, pay a deposit, or officially launch the project *before* you hit the \"submit\" button (and sometimes before you get the decision). * **The Result:** If the reviewer sees an invoice or a commitment dated before the application date, the entire project is disqualified because the subsidy is no longer \"necessary\" to make the project happen. * **How to avoid:** Wait. Do not commit to any financial obligations until the application is at least submitted. If you must start, ask for \"toestemming voor vervroegde start\" (permission for an early start), but know this is rarely granted for first-time applicants. ### 3. The \"Exploitatie\" Trap Dutch subsidies are almost always for **projects**, not for **organizations**. * **The Mistake:** Your budget includes \"General Rent,\" \"Electricity,\" or \"Salary of the Director\" without linking them directly to project hours. * **The Result:** Rejection. Reviewers call this \"financieren van de exploitatie\" (funding the operations). * **How to avoid:** Every euro in your budget must be a **project cost**. Instead of \"Rent,\" use \"Location rental for 4 workshops.\" Instead of \"Salary,\" use \"Project management for [X] hours at [Y] rate.\" ### 4. The BTW (VAT) Error * **The Mistake:** You include VAT in your budget, but your foundation is \"BTW-plichtig\" (VAT-registered) and can reclaim it from the tax authorities. Or, conversely, you exclude VAT but you *cannot* reclaim it, leaving a 21% hole in your budget. * **The Result:** If you include VAT when you can reclaim it, it’s seen as \"unlawful enrichment\" or a budget error, which can lead to a lower score or rejection. * **How to avoid:** Determine your VAT status. If you cannot reclaim VAT, you must explicitly state in your budget: **\"Bedragen zijn inclusief niet-verrekenbare BTW.\"** This tells the reviewer you’ve thought about it. ### 5. Authority to Sign (*Tekenbevoegdheid*) * **The Mistake:** The application is signed by a volunteer or a project manager who is not listed as \"tekenbevoegd\" (authorized to sign) in the KvK. * **The Result:** The application is legally invalid. * **How to avoid:** Look at your KvK extract under \"Bestuurders.\" It will say if board members are *gezamenlijk bevoegd* (must sign together) or *zelfstandig bevoegd* (can sign alone). If it says \"jointly authorized,\" you **must** have both signatures on the form. ### 6. Geographic or Target Group \"Scope Creep\" * **The Mistake:** You apply for a provincial subsidy (e.g., Province of Utrecht) but your project benefits people in Amsterdam (Province of North Holland). Or you apply for a youth fund but your participants are 30+ years old. * **The Result:** Immediate \"out of scope\" rejection. * **How to avoid:** Read the *doelgroep* (target group) and *reikwijdte* (geographic scope) sections of the subsidy rules. If you are on the border, explain exactly how the money stays within the required zone. ### 7. Missing \"Co-financiering\" * **The Mistake:** You ask for 100% of the project cost. * **The Result:** Most Dutch funds (especially private ones like VSBfonds) require you to find 25% to 50% of the money elsewhere. If they see \"€0\" in the *eigen bijdrage* (own contribution) or *andere fondsen* (other funds) column, they will reject it as \"insufficiently supported.\" * **How to avoid:** Even if you don't have cash, you can often include \"in-kind\" contributions (e.g., volunteer hours valued at a set rate, or free use of a venue) as part of your side of the deal. ### Summary Tip: The \"Two-Eye\" Check Before submitting, have someone who **did not write the plan** look at the checklist provided in the subsidy manual. If they can't find one of the mandatory documents or if the signature looks wrong, the reviewer won't find it either. **Do you have your KvK extract handy? I can explain how to read the \"tekenbevoegdheid\" section if it's confusing.**"
