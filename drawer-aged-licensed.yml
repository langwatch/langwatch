                  - paragraph [ref=e799]: What are the pass/fail criteria used to assess subsidy applications?
                - cell [ref=e800]:
                  - generic [ref=e801]: "In the Dutch subsidy landscape, reviewers generally use a two-tier system: **Hard Knock-out Criteria** (Administrative) and **Qualitative Scoring Criteria** (Substantive). If you fail a single knock-out criterion, your application is rejected immediately without the reviewers even reading your project plan. Here is the breakdown of what constitutes a \"pass\" or \"fail.\" --- ### 1. The \"Knock-out\" Criteria (The Hard Pass/Fail) These are binary. You either meet them or you don't. * **Timeliness:** If the deadline is 17:00:00 and you submit at 17:00:01, it is an automatic fail. Dutch systems are automated and rarely allow for exceptions. * **Legal Form:** Does the subsidy require a *Stichting* (Foundation), a *BV*, or a *Vereniging*? If the \"subsidieregeling\" says \"SMEs only\" and you are a foundation, you fail. * **Completeness:** Did you include the mandatory attachments (Budget, KvK extract, Project Plan)? * *Note:* Some agencies give a \"hersteltermijn\" (recovery period) of 1-2 weeks to fix minor missing documents, but don't count on it. * **Financial Health:** For larger grants, they check your \"continuïteit.\" If your foundation has negative equity or is at risk of bankruptcy, you fail. * **The \"No-Start\" Rule:** In almost all Dutch subsidies, you cannot have started the project before the application is submitted. If your budget includes costs incurred last month, those costs (or the whole project) will be rejected. --- ### 2. Qualitative Criteria (The Scoring Pass/Fail) Once you pass the administrative check, a committee grades your proposal on a scale (e.g., 1 to 5 or 1 to 10). You usually need to score at least a \"voldoende\" (sufficient) on **every** category to pass. #### A. Alignment with Policy (*Aansluiting bij de doelstelling*) * **Pass:** Your project directly addresses the specific problem the government wants to solve (e.g., \"reducing loneliness among elderly in Rotterdam\"). * **Fail:** Your project is \"nice to have\" but only tangentially related to the fund's specific goals. #### B. Feasibility (*Haalbaarheid*) Reviewers are risk-averse. They look at: * **Team:** Does your small foundation have the expertise? If you are building an app but have no developers on the team or as partners, you fail on feasibility. * **Planning:** Is the timeline realistic, or are you trying to do three years of work in six months? * **Methodology:** Is it clear *how* you will achieve your goals? #### C. Efficiency & Budget (*Doelmatigheid*) * **Pass:** The cost per \"unit of impact\" is reasonable. (e.g., spending €10,000 to help 100 people). * **Fail:** The budget is \"top-heavy\" with overhead, project management, or high-end equipment that isn't strictly necessary. * **The \"Market Conformity\" Check:** If you budget €150/hour for a junior task, they will flag this as a fail. #### D. Innovation or Added Value (*Vernieuwing/Toegevoegde waarde*) * **Pass:** You are doing something that isn't already being done by five other foundations in your street. * **Fail:** You are asking for \"Exploitatie\" (operational) funding. Dutch subsidies almost never pay for \"keeping the lights on\"; they pay for **new projects or improvements.** --- ### 3. The \"Ranking\" Trap (Pass but no Money) This is the most frustrating part for small foundations. You can \"pass\" all criteria with a good score, but still receive a rejection letter. * **Tender System:** Many Dutch subsidies work on a \"Tender\" basis. They rank all \"passing\" applications from highest score to lowest. If the budget is €1 million and the top 10 projects take all that money, the 11th project gets nothing, even if it was a \"pass.\" * **First-come, First-served:** Some subsidies (*op volgorde van binnenkomst*) pay out until the pot is empty. In these cases, \"passing\" is only half the battle; speed is the other half. --- ### Summary Checklist for a \"Pass\": 1. **Does the goal of our Foundation (in our *Statuten*) match the subsidy?** 2. **Is every euro in the budget explained by a task in the project plan?** 3. **Do we have \"Co-financiering\"?** (Reviewers usually want to see that you are putting in your own time, money, or other grants. A request for 100% coverage is often a \"fail\" for small foundations). 4. **Is the \"Impact\" measurable?** (Instead of \"we want to help people,\" say \"we will provide 20 workshops to 200 participants\"). **Advisor's Tip:** Look for the \"Beoordelingsprotocol\" or \"Puntenverdeling\" in the subsidy documents. It literally tells you how many points you get for each section. Write your proposal to \"hunt\" those points."
