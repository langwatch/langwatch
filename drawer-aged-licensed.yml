                - cell "I'm preparing a financial plan for a Dutch innovation subsidy. What cost categories should I include?" [ref=e1409]:
                  - paragraph [ref=e1410]: I'm preparing a financial plan for a Dutch innovation subsidy. What cost categories should I include?
                - cell [ref=e1411]:
                  - generic [ref=e1412]: "When preparing a financial plan (**projectbegroting**) for a Dutch innovation subsidy (such as MIT, WBSO, or DEI+), clarity and eligibility are key. Dutch grant providers like **RVO** (Netherlands Enterprise Agency) look for a direct link between the activities in your project plan and the costs in your budget. Here are the standard cost categories you should include, along with the \"pass/fail\" criteria for each: ### 1. Internal Labor Costs (Loonkosten) This is usually the largest post. It covers the hours your own employees spend directly on R&D or innovation activities. * **What to include:** Gross salary costs of the staff involved. * **Pass/Fail Criteria:** * **Hourly Rate:** You must use either a fixed hourly rate (often €60,- per hour for some grants) or a calculated rate based on the \"standard calculation method\" (loonkosten + opslag). * **Time Registration:** You must be able to prove these hours later with a time-tracking system. * **Role:** The person must be on your payroll. Owners (DGA) are also included but often at a set mandatory rate. ### 2. Materials and Consumables (Materiaalkosten) These are materials used specifically for the project that are consumed or lose their value during the project. * **What to include:** Raw materials, components for a prototype, chemicals for testing, or specific software licenses required only for the project duration. * **Pass/Fail Criteria:** * **Exclusivity:** These cannot be general office supplies (like paper or standard laptops). They must be unique to the innovation. * **No Stock:** You cannot claim costs for materials you already had in stock before the project started. ### 3. Costs for Third Parties (Kosten derden / Uitbesteding) Innovation often requires specialized knowledge from labs, consultants, or engineering firms. * **What to include:** Invoices from external experts or subcontractors. * **Pass/Fail Criteria:** * **Arms-length principle:** You cannot hire a subsidiary or a company owned by your brother at inflated prices. It must be a market-conform rate. * **Quotes:** For larger amounts, you often need to provide multiple quotes to prove you chose the best price/quality ratio. ### 4. Depreciation of Equipment (Afschrijving) If you buy a large machine or expensive hardware for the project, you usually cannot claim the full purchase price. * **What to include:** The part of the equipment's value that is \"used up\" during the project period. * **The Formula:** (Purchase Price - Residual Value) / Lifespan in months × Number of months used for the project. * **Pass/Fail Criteria:** If the machine is also used for other commercial work, you must only claim the percentage of time it is used for the subsidized project. ### 5. Overheads (Indirecte kosten) These are general costs like rent, electricity, and administrative support. * **What to include:** Most Dutch subsidies use a **fixed percentage (forfait)**—usually 15% or 50% of the labor costs—to cover overhead. * **Actionable Tip:** Check the specific subsidy manual. If they use a fixed percentage, **do not** list your rent or phone bills separately, as they are already covered by this percentage. --- ### Critical \"Pass/Fail\" Checklist for your Financial Plan: 1. **Exclude VAT (BTW):** Unless your organization is legally exempt from VAT (which is rare for innovation companies), all amounts in your budget must be **excluding VAT**. 2. **The \"Incentive Effect\":** Costs incurred *before* the application is submitted are almost always ineligible. Do not include invoices dated before your submission date. 3. **Matching (Financiering):** A subsidy usually covers 25% to 50% of the costs. Your financial plan must also show how you will pay for the *other* 50% (e.g., through own funds, a bank loan, or an investor). If this \"matching\" is not secured, the application will fail. 4. **Consistency:** Ensure the hours listed in your Project Plan match the hours in your Financial Plan exactly. ### Actionable Feedback: Before you submit, create a spreadsheet where every cost is linked to a specific **Work Package (WP)** from your project plan. If you have a cost category labeled \"Miscellaneous\" or \"Unforeseen,\" remove it. Dutch grant providers view \"unforeseen\" costs as a sign of poor planning and will often reject those specific line items."
