                  - paragraph [ref=e987]: How long is a VOG certificate valid? Ours was issued 18 months ago.
                - cell [ref=e988]:
                  - generic [ref=e989]: "For the purpose of a Dutch government subsidy application, a VOG issued **18 months ago will almost certainly be rejected.** While a VOG certificate does not have an official \"expiration date\" printed on the document itself, its validity is determined by the organization requesting it (in this case, the subsidy provider). Here is the breakdown of why 18 months is problematic and what the standard requirements are: ### 1. The \"Moment of Application\" Rule Most Dutch subsidy schemes require that a VOG be **no older than 3 to 6 months** at the time you submit your application. * **Why?** A VOG is a \"snapshot\" in time. It only proves you had a clean record up until the date it was issued. If your VOG is 18 months old, the government has no way of knowing if any relevant criminal offenses occurred during the last year and a half. ### 2. Pass/Fail Assessment for your 18-month-old VOG: * **Status:** **FAIL** * **Reason:** The document is outdated. It no longer provides sufficient \"current\" assurance of integrity required to handle public funds. * **Exception:** Some continuous screening processes exist (e.g., in childcare), but for a standard subsidy application, a fresh VOG is almost always mandatory. ### 3. Actionable Feedback: What you should do now To avoid your subsidy being delayed or denied, you should take the following steps immediately: 1. **Check the Specific Subsidy Regulations:** Look for the section titled *\"Indieningsvereisten\"* (Submission Requirements) or *\"Integriteitstoets\"* in your subsidy guide. It will state exactly how many months old the VOG is allowed to be (usually 3 or 6). 2. **Request a New VOG Immediately:** * Since a VOG can take **2 to 4 weeks** to be processed by Justis, you should start the application now. * If you are applying as a **legal entity (VOG RP)**, remember that the process is slightly more complex than for an individual. 3. **Use the Correct Screening Profile:** When you apply for the new one, ensure you select the profile requested by the subsidy provider (e.g., Profile 25 for financial positions or Profile 80/85 for general integrity). 4. **Do Not Submit the Old One:** Submitting an 18-month-old VOG will result in a \"request for information\" (*hersteltermijn*), which will pause your application and delay your funding. It is better to submit the application with a \"proof of request\" for a new VOG if the deadline is urgent (though check if the specific scheme allows this). **Summary Recommendation:** You must apply for a **new VOG**. The current one is too old to be accepted for a new financial grant."
