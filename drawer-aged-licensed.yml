                - cell "Are there common mistakes applicants make that lead to automatic rejection?" [ref=e1456]:
                  - paragraph [ref=e1457]: Are there common mistakes applicants make that lead to automatic rejection?
                - cell [ref=e1458]:
                  - generic [ref=e1459]: "Yes, there are several \"fatal errors\" that lead to immediate rejection, often before a human expert even evaluates the quality of your idea. In the Dutch system, these are known as **\"Niet-ontvankelijkheid\"** (inadmissibility) factors. As a small foundation, pay close attention to these six common pitfalls: ### 1. The \"Pre-Start\" Violation (*Voortijdig begin*) This is the most common reason for rejection. Most Dutch subsidies (especially RVO and provincial grants) operate on the principle that the subsidy must be an \"incentive.\" * **The Mistake:** Signing a contract with a supplier, hiring a freelancer, or paying an invoice *before* the application is submitted (or in some cases, before it is approved). * **The Consequence:** If the reviewer sees a quote dated before the application date, or if your project timeline shows the \"start\" was last month, the application is rejected. * **Pro-Tip:** You can prepare, research, and get quotes, but **do not sign anything** until the application is officially \"in.\" ### 2. The Statutory Mismatch (*Statutaire doelstelling*) Reviewers will pull your foundation’s articles of association (*statuten*) from the KvK. * **The Mistake:** Your foundation’s legal \"objective\" is too narrow or unrelated to the subsidy. For example, if your *statuten* say you support \"neighborhood art in Amsterdam\" but you apply for a subsidy for \"youth sports in Rotterdam,\" you will be rejected. * **The Consequence:** Automatic fail on legal grounds. * **Pro-Tip:** Check your KvK registration. If your objective is too narrow, you may need to visit a notary to broaden your *statuten* before applying. ### 3. The \"Double Funding\" Trap (*Stapeling*) Dutch funders are strict about \"Over-subsidization.\" * **The Mistake:** Applying to two different government bodies (e.g., the State and the Province) for the **exact same costs** without disclosing it. * **The Consequence:** This is seen as a breach of integrity. You can apply to multiple funds for the *same project*, but your budget must clearly show which funder covers which specific cost line. * **Pro-Tip:** Always include a \"Dekkingsplan\" (coverage plan) that shows: *Fund A covers the location, Fund B covers the materials, and our own reserves cover the marketing.* ### 4. Incorrect VAT (BTW) Calculation This is a technicality that kills many first-time applications. * **The Mistake:** Including VAT in your budget as a cost when your foundation is actually eligible to reclaim that VAT from the Tax Authorities (*Belastingdienst*). * **The Consequence:** The reviewer sees this as \"inflating the budget.\" Conversely, if you *cannot* reclaim VAT but you forget to include it in the budget, your project will be financially unfeasible, leading to a rejection based on \"risky financial planning.\" * **Pro-Tip:** Determine your VAT status first. If you are not a \"BTW-ondernemer,\" you include VAT in your costs. If you are, you exclude it. State this explicitly in your budget notes. ### 5. Lack of \"Eigen Bijdrage\" (Co-financing) Dutch subsidies almost never cover 100% of a project. * **The Mistake:** Submitting a budget where the \"Requested Subsidy Amount\" equals the \"Total Project Costs.\" * **The Consequence:** Immediate rejection. Most grants require a 25% to 50% \"own contribution.\" * **Pro-Tip:** Your \"Eigen bijdrage\" doesn't always have to be cash. It can be: * Your foundation's own savings. * Donations or crowdfunding. * **In-kind:** The hours your staff/volunteers put in (if the specific grant rules allow \"waardering van vrijwilligersuren\"). ### 6. The Wrong Signatory (*Tekenbevoegdheid*) * **The Mistake:** The application is signed by a project manager or a volunteer who is not listed as \"authorized\" in the KvK. * **The Consequence:** The document is legally invalid. * **Pro-Tip:** Look at your KvK extract under \"Bevoegdheid.\" It will say if a board member is \"Alleen/Zelfstandig bevoegd\" (can sign alone) or \"Gezamenlijk bevoegd\" (needs a second board member's signature). **If it says \"Gezamenlijk,\" you must have two signatures on the application.** --- ### Summary Checklist to Avoid Rejection: 1. [ ] **eHerkenning:** Is it active and at the right level (usually 2+ or 3)? 2. [ ] **The Date:** Is the project start date at least 3 months in the future? 3. [ ] **The Statuten:** Does our KvK \"doelomschrijving\" match the grant's goal? 4. [ ] **The Budget:** Is it balanced? (Total Costs = Total Income). 5. [ ] **The Signature:** Is the person signing actually authorized according to the KvK? **Would you like me to explain how to properly document \"Volunteer Hours\" so they count as co-financing? This is a great way for small foundations to meet the \"Eigen Bijdrage\" requirement.**"
