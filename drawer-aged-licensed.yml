                - cell "What level of detail is expected for the feasibility section?" [ref=e1080]:
                  - paragraph [ref=e1081]: What level of detail is expected for the feasibility section?
                - cell [ref=e1082]:
                  - generic [ref=e1083]: "The Feasibility section is where many applications fail. Reviewers often see \"Feasibility\" used as a marketing pitch, but they expect a **critical risk assessment.** They want to see that you have already tried to \"break\" your idea and that it survived. For a team with 3 PhDs and 2 experts, the bar for detail is high. You cannot just say it is feasible; you must **prove it with data.** Here is the level of detail expected across the three pillars of feasibility: --- ### 1. Technical Feasibility (The \"Proof of Principle\") Reviewers expect you to demonstrate that the laws of physics, chemistry, or logic are on your side. * **Preliminary Results:** Include data from your \"Lab Scale\" or \"Alpha\" tests. Use charts, tables, or photos of a crude prototype. * **The \"Showstoppers\":** Identify the 2–3 most difficult technical hurdles. For each, explain: * The specific technical bottleneck (e.g., \"Signal-to-noise ratio at high speeds\"). * Why your team’s expertise (those 3 PhDs) is capable of solving it. * **TRL Evidence:** If you claim you are at TRL 4, you must describe the \"relevant environment\" in which you tested your component. * **The \"Freedom to Operate\" (FTO):** You must state that you have searched patent databases (like *Espacenet*) and found no \"blocking\" patents. This is a major check for RVO reviewers. ### 2. Economic & Commercial Feasibility Reviewers need to see that there is a \"Market Pull\" and a viable path to profit. * **Cost-Benefit Analysis:** Don't just list the price. Show the **ROI for the end-user.** * *Example:* \"Our solution costs €50k, but it reduces energy consumption by 20%, leading to a payback period of 1.4 years for a typical Dutch greenhouse.\" * **Competitor Deep-Dive:** Do not say \"We have no competitors.\" Reviewers hate this. Instead, create a comparison matrix: *Your Company vs. Competitor A vs. Competitor B* based on 4–5 technical and price specs. * **Letter of Intent (LoI):** The ultimate proof of commercial feasibility is a (non-binding) Letter of Intent from a potential customer. If you have 2 industry experts, they should be leveraging their network to get these. ### 3. Operational & Legal Feasibility This is often overlooked but critical for \"Sober and Realistic\" scoring. * **Regulatory Compliance:** Does your product need CE marking? ISO certification? GDPR compliance? List the specific directives (e.g., \"Medical Device Regulation 2017/745\") and your timeline for achieving them. * **Supply Chain:** Can you actually get the components? With current global shortages, reviewers look for \"Supply Chain Risk.\" Mention if you have identified secondary suppliers for critical parts. * **IP Strategy:** Since you have PhDs, reviewers expect a sophisticated Intellectual Property strategy. Will you file patents, or will you protect it as a \"Trade Secret\" (Know-how)? Explain *why*. --- ### How to structure this section (The \"Red-Amber-Green\" Method) A highly effective way to present feasibility is to use a **Risk Matrix**: 1. **Risk Identification:** \"The algorithm may require more processing power than edge devices provide.\" 2. **Impact:** High (Technical/Commercial). 3. **Feasibility Evidence:** \"Our preliminary tests on [Hardware X] show we are currently at 80% efficiency; WP3 is dedicated to the remaining 20% optimization.\" 4. **Mitigation Plan:** \"If efficiency targets aren't met, we have a fallback partnership with [Cloud Provider] for hybrid processing.\" ### The \"PhD Trap\" to Avoid: Because you have 3 PhDs, there is a risk the feasibility section will read like a **scientific paper.** * **The Reviewer’s Perspective:** They aren't grading a thesis; they are deciding whether to \"invest\" taxpayer money. * **The Fix:** Every technical \"fact\" must be linked to a business \"consequence.\" * *Bad:* \"The laser has a pulse width of 10 femtoseconds.\" * *Good:* \"The 10-femtosecond pulse width allows for precision cutting without heat damage, which reduces the scrap rate for customers by 15%.\" ### Summary Checklist for Detail: * [ ] **Quantitative Data:** Are there numbers, percentages, or Euro amounts? * [ ] **Visuals:** Is there at least one diagram or chart? * [ ] **FTO Statement:** Have you confirmed you aren't infringing on others' patents? * [ ] **Regulatory Path:** Is the route to certification clear? * [ ] **LOIs:** Do you have at least one external party interested in testing/buying? **Pro Tip:** If you are applying for the **WBSO**, focus 90% on the *Technical* Feasibility and the \"Technical Bottlenecks.\" If you are applying for the **MIT R&D**, the split should be 50% Technical / 50% Economic."
