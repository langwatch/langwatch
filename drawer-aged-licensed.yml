                - cell "Our team has 3 PhDs and 2 industry experts. How should I present team qualifications?" [ref=e1127]:
                  - paragraph [ref=e1128]: Our team has 3 PhDs and 2 industry experts. How should I present team qualifications?
                - cell [ref=e1129]:
                  - generic [ref=e1130]: "With 3 PhDs and 2 industry experts, you have a high-caliber team. However, a common mistake in subsidy applications is focusing too much on **academic prestige** and not enough on **execution and valorization** (commercialization). Reviewers aren't just asking \"Are they smart?\" They are asking: **\"Can this specific group of people turn a complex idea into a profitable, compliant product?\"** Here is how to structure the \"Team\" section to maximize your score: ### 1. The \"Balanced Scorecard\" Approach Divide your team presentation into two distinct pillars: **Technical Excellence** and **Commercial/Operational Traction.** * **The 3 PhDs (The \"R&D Engine\"):** * **Don't** just list their thesis titles. * **Do** highlight their \"Applied\" experience. Mention specific technologies they’ve built, patents they hold, or previous R&D projects they’ve led. * **Key Phrase:** *\"Dr. X brings 10 years of experience in [Specific Tech], ensuring the technical feasibility and risk mitigation of Work Package 2.\"* * **The 2 Industry Experts (The \"Valorization Engine\"):** * **Focus on Track Record:** Have they brought a product to market before? Do they have a network of potential customers or suppliers? * **Focus on Scaling:** Mention their experience in manufacturing, supply chain, or international sales. * **Key Phrase:** *\"Mr./Ms. Y has a proven track record in [Sector], having previously scaled a startup to €XM turnover, which is critical for the market entry phase of this project.\"* ### 2. Use a \"Roles and Responsibilities\" Table Reviewers love tables because they are easy to scan. Do not just give bios; assign specific project roles. | Name | Project Role | Core Qualification | Why they are vital for *this* project | | :--- | :--- | :--- | :--- | | Dr. A | Technical Lead | PhD in Physics; 5 Patents | Leads the development of the core sensor technology (WP3). | | Expert B | Commercial Lead | 20 yrs in Agri-Tech sales | Manages the pilot phase with launching customers and handles valorization. | | Dr. C | Lead Developer | PhD in AI; WBSO experience | Ensures the software architecture is scalable and manages R&D administration. | ### 3. Highlight \"Complementarity\" Reviewers look for synergy. Explain how the PhDs and Industry Experts work together. * *Example:* \"The deep technical insights of our research team are balanced by our industry experts’ understanding of the regulatory landscape (e.g., CE marking, ISO standards), ensuring that the innovation is 'compliant by design'.\" ### 4. Address the \"Project Management\" Gap Often, a team of scientists and experts lacks a dedicated **Project Manager**. * Even if one of the PhDs is doing it, explicitly state who is responsible for the **administrative and financial management** of the subsidy. * **Dutch Tip:** Mentioning experience with **WBSO** or previous **RVO** grants gives reviewers confidence that you won't mess up the reporting and audits. ### 5. The \"Advisory Board\" (The Secret Weapon) If your team is small, you might look \"top-heavy\" on research and \"light\" on corporate governance. * List 2-3 **External Advisors**. These could be a professor from a Dutch University (TU Delft, Wageningen, etc.) or a C-level executive from a potential \"Launching Customer.\" * This proves that your team is not working in a vacuum and has \"market pull.\" ### 6. Quantify Commitment (FTEs) A \"Dream Team\" on paper is worthless if they only spend 2 hours a week on the project. * State the **FTE (Full-Time Equivalent)** commitment for each key member. * Reviewers want to see that the core team is \"all-in.\" If the 3 PhDs are still full-time professors, you must explain how they will find the time to execute this project. ### Final \"Reviewer-Proof\" Check: * **Does the team have the skills to handle the budget?** (Mention a CFO or an experienced business lead). * **Does the team have the skills to handle the IP?** (Mention experience with patent filing or IP strategy). * **Is there a \"Single Point of Failure\"?** If one PhD leaves, does the project die? Briefly mention how knowledge is shared within the team. **Document Tip:** For the Annex (CVs), keep them to **2 pages maximum per person**. Highlight only the publications and projects *relevant* to this specific subsidy. A 10-page academic CV is often viewed negatively by industry-focused reviewers."
