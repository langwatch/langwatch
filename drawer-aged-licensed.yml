                - cell "How long does the review process typically take after we submit all documents?" [ref=e1503]:
                  - paragraph [ref=e1504]: How long does the review process typically take after we submit all documents?
                - cell [ref=e1505]:
                  - generic [ref=e1506]: "In the Netherlands, the review process is governed by strict administrative laws (*Algemene wet bestuursrecht*), but the actual duration depends heavily on whether you are applying to a government body or a private fund. On average, you should expect a timeline of **8 to 13 weeks**, but here is the breakdown by type of funder: ### 1. Government Subsidies (RVO, Province, or Municipality) Public bodies follow a legal \"Besluittermijn\" (decision period). * **Standard Period:** 8 weeks is the legal standard for most municipal and provincial grants. * **The \"Extension\" (Verlenging):** Government bodies have the right to extend the period once, usually by another 4 to 6 weeks. They must notify you in writing if they do this. * **Large Tenders:** For national RVO tenders (like innovation or energy grants), the process often takes **13 to 22 weeks** because all applications are compared against each other after the closing date. ### 2. Private/Philanthropic Funds (e.g., VSBfonds, Oranje Fonds, Kansfonds) Private funds are not bound by the same administrative laws as the government, but they have their own board meeting schedules. * **Standard Period:** **2 to 4 months.** * **Small Requests:** Some funds have a \"snelloket\" (fast track) for requests under €2,500 or €5,000, which can take as little as **3 to 6 weeks.** * **Board Cycles:** These funds usually review applications in quarterly board meetings. If you submit just after a meeting, you will wait the full three months for the next one. --- ### The Typical \"Waiting\" Timeline Once you hit \"submit,\" your application usually moves through these four stages: 1. **The \"Ontvangstbevestiging\" (Day 1-3):** You get an automated or manual confirmation that they received the documents. 2. **The \"Formele Toets\" (Weeks 1-2):** A secretary checks if you’ve signed everything and attached your KvK extract. If something is missing, they will send a \"Verzoek om aanvulling\" (request for completion). * *Note:* If they ask for more info, the \"decision clock\" stops until you provide it (*Opschorting*). 3. **The \"Inhoudelijke Beoordeling\" (Weeks 3-10):** This is the \"black hole\" period. The project is sent to internal experts or an external advisory committee. You usually hear nothing during this time. 4. **The \"Beschikking\" (The Final Week):** You receive the formal letter (*Beschikking*). If positive, it will detail the amount granted and the conditions. --- ### Factors That Will Delay Your Application * **The \"Hersteltermijn\":** If your application is incomplete, they will give you a deadline (usually 1-2 weeks) to fix it. The time you take to respond is added to the total review time. * **Holiday Periods:** In the Netherlands, the months of **July, August, and late December** are notoriously slow. If you submit in June, expect the process to take 2-4 weeks longer than usual. * **High Volume:** If a \"first-come, first-served\" fund is flooded on opening day, the administrative processing of the \"queue\" can add weeks to the timeline. ### Advisor’s Practical Advice: * **Don't wait for the money to plan:** Because the process takes ~3 months, you must plan your project start date carefully. Most funds **will not** cover costs incurred before the official \"Verleningsbesluit\" (grant decision) date. If you need to start sooner, you do so at your own financial risk. * **Check the \"Mandaat\":** Sometimes a department head can sign off on small amounts (e.g., <€10k) without a committee. If your request is small, you can call the case officer and ask: *\"Wordt dit ambtelijk afgedaan of gaat het naar een commissie?\"* (Is this handled by staff or a committee?). Staff-handled decisions are much faster. * **The \"Silence is NOT Consent\" Rule:** Unlike some other administrative processes, if a government body misses their deadline, it does **not** mean your subsidy is automatically granted. It just means you have the right to \"put them in default\" (*ingebrekestelling*), which forces a decision within 2 weeks. **Are you planning a project that needs to start by a specific date? I can help you work backward to find your \"last possible\" submission day.**"
