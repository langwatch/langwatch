                  - paragraph [ref=e1363]: How should I justify personnel costs? Our project leader charges €90/hour.
                - cell [ref=e1364]:
                  - generic [ref=e1365]: "Justifying an hourly rate of €90 for a project leader depends entirely on whether that person is an **internal employee** (on your payroll) or an **external consultant** (hired third party). Dutch grant providers (like RVO) are very strict about which calculation method you use. Here is how you should handle and justify that €90/hour rate based on the two scenarios: ### Scenario A: The Project Leader is an Internal Employee If the project leader is on your payroll, you generally **cannot** simply choose an hourly rate. You must use one of the three calculation methods prescribed by the specific subsidy scheme: 1. **The Fixed Rate (Vast uurtarief):** * Many subsidies (like the MIT-subsidy) use a fixed rate of **€60 per hour** for everyone, regardless of their actual salary. * **The Verdict:** If your subsidy uses this method, you **cannot** justify €90. You must use €60 in your budget, or your application will be corrected downward (or rejected). 2. **Calculation based on Salary (Loonkosten + Opslag):** * If the scheme allows \"actual costs,\" the formula is usually: `(Gross Annual Salary / 1,720 hours) + a fixed markup (usually 50%)`. * **To justify €90:** The project leader’s gross annual salary (including holiday pay and 13th month, but excluding bonuses) would need to be approximately **€103,000 per year**. * **Required Proof:** You must provide a recent **salary slip (loonstrook)** or a labor contract if requested. 3. **Integral Cost Method (IKS):** * Usually only for large companies or research institutes with audited cost systems. If you haven't pre-approved an IKS rate with the RVO, you cannot use this. --- ### Scenario B: The Project Leader is an External Consultant (Third Party) If you are hiring an external freelancer (ZZP) or a consultant for €90/hour, this falls under **\"Kosten van derden\"** (Third-party costs). **How to justify it:** * **Market Conformity:** You must demonstrate that €90 is a \"market-conform\" rate for an innovation project leader. In the Netherlands, €90-€125 is generally considered reasonable for specialized consultancy. * **The Quote (Offerte):** You must include a signed quote from the consultant that specifies: * A clear description of the tasks (linked to the project plan). * The number of hours. * The hourly rate of €90. * **CV/Expertise:** Briefly describe the project leader’s specific expertise in the project plan. If they have a highly technical background or unique experience that justifies €90 (vs. a junior at €50), mention this. --- ### Critical \"Pass/Fail\" Risks for Personnel Costs 1. **The DGA Rule (Director-Major Shareholder):** If the project leader is the owner of the company (DGA), some subsidies mandate a specific rate (often around €60) regardless of what they normally charge clients. **Check the \"Subsidiespelregels\" for your specific grant.** 2. **No \"Profit and Risk\":** For internal staff, you are only allowed to claim *cost price*. You cannot build a profit margin into the hourly rate of your own employees. 3. **The 1,720-hour Rule:** The Dutch government assumes a full-time employee works 1,720 productive hours per year. If your project leader is already assigned to three other subsidized projects, and the total hours exceed 1,720, your claim will be rejected during an audit. ### Actionable Feedback for your Application: * **Step 1:** Check the \"Handleiding\" (Manual) of your specific subsidy. Look for the heading **\"Berekening van de subsidiabele kosten\"**. * **Step 2:** If it says \"Vast uurtarief van €60,\" change your budget immediately. * **Step 3:** If it allows actual costs, ensure you have the **salary slip** ready to prove the calculation leads to €90. * **Step 4:** In your Project Plan, under the \"Project Organization\" section, explicitly state: *\"The project leader [Name] has [X] years of experience in [Technology], justifying the senior rate for this complex innovation trajectory.\"* **Would you like me to check which specific calculation method applies to your subsidy? (e.g., WBSO, MIT, or DEI+?)**"
