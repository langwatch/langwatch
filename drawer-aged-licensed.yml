                - cell "How long does the review process typically take after we submit all documents?" [ref=e751]:
                  - paragraph [ref=e752]: How long does the review process typically take after we submit all documents?
                - cell [ref=e753]:
                  - generic [ref=e754]: "In the Netherlands, the review period—known as the **besluittermijn** (decision period)—is governed by law for government subsidies, while private funds follow their own internal calendars. As a small foundation, you should generally count on **8 to 13 weeks**, but the timeline depends heavily on the type of funder. ### 1. Government Subsidies (RVO, Provinces, Municipalities) For government bodies, the *Algemene wet bestuursrecht* (General Administrative Law Act) sets the rules. * **Standard Period:** Usually **8 weeks**. * **Extensions:** The agency has the right to extend this by another **13 weeks** if they need more time (e.g., if the application is complex or they received too many submissions). They must notify you in writing if they do this. * **Tender Systems:** If you applied for a \"Tender\" (where everyone submits by a fixed deadline), the clock only starts ticking **after the deadline passes**, not when you hit submit. Decisions are usually announced 10–13 weeks after the closing date. ### 2. Private/Philanthropic Funds (e.g., VSBfonds, Oranje Fonds, Kansfonds) Private funds operate differently because they are often managed by a Board of Directors that meets only a few times a year. * **Average Period:** **3 to 4 months**. * **Board Cycles:** If you submit your application just after a board meeting, you might have to wait until the next quarterly meeting for a final \"Yes\" or \"No.\" * **Quick Scans:** Some private funds offer a \"Quick Scan\" which gives you a go/no-go signal within 1–2 weeks, but the full application still takes months. --- ### What can \"Pause\" the clock? The most common reason for delays is the **Hersteltermijn** (Repair Period). If the reviewer finds that a document is missing or the budget is unclear, they will send a \"Request for Information\" (*verzoek om aanvulling*). * **The Clock Stops:** The moment they send that email, the official decision period is paused. * **The Clock Restarts:** The timer only starts again once you provide the requested information. * **Advice:** Respond to these requests as fast as possible (usually within 48 hours) to keep the momentum. --- ### The \"Danger Zone\": Starting the Project **Crucial Rule:** In almost all cases, you **cannot start the project** or sign any contracts until you have received the formal decision (*De Beschikking*). * If you start early, your costs may be ruled \"ineligible,\" and you won't get reimbursed. * If your project is urgent, some funders allow a **\"Toestemming voor vervroegde start\"** (Permission for early start). This allows you to begin at your own financial risk without disqualifying the application, but you must request this explicitly. --- ### Typical Timeline Milestones 1. **Week 1:** **Ontvangstbevestiging** (Confirmation of receipt). You get an automated email with a reference number. 2. **Week 2–4:** **Volledigheidstoets** (Completeness check). An administrative officer checks if your KvK, UBO, and signatures are correct. 3. **Week 5–10:** **Inhoudelijke beoordeling** (Substantive assessment). A policy officer or advisory committee grades your plan. 4. **Week 11–13:** **De Beschikking** (The Decision). You receive a formal letter via the portal or post. ### What should you do while waiting? * **Don't call every week:** It won't speed up the process and can irritate the case officer. * **Check your spam folder:** Dutch government emails (especially from RVO or provinces) often end up there. * **Prepare your administration:** If you get the grant, you will need to track every hour and every invoice meticulously. Use this waiting period to set up a dedicated project folder and time-tracking system. **Is your project tied to a specific start date (like a festival or a launch event)?** If so, you should check if the funder has a \"minimum submission lead time\" (often 4 months before the start)."
