                - cell "What is a VOG certificate and why is it required for subsidy applications?" [ref=e1033]:
                  - paragraph [ref=e1034]: What is a VOG certificate and why is it required for subsidy applications?
                - cell [ref=e1035]:
                  - generic [ref=e1036]: "In the context of Dutch government subsidies, a **VOG** (*Verklaring Omtrent het Gedrag*) is a **Certificate of Good Conduct**. It is an official document issued by **Justis** (the judicial operational service of the Ministry of Justice and Security) which states that your past behavior does not constitute an objection to performing a specific role or task. Here is a breakdown of why it is required and what you need to know for your application. --- ### 1. Why is it required for subsidies? The Dutch government has a responsibility to ensure that public funds are spent effectively and ethically. The VOG serves as a \"gatekeeper\" for three main reasons: * **Integrity and Trust:** It proves that the applicant (or the organization’s directors) has not been involved in criminal activities that would make them unfit to handle public money (e.g., fraud, money laundering, or embezzlement). * **Risk Management:** It reduces the risk of \"subversive crime\" (*ondermijning*), where legal structures are used for illegal purposes. * **Safety of Target Groups:** If the subsidy involves working with vulnerable populations (children, the elderly, or healthcare patients), a VOG ensures that the personnel involved do not have a relevant criminal record (e.g., history of violence or abuse). --- ### 2. Types of VOGs Depending on who is applying for the subsidy, you may need one of two types: * **VOG NP (Natural Persons):** For individuals, self-employed persons (ZZP), or specific key employees. * **VOG RP (Legal Entities):** For companies, foundations, or associations. This checks the integrity of the organization itself and its directors. --- ### 3. Pass/Fail Criteria (Reviewer’s Checklist) When we review your application, we look for the following \"Pass\" criteria. If any are missing, the document will be rejected. | Criteria | Requirements for a \"Pass\" | | :--- | :--- | | **Issuer** | Must be issued by **Justis**. Unofficial background checks or private certificates are not accepted. | | **Validity (Age)** | Usually, the VOG must not be older than **3 or 6 months** at the moment you submit your subsidy application (check your specific subsidy scheme for the exact timeframe). | | **Screening Profile** | The VOG must be requested for a specific \"screening profile\" (e.g., Profile 25: *Finance*, or Profile 80: *Vulnerable persons*). If the profile doesn't match the subsidy's risks, it fails. | | **Authenticity** | The document must be original. If submitted digitally, it must contain the official digital signature/security features from Justis. | | **Entity Match** | The name on the VOG must exactly match the name of the applicant or the director listed in the KVK (Chamber of Commerce) extract. | --- ### 4. Actionable Feedback for Your Application To ensure your VOG is accepted on the first try, follow these steps: 1. **Check the Specific Scheme:** Before applying for a VOG, read the subsidy guidelines to see which **screening profile** is required. Using the wrong profile is the #1 reason for rejection. 2. **Apply Early:** A VOG application can take between **1 to 4 weeks** to process. Do not wait until the subsidy deadline to request it. 3. **Digital is Faster:** Request a digital VOG if possible. It is easier to upload to our portal and harder to lose. 4. **Verify the Director:** If you are applying as a foundation or BV, ensure the VOG RP covers all current directors registered at the KVK. **Common Reason for Failure:** * *\"The applicant submitted a VOG that was issued two years ago for a previous job.\"* * **Correction:** You must apply for a **new** VOG specifically for the purpose of the current subsidy or your current role within the project. **Do you need help determining which screening profile applies to your specific subsidy?** Please provide the name of the subsidy scheme you are applying for."
