                - cell "What percentage of the budget should be co-financing from our own funds?" [ref=e1315]:
                  - paragraph [ref=e1316]: What percentage of the budget should be co-financing from our own funds?
                - cell [ref=e1317]:
                  - generic [ref=e1318]: "There is no single fixed percentage for all subsidies, but for most Dutch innovation grants (like **MIT**, **DEI+**, or **TSE**), you should expect to provide **between 50% and 65%** of the budget from your own funds. In subsidy terms, the government’s contribution is called the **\"Subsidiepercentage\"** (subsidy intensity), and your part is called the **\"Eigen bijdrage\"** (co-financing). Here is the breakdown of how this works and what counts as \"own funds.\" ### 1. Typical Percentages by Subsidy Type The percentage depends on the size of your company (**MKB/SME** vs. Large) and the type of work: * **MIT Haalbaarheid (Feasibility):** The subsidy is usually 40%. You must provide **60% co-financing**. * **MIT R&D Collaboration:** The subsidy is often 35%. You must provide **65% co-financing**. * **Industrial Research (Industrieel Onderzoek):** The subsidy can be up to 50% for SMEs. You provide **50% co-financing**. * **Experimental Development (Experimentele Ontwikkeling):** This is closer to the market, so the subsidy is lower (usually 25%). You provide **75% co-financing**. ### 2. What counts as \"Own Funds\" (Co-financing)? A common misconception is that co-financing must be a pile of cash sitting in a bank account. In reality, co-financing is usually a mix of: * **In-kind contribution (Ureninzet):** This is the most common form. If your employees work on the project, their \"unpaid\" hours (the portion not covered by the subsidy) count as co-financing. * *Example:* If your project costs are €100k in labor and the subsidy is 40% (€40k), your \"co-financing\" is the €60k you are paying in salaries anyway. * **Cash (Private middelen):** Money from your company's reserves used to buy materials or hire external experts. * **External Financing:** Loans from a bank, venture capital, or informal investors. ### 3. The \"Pass/Fail\" Criteria: Financial Capacity The RVO (Netherlands Enterprise Agency) will check if you can actually afford your share. This is where many applications fail. * **The 50% Rule:** Generally, the RVO wants to see that your company (or the consortium) has enough liquidity or projected cash flow to cover the project costs *before* the subsidy is paid out (since subsidies are often paid in installments or in arrears). * **Negative Equity:** If your balance sheet shows negative equity (negatief eigen vermogen), the RVO may view your company as \"in difficulty\" (onderneming in moeilijkheden). Under EU rules, **companies in financial difficulty are often ineligible for subsidies.** ### 4. Actionable Feedback: How to prove you have the funds When you submit your application, you should be prepared to provide: 1. **A Financing Plan:** A simple table showing: Subsidy + Own Cash + In-kind hours + Loans = Total Project Budget. 2. **Annual Accounts (Jaarrekening):** The RVO will look at your most recent Chamber of Commerce (KVK) filings. If those are old or look weak, provide a recent **provisional balance sheet**. 3. **Letter of Intent (LoI):** If an investor or bank is providing the co-financing, include a signed letter from them stating they are committed to funding the project if the subsidy is granted. ### Pro-Tip: The \"Cash Flow Gap\" Remember that Dutch subsidies are usually paid as a **pre-payment (voorschot)** of 50-80%, with the remainder paid only *after* the project is finished and the final report is approved. Your co-financing must be able to bridge the gap between your spending and the final payment. **Do you have a specific subsidy in mind? I can tell you the exact percentage required for that scheme.**"
