apiVersion: v2
name: langwatch-helm
description: Helm chart for LangWatch application
type: application
appVersion: 3.1.0-prerelease.1
version: 3.1.0-prerelease.1
annotations:
  category: Observability
  keywords: ai,observability,monitoring,secrets
  maintainers: LangWatch Team
dependencies:
  - name: prometheus
    version: 25.27.0
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.chartManaged
  - name: clickhouse-serverless
    alias: clickhouse
    version: 0.1.0-next.1
    repository: file://../clickhouse-serverless
    condition: clickhouse.chartManaged
