apiVersion: v2
name: langwatch
description: Helm chart for LangWatch application
type: application
appVersion: 3.0.0
version: 3.0.0
annotations:
  category: Observability
  keywords: ai,observability,monitoring,secrets
  maintainers: LangWatch Team
dependencies:
  - name: prometheus
    version: 25.27.0
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.chartManaged
  - name: clickhouse-serverless
    alias: clickhouse
    version: 0.2.0
    repository: file://../clickhouse-serverless
    condition: clickhouse.chartManaged
  # The AI gateway is an additive subchart. Installing the umbrella
  # `langwatch` chart lifts the gateway pod alongside langwatch-app in
  # the same release — so customers running `helm install langwatch ...`
  # get the gateway by default. Self-hosters who don't want the gateway
  # surface can opt out via `gateway.chartManaged: false`.
  #
  # Auth is shared: LW_GATEWAY_INTERNAL_SECRET + LW_GATEWAY_JWT_SECRET
  # are materialised once by the umbrella and injected into both the
  # langwatch-app Deployment AND the gateway Deployment via
  # valueFrom.secretKeyRef. Change on either side (shape / validation)
  # must bump BOTH charts together — release-please is configured to
  # treat services/gateway/** + src/server/gateway/** as co-bump paths.
  - name: langwatch-gateway
    alias: gateway
    version: 0.1.0
    repository: file://../gateway
    condition: gateway.chartManaged
