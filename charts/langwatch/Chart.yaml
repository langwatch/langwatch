apiVersion: v2
name: langwatch-helm
description: Helm chart for LangWatch application
type: application
appVersion: 3.0.0
version: 3.0.0
annotations:
  category: Observability
  keywords: ai,observability,monitoring,secrets
  maintainers: LangWatch Team
dependencies:
  - name: postgresql
    version: 16.4.9
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.chartManaged
  - name: redis
    version: 18.0.0
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redis.chartManaged
  - name: prometheus
    version: 25.27.0
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.chartManaged
