{{/*
  ADR-051: seed the per-project topic clustering schedules, as a Helm
  post-install,post-upgrade hook Job.

  WHY THIS EXISTS. ADR-051 moved topic clustering off the `/api/cron/
  schedule_topic_clustering` CronJob and onto durable per-project process
  wakes. Those wakes are asserted whenever a project ingests a real trace, so
  the fleet largely seeds itself — but a project that has ingested NOTHING
  since the upgrade never gets the chance. This Job covers exactly that
  remainder, so an upgrade does not leave dormant projects unclustered until
  someone runs `pnpm run task backfillTopicClusteringSchedules` by hand.

  IT IS NOT THE RECONCILIATION PATH. It used to be: bootstrap was
  edge-triggered on a project's first-message transition, so any missed edge
  was permanent and this Job was the only repair. Bootstrap is level-triggered
  now (rate-limited per project), so an ACTIVE project that loses its schedule
  re-asserts it on its next trace. That is why this Job may skip itself
  without failing the deploy.

  Properties that make it safe to fire on every upgrade:

    - IDEMPOTENT: the task pages through eligible projects (firstMessage: true)
      and issues a bootstrap clustering request for each one that has no
      scheduled `nextWakeAt` yet. Projects already scheduled are skipped
      outright, and any request that does go out evolves an
      already-bootstrapped process as a pure no-op, so re-running on every
      `helm upgrade` neither double-schedules a project nor forces an
      unscheduled clustering run. (Each unskipped request does append one
      event; the `nextWakeAt` skip is what keeps repeat runs from growing the
      log once the workers have caught up.)
    - NEVER FAILS THE DEPLOY: if the schema has not appeared by the end of the
      task's wait, it logs and exits 0 rather than failing `helm install`.
      Migrations run on app boot, so on a fresh cluster this Job can
      legitimately outlive its own wait; the work it would have done is
      picked up by the next upgrade or a manual run.
    - PARTIAL FAILURE IS A FAILURE: one project's error is logged and skipped so
      the rest of the fleet still gets scheduled, but the task then exits
      non-zero. The Job retries (`backoffLimit`) rather than reporting a
      truncated backfill as a successful deploy step.
    - OFF THE BOOT PATH: a hook Job, never the `set -e` app boot, so a failure
      here can never block pods from starting. Topic clustering degrades; the
      product still serves.
    - OPT-OUT: `.Values.topicClusteringBackfill.enabled=false` omits it.

  ORDERING CAVEAT (same as dataset-s3-migration). Prisma/ClickHouse migrations
  in this chart run on APP BOOT (`start:prepare:db`), not as a Helm hook, so
  `hook-weight` cannot order this Job after them — post-upgrade hooks fire once
  resources are SUBMITTED, not once the Deployment has rolled out. The TASK
  ITSELF closes the race: before walking any projects it waits up to 10
  minutes for its tables to exist, so winning the race against a
  not-yet-migrated database means a quiet poll, not a crash. Relying on
  `backoffLimit` for this was disproven in chart e2e — on a fresh cluster the
  app's image pull + first boot outlasts all three retries' backoff, and the
  hook failed the whole `helm install` with BackoffLimitExceeded. Retries
  remain for genuinely transient failures; `helm upgrade --wait` (or
  Argo/Flux) still makes the ordering deterministic rather than merely
  tolerated. Weight 10 puts it after the dataset-s3-migration hook (5) so the
  two backfills don't contend.

  hook-delete-policy `before-hook-creation` clears the prior run's Job before
  re-creating it, so reruns are clean. There is no `hook-succeeded` policy
  (matching dataset-s3-migration), but note a FAILED run still only survives
  until `ttlSecondsAfterFinished` (default 10 minutes) reaps it, pods and
  logs included — raise that value if you want a longer post-mortem window,
  and rely on your log pipeline rather than the cluster for anything older.

  Image + env mirror the workers Deployment: same app image, same
  `langwatch.sharedEnv` (DATABASE_URL, Redis, ClickHouse, ...).
*/}}
{{- if .Values.topicClusteringBackfill.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-topic-clustering-backfill
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-topic-clustering-backfill
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: topic-clustering-backfill
    {{- include "langwatch.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: {{ .Values.topicClusteringBackfill.backoffLimit | default 3 }}
  {{- with .Values.topicClusteringBackfill.activeDeadlineSeconds }}
  activeDeadlineSeconds: {{ . }}
  {{- end }}
  ttlSecondsAfterFinished: {{ .Values.topicClusteringBackfill.ttlSecondsAfterFinished | default 600 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}-topic-clustering-backfill
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: topic-clustering-backfill
    spec:
      restartPolicy: Never
      {{/* Parity with app/workers: the task talks to Postgres/Redis/ClickHouse
           only, never the Kubernetes API, so don't mount the SA token. */}}
      automountServiceAccountToken: {{ .Values.global.automountServiceAccountToken }}
      {{- with .Values.topicClusteringBackfill.serviceAccountName }}
      serviceAccountName: {{ . }}
      {{- end }}

      {{/* Inherit chart-wide pod security + scheduling defaults so strict
           clusters don't reject the hook and node taints / dedicated pools
           still apply — the same coalesce pattern the workers / app /
           preflight / dataset-s3-migration templates use. */}}
      {{- with (coalesce .Values.topicClusteringBackfill.podSecurityContext .Values.global.podSecurityContext) }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (coalesce .Values.topicClusteringBackfill.nodeSelector .Values.global.scheduling.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (coalesce .Values.topicClusteringBackfill.tolerations .Values.global.scheduling.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (coalesce .Values.topicClusteringBackfill.affinity .Values.global.scheduling.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: {{ .Release.Name }}-topic-clustering-backfill
          {{- with (coalesce .Values.topicClusteringBackfill.containerSecurityContext .Values.global.containerSecurityContext) }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.images.app.repository }}:{{ .Values.images.app.tag }}"
          imagePullPolicy: "{{ .Values.images.app.pullPolicy }}"
          workingDir: /app/langwatch
          command: ['pnpm']
          args: ['run', 'task', 'backfillTopicClusteringSchedules']
          env:
            {{- include "langwatch.sharedEnv" . | nindent 12 }}
            {{- with .Values.topicClusteringBackfill.extraEnvs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.topicClusteringBackfill.resources | nindent 12 }}
          volumeMounts:
            {{- with .Values.topicClusteringBackfill.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            - name: tmp-dir
              mountPath: /tmp
      volumes:
        {{- with .Values.topicClusteringBackfill.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        - name: tmp-dir
          emptyDir: {}
{{- end }}
