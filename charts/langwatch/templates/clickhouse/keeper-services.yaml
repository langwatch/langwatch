{{- if and .Values.clickhouse.chartManaged (gt (int .Values.clickhouse.managed.replicas) 1) }}
# Headless service for Keeper pod discovery and raft communication
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-clickhouse-keeper-headless
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-clickhouse-keeper
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: keeper
    {{- include "langwatch.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: keeper
      port: 9181
      targetPort: 9181
      protocol: TCP
    - name: raft
      port: 9234
      targetPort: 9234
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ .Release.Name }}-clickhouse-keeper
    app.kubernetes.io/instance: {{ .Release.Name }}
---
# ClusterIP service for ClickHouse nodes to connect to Keeper
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-clickhouse-keeper-client
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-clickhouse-keeper
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: keeper
    {{- include "langwatch.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: keeper
      port: 9181
      targetPort: 9181
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ .Release.Name }}-clickhouse-keeper
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
