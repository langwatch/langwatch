{{- if and .Values.clickhouse.chartManaged (gt (int .Values.clickhouse.managed.replicas) 1) }}
{{- $replicas := .Values.clickhouse.managed.replicas | int }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-clickhouse-keeper
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-clickhouse-keeper
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: keeper
    {{- include "langwatch.labels" . | nindent 4 }}
spec:
  serviceName: {{ .Release.Name }}-clickhouse-keeper-headless
  replicas: {{ $replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}-clickhouse-keeper
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}-clickhouse-keeper
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: keeper
    spec:
      securityContext:
        fsGroup: 101  # clickhouse group
      terminationGracePeriodSeconds: 30

      {{- with (coalesce .Values.clickhouse.scheduling.nodeSelector .Values.global.scheduling.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (coalesce .Values.clickhouse.scheduling.tolerations .Values.global.scheduling.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - {{ .Release.Name }}-clickhouse-keeper
                topologyKey: topology.kubernetes.io/zone
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - {{ .Release.Name }}-clickhouse-keeper
                topologyKey: kubernetes.io/hostname

      initContainers:
        # Wait for all Keeper pod DNS entries to be resolvable
        - name: dns-wait
          image: busybox:1.37.0
          command: ['sh', '-c']
          args:
            - |
              REPLICAS={{ $replicas }}
              NAMESPACE={{ .Release.Namespace }}
              for i in $(seq 0 $((REPLICAS - 1))); do
                HOST="{{ .Release.Name }}-clickhouse-keeper-${i}.{{ .Release.Name }}-clickhouse-keeper-headless.${NAMESPACE}.svc.cluster.local"
                echo "Waiting for DNS: ${HOST}"
                until nslookup "${HOST}" >/dev/null 2>&1; do
                  echo "  ${HOST} not resolvable yet..."
                  sleep 2
                done
                echo "  ${HOST} resolved"
              done
              echo "All Keeper DNS entries resolvable"
          securityContext:
            runAsUser: 65534
            runAsNonRoot: true
        # Generate keeper_config.xml with pod-specific server_id
        - name: keeper-init
          image: busybox:1.37.0
          command: ['sh', '/scripts/init-keeper.sh']
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: keeper-config
              mountPath: /etc/clickhouse-keeper
            - name: init-scripts
              mountPath: /scripts
          securityContext:
            runAsUser: 65534
            runAsNonRoot: true

      containers:
        - name: keeper
          image: "{{ .Values.images.clickhouse.repository }}:{{ .Values.images.clickhouse.tag }}"
          imagePullPolicy: {{ .Values.images.clickhouse.pullPolicy }}
          command: ["clickhouse-keeper"]
          args: ["--config-file=/etc/clickhouse-keeper/keeper_config.xml"]
          ports:
            - name: keeper
              containerPort: 9181
              protocol: TCP
            - name: raft
              containerPort: 9234
              protocol: TCP
          securityContext:
            runAsUser: 101  # clickhouse user
            runAsNonRoot: true
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "echo ruok | nc 127.0.0.1 9181 | grep -q imok"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "echo ruok | nc 127.0.0.1 9181 | grep -q imok"
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: keeper-data
              mountPath: /var/lib/clickhouse-keeper
            - name: keeper-config
              mountPath: /etc/clickhouse-keeper

      volumes:
        - name: keeper-config
          emptyDir: {}
        - name: init-scripts
          configMap:
            name: {{ .Release.Name }}-clickhouse-init
            defaultMode: 0755

  volumeClaimTemplates:
    - metadata:
        name: keeper-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.clickhouse.managed.storage.storageClass }}
        storageClassName: {{ .Values.clickhouse.managed.storage.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: 10Gi
{{- end }}
