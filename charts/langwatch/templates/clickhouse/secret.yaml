{{- if .Values.clickhouse.chartManaged }}
{{- if not .Values.clickhouse.auth.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-clickhouse
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-clickhouse
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "langwatch.labels" . | nindent 4 }}
type: Opaque
data:
  {{- $existingSecret := lookup "v1" "Secret" .Release.Namespace (printf "%s-clickhouse" .Release.Name) }}
  {{- if $existingSecret }}
  # Reuse existing secret data (preserves password across upgrades)
  {{- range $key, $value := $existingSecret.data }}
  {{ $key }}: {{ $value }}
  {{- end }}
  {{- else }}
  # Generate new password on first install
  {{- if .Values.clickhouse.auth.password }}
  password: {{ .Values.clickhouse.auth.password | b64enc | quote }}
  {{- else }}
  password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
