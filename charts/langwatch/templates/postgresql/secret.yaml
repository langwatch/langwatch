{{- if .Values.postgresql.chartManaged }}
{{- if not .Values.postgresql.auth.existingSecret }}
{{- $secretName := printf "%s-postgresql" .Release.Name }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "langwatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
type: Opaque
data:
  {{- if $existingSecret }}
  postgres-password: {{ index $existingSecret.data "postgres-password" }}
  {{- else if .Values.postgresql.auth.password }}
  postgres-password: {{ .Values.postgresql.auth.password | b64enc | quote }}
  {{- else }}
  postgres-password: {{ randAlphaNum 24 | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end }}
