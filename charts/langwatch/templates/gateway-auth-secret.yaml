{{/*
  Materialise the gateway-auth Secret (LW_GATEWAY_INTERNAL_SECRET +
  LW_GATEWAY_JWT_SECRET) when:

    - gateway.chartManaged is true (gateway pod is in scope), and
    - autogen.enabled is true (operator opted into chart-generated secrets), and
    - autogen.secretNames.gatewayAuth resolves to gateway.secrets.existingSecretName
      (so the materialised Secret matches the name the app + gateway pods mount).

  Both LW_GATEWAY_INTERNAL_SECRET and LW_GATEWAY_JWT_SECRET are 256-bit
  values rendered as sha256(64-char alphanum) hex. On first install we
  generate fresh values; on every subsequent render we look up the
  existing Secret and reuse its data verbatim so rotation requires an
  explicit operator action (delete + redeploy).

  ARGOCD CAVEAT (postmortem 2026-05-21, root cause #3): the `lookup`
  function returns nil under Argo's repo-server because the renderer
  has no cluster access. Every Argo sync would therefore generate a
  fresh random pair and rotate both gateway + app pods.

  This template does NOT provide chart-side mitigation for that. The
  Argo-safe path is to either:

    - skip the template entirely (autogen.enabled: false) and let an
      out-of-band Secret materialiser (PreSync hook, external-secrets,
      SealedSecrets, vault-agent) own LW_GATEWAY_INTERNAL_SECRET +
      LW_GATEWAY_JWT_SECRET, with the chart referencing it via
      gateway.secrets.existingSecretName; or

    - keep autogen on but pin the Secret in the Application manifest
      so Argo never rotates the rendered random pair:

        spec:
          ignoreDifferences:
            - group: ""
              kind: Secret
              name: <gateway.secrets.existingSecretName>
              jsonPointers: ["/data"]

  Earlier drafts annotated the Secret with `IgnoreExtraneous` +
  `ServerSideApply` hoping Argo would skip the data overwrite. It
  does not — IgnoreExtraneous only affects in-sync/out-of-sync status
  calculation, ServerSideApply only changes the apply mechanism
  (kubectl apply --server-side --force-conflicts), neither prevents
  Argo from reconciling toward the freshly-rendered random `data`.
  Those annotations were removed once that was understood.

  For self-host installs driving Helm directly (helm upgrade --install
  via CLI, helmfile, terraform helm provider), the lookup pattern is
  safe — `helm upgrade` runs lookup against the live cluster and the
  rendered Secret reuses the existing data verbatim.
*/}}
{{- $gw := .Values.gateway | default dict }}
{{- $autogen := .Values.autogen | default dict }}
{{- $gwSecrets := $gw.secrets | default dict }}
{{- if and $gw.chartManaged $autogen.enabled }}
{{- $secretName := default $gwSecrets.existingSecretName $autogen.secretNames.gatewayAuth }}
{{- if not $secretName }}
{{- fail "autogen.secretNames.gatewayAuth and gateway.secrets.existingSecretName are both empty; either set gateway.secrets.existingSecretName (default langwatch-gateway-auth) or disable gateway.chartManaged" }}
{{- end }}
{{- $internalKey := default "LW_GATEWAY_INTERNAL_SECRET" $gwSecrets.internalSecretKey }}
{{- $jwtKey := default "LW_GATEWAY_JWT_SECRET" $gwSecrets.jwtSecretKey }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "langwatch.labels" . | nindent 4 }}
  annotations:
    # Never delete on helm uninstall: this Secret carries shared auth
    # between langwatch-app and the gateway pod; losing it would force a
    # full rotation across both deployments.
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if and $existing $existing.data }}
  {{- range $k, $v := $existing.data }}
  {{ $k }}: {{ $v }}
  {{- end }}
  {{- else }}
  {{ $internalKey }}: {{ randAlphaNum 64 | sha256sum | b64enc | quote }}
  {{ $jwtKey }}: {{ randAlphaNum 64 | sha256sum | b64enc | quote }}
  {{- end }}
{{- end }}
