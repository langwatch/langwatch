{{/*
  Materialise the gateway-auth Secret (LW_GATEWAY_INTERNAL_SECRET +
  LW_GATEWAY_JWT_SECRET) whenever gateway.chartManaged is true. This
  mirrors the clickhouse / redis / postgresql subchart pattern
  (lookup-or-rand, no autogen.enabled gate) so a stock `helm install`
  succeeds end-to-end without operator-side Secret prep — the app +
  gateway pods both mount LW_GATEWAY_INTERNAL_SECRET, and crashloop
  with a generic CreateContainerConfigError if it is absent.

  Each key is checked against the existing Secret data independently
  via lookup. On first install both keys generate; on every helm
  upgrade the rendered Secret reuses the existing values verbatim,
  so the app + gateway pods do not roll. A partially-populated Secret
  (e.g. operator imported one key before 3.3.0 added the second) is
  healed in place: only the missing key is generated.

  ARGOCD CAVEAT (postmortem 2026-05-21, root cause #3): the `lookup`
  function returns nil under Argo's repo-server because the renderer
  has no cluster access. Each Argo sync would otherwise generate a
  fresh random pair and rotate both gateway + app pods. This template
  does NOT provide chart-side mitigation for that — it cannot. The
  Argo-safe path is to pin the Secret data in the Application manifest
  so Argo never reconciles the rendered random pair toward the cluster:

    spec:
      ignoreDifferences:
        - group: ""
          kind: Secret
          name: {{ default "langwatch-gateway-auth" ((.Values.gateway).secrets).existingSecretName }}
          jsonPointers: ["/data"]

  Earlier drafts annotated the Secret with `IgnoreExtraneous` +
  `ServerSideApply` hoping Argo would skip the data overwrite. It
  does not — IgnoreExtraneous only affects sync-status calculation,
  ServerSideApply only changes the apply mechanism, neither prevents
  Argo from reconciling toward the freshly-rendered random `data`.

  REINSTALL HAZARD: helm.sh/resource-policy=keep deliberately leaves
  this Secret behind on `helm uninstall` so a subsequent reinstall in
  the same namespace reuses the credentials (otherwise both app and
  gateway pods would force a full rotation on every reinstall). The
  cost: a reinstall in the same namespace will hit
    "exists and cannot be imported into the current release: invalid
     ownership metadata"
  because the abandoned Secret no longer carries the new release's
  meta.helm.sh/release-* annotations. NOTES.txt section 6 documents
  the one-time `kubectl annotate / label` ownership handoff used to
  rejoin it to the new release. Operators who want a clean uninstall
  instead can override:
    helm.sh/resource-policy: delete

  For self-host installs driving Helm directly (helm upgrade --install
  via CLI, helmfile, terraform helm provider), the lookup pattern is
  safe — `helm upgrade` runs lookup against the live cluster and the
  rendered Secret reuses the existing data verbatim.
*/}}
{{- $gw := .Values.gateway | default dict }}
{{- $gwSecrets := $gw.secrets | default dict }}
{{- if $gw.chartManaged }}
{{- $autogenNames := .Values.autogen.secretNames | default dict }}
{{- $secretName := default $gwSecrets.existingSecretName $autogenNames.gatewayAuth }}
{{- if not $secretName }}
{{- fail "gateway-auth Secret name is empty; set gateway.secrets.existingSecretName (default langwatch-gateway-auth) or autogen.secretNames.gatewayAuth, or disable gateway.chartManaged" }}
{{- end }}
{{- $internalKey := default "LW_GATEWAY_INTERNAL_SECRET" $gwSecrets.internalSecretKey }}
{{- $jwtKey := default "LW_GATEWAY_JWT_SECRET" $gwSecrets.jwtSecretKey }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $existingData := dict }}
{{- if and $existing $existing.data }}
{{-   $existingData = $existing.data }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "langwatch.labels" . | nindent 4 }}
  annotations:
    # See "REINSTALL HAZARD" in the template comment. Treat as long-lived
    # so the app + gateway pods don't lose their shared auth on uninstall.
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{ $internalKey }}: {{ default (include "langwatch.autogenSecretValue" .) (index $existingData $internalKey) | quote }}
  {{ $jwtKey }}: {{ default (include "langwatch.autogenSecretValue" .) (index $existingData $jwtKey) | quote }}
{{- end }}
