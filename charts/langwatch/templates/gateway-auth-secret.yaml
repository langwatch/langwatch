{{/*
  Materialise the gateway-auth Secret (LW_GATEWAY_INTERNAL_SECRET +
  LW_GATEWAY_JWT_SECRET) when the operator opts into chart-managed
  secret generation via autogen.enabled=true. Mirrors the app-secrets
  template (app/secrets.yaml): autogen.enabled is the single opt-in
  signal that says "chart, please materialise the bag of secrets I
  have not pre-created".

  When autogen.enabled is false (the production path), the operator
  pre-creates the gateway-auth Secret out-of-band (NOTES.txt section 6
  documents the kubectl create commands) and points the chart at it
  via gateway.secrets.existingSecretName. The chart skips rendering
  here, the preflight Job validates the required keys are present
  before pods roll, and the app + gateway deployments mount the
  operator-provided Secret. This is the only path that works cleanly
  under GitOps controllers whose render step has no cluster access
  (ArgoCD's repo-server, etc.) because nothing is rendered for the
  controller to reconcile against the live Secret.

  Each key is checked against the existing Secret data independently
  via lookup so partial-key rotation works for the autogen path: on
  first install both keys generate; on every helm upgrade the
  rendered Secret reuses the existing values verbatim, so the app +
  gateway pods do not roll. A partially-populated Secret (e.g.
  operator imported one key before 3.3.0 added the second) is healed
  in place: only the missing key is generated.

  REINSTALL HAZARD: helm.sh/resource-policy=keep deliberately leaves
  this Secret behind on `helm uninstall` so a subsequent reinstall in
  the same namespace reuses the credentials (otherwise both app and
  gateway pods would force a full rotation on every reinstall). The
  cost: a reinstall in the same namespace will hit
    "exists and cannot be imported into the current release: invalid
     ownership metadata"
  because the abandoned Secret no longer carries the new release's
  meta.helm.sh/release-* annotations. NOTES.txt section 6 documents
  the one-time `kubectl annotate / label` ownership handoff used to
  rejoin it to the new release. Operators who want a clean uninstall
  instead can override:
    helm.sh/resource-policy: delete

  HISTORY: an earlier draft rendered this Secret whenever
  gateway.chartManaged was true (independent of autogen.enabled) so a
  stock `helm install` succeeded without operator Secret prep. That
  asymmetry vs app-secrets caused the ArgoCD gateway-auth rotation
  postmortem 2026-05-21: under Argo the lookup returns nil every
  sync, the chart re-rendered a fresh random pair every render, and
  ordinary syncs rotated both deployments unless the operator added
  an ignoreDifferences + RespectIgnoreDifferences=true +
  ServerSideApply=true trio to the Application spec. The current
  gating restores symmetry with app-secrets and removes the Argo
  gotcha; the stock-install ergonomic is preserved via
  autogen.enabled=true, identical to how app-secrets has worked
  since 3.0.
*/}}
{{- $gw := .Values.gateway | default dict }}
{{- $gwSecrets := $gw.secrets | default dict }}
{{- if and $gw.chartManaged .Values.autogen.enabled }}
{{- $autogenNames := .Values.autogen.secretNames | default dict }}
{{- $secretName := default $gwSecrets.existingSecretName $autogenNames.gatewayAuth }}
{{- if not $secretName }}
{{- fail "gateway-auth Secret name is empty; set gateway.secrets.existingSecretName (default langwatch-gateway-auth) or autogen.secretNames.gatewayAuth, or disable gateway.chartManaged" }}
{{- end }}
{{- $internalKey := default "LW_GATEWAY_INTERNAL_SECRET" $gwSecrets.internalSecretKey }}
{{- $jwtKey := default "LW_GATEWAY_JWT_SECRET" $gwSecrets.jwtSecretKey }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $existingData := dict }}
{{- if and $existing $existing.data }}
{{-   $existingData = $existing.data }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "langwatch.labels" . | nindent 4 }}
  annotations:
    # See "REINSTALL HAZARD" in the template comment. Treat as long-lived
    # so the app + gateway pods don't lose their shared auth on uninstall.
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{ $internalKey }}: {{ default (include "langwatch.autogenSecretValue" .) (index $existingData $internalKey) | quote }}
  {{ $jwtKey }}: {{ default (include "langwatch.autogenSecretValue" .) (index $existingData $jwtKey) | quote }}
{{- end }}
