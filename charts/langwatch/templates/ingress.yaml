{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  {{- if .Values.ingress.labels }}
  labels:
    {{- .Values.ingress.labels | toYaml | nindent 4 }}
  {{- end }}
  {{- if .Values.ingress.annotations }}
  annotations:
    {{- .Values.ingress.annotations | toYaml | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- range . }}
    - secretName: {{ .secretName }}
      hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- /*
            Blocked prefixes come FIRST and route to the no-endpoints blackhole
            Service (see templates/blackhole-service.yaml). With `pathType: Prefix`
            longest-prefix wins on conformant controllers, so `/api/internal` beats
            the app's catch-all `/` regardless of ordering — but we emit them first
            anyway for controllers (e.g. nginx) that also honour list order.
            See ingress.blockedPaths in values.yaml for the WHY.
          */}}
          {{- range $.Values.ingress.blockedPaths }}
          - path: {{ . }}
            pathType: Prefix
            backend:
              service:
                name: {{ $.Release.Name }}-blackhole
                port:
                  number: 80
          {{- end }}
          {{- range .http.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              {{- if .backend }}
              {{- toYaml .backend | nindent 14 }}
              {{- else }}
              service:
                name: {{ $.Release.Name }}-app
                port:
                  number: {{ $.Values.app.service.port | default 5560 }}
              {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
