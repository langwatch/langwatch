{{/*
  Pre-upgrade preflight: verifies every Secret key the app + gateway
  pods mount already exists in the namespace before pods roll. Catches
  the postmortem trap (2026-05-21) where a chart bump added a required
  key (virtualKeyPepper / LW_GATEWAY_*) and the new pods crashlooped at
  boot with an opaque CreateContainerConfigError.

  Scope: only checks keys on externally-managed Secrets — when autogen
  materialises a Secret, the chart's own template owns the lifecycle
  and there is nothing to verify ahead of time. When the operator
  points the chart at an out-of-band Secret (the production path),
  this hook is the difference between "upgrade aborts in 5s with a
  clear list of missing keys" and "pods crashloop for an hour while
  on-call paginates kubectl logs".

  Helm hook contract: pre-upgrade only (no pre-install — on a fresh
  install the autogen template materialises Secrets in the same
  release, and operators providing their own Secret out-of-band have
  to create it before `helm install` runs anyway). hook-delete-policy
  keeps failed runs around for post-mortem; succeeded runs get cleaned
  up automatically.
*/}}
{{- if .Values.preflight.enabled }}
{{- $appSecretFromExisting := .Values.secrets.existingSecret | default "" }}
{{- $appSecretFromAutogen := "" }}
{{- if .Values.autogen.enabled }}
{{-   $appSecretFromAutogen = .Values.autogen.secretNames.app | default (printf "%s-app-secrets" .Release.Name) }}
{{- end }}
{{/* Only verify when the operator brought their own Secret. Autogen is chart-managed and not subject to pre-existence. */}}
{{- $appCheckSecret := $appSecretFromExisting }}
{{- $gw := .Values.gateway | default dict }}
{{- $gwSecrets := $gw.secrets | default dict }}
{{- $gwCheckSecret := "" }}
{{- if and $gw.chartManaged (not .Values.autogen.enabled) }}
{{-   $gwCheckSecret = $gwSecrets.existingSecretName | default "" }}
{{- end }}
{{- if or $appCheckSecret $gwCheckSecret }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-preflight
  labels:
    {{- include "langwatch.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-preflight
  labels:
    {{- include "langwatch.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-preflight
  labels:
    {{- include "langwatch.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-preflight
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-preflight
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-preflight-secrets
  labels:
    {{- include "langwatch.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 0
  activeDeadlineSeconds: {{ .Values.preflight.activeDeadlineSeconds | default 60 }}
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "langwatch.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Release.Name }}-preflight

      {{/* Inherit chart-wide pod security + scheduling defaults so PSP /
           Pod Security Admission strict clusters don't reject the hook,
           and so node taints / dedicated node pools defined globally
           still apply. Follows the same coalesce pattern langwatch_nlp,
           app, and workers templates use. */}}
      {{- with (coalesce .Values.preflight.podSecurityContext .Values.global.podSecurityContext) }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (coalesce .Values.preflight.nodeSelector .Values.global.scheduling.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (coalesce .Values.preflight.tolerations .Values.global.scheduling.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (coalesce .Values.preflight.affinity .Values.global.scheduling.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: preflight
          image: {{ .Values.preflight.image }}
          imagePullPolicy: {{ .Values.preflight.imagePullPolicy }}
          {{- with (coalesce .Values.preflight.containerSecurityContext .Values.global.containerSecurityContext) }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -u
              ns={{ .Release.Namespace | quote }}
              missing=""
              {{/* JSONPath bracket-quote form: works for keys with `.` or
                   `-`; the dot-notation `{.data.$key}` form breaks on any
                   key shaped like `db.password` because the parser splits
                   on `.` before substitution. */}}
              check_key() {
                secret="$1"; key="$2"
                v=$(kubectl -n "$ns" get secret "$secret" -o "jsonpath={.data['$key']}" 2>/dev/null || true)
                if [ -z "$v" ]; then
                  missing="$(printf '%s\n  - %s / %s' "$missing" "$secret" "$key")"
                fi
              }
              {{- if $appCheckSecret }}
              for k in {{ .Values.secrets.secretKeys.credentialsEncryptionKey | default "credentialsEncryptionKey" }} \
                       {{ .Values.secrets.secretKeys.cronApiKey | default "cronApiKey" }} \
                       {{ .Values.secrets.secretKeys.nextAuthSecret | default "nextAuthSecret" }} \
                       {{ .Values.secrets.secretKeys.virtualKeyPepper | default "virtualKeyPepper" }}; do
                check_key {{ $appCheckSecret | quote }} "$k"
              done
              {{- end }}
              {{- if $gwCheckSecret }}
              check_key {{ $gwCheckSecret | quote }} {{ $gwSecrets.internalSecretKey | default "LW_GATEWAY_INTERNAL_SECRET" | quote }}
              check_key {{ $gwCheckSecret | quote }} {{ $gwSecrets.jwtSecretKey | default "LW_GATEWAY_JWT_SECRET" | quote }}
              {{- end }}
              if [ -n "$missing" ]; then
                printf 'preflight: required Secret keys missing in namespace %s:%s\n\n' "$ns" "$missing" >&2
                printf 'Each missing key blocks the upgrade. Either add it to the existing Secret or\n' >&2
                printf 'switch to chart-managed via autogen.enabled=true. See NOTES.txt section 6 for\n' >&2
                printf 'the kubectl create / annotate commands.\n' >&2
                exit 1
              fi
              printf 'preflight: all required Secret keys present in namespace %s\n' "$ns"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
{{- end }}
{{- end }}
