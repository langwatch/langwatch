{{/*
  Pre-upgrade preflight: verifies every Secret key the app + gateway
  pods mount already exists in the namespace before pods roll. Catches
  the postmortem trap (2026-05-21) where a chart bump added a required
  key (virtualKeyPepper / LW_GATEWAY_*) and the new pods crashlooped at
  boot with an opaque CreateContainerConfigError.

  Scope: only checks keys on externally-managed Secrets — when the
  chart's own template owns a Secret's lifecycle there is nothing to
  verify ahead of time. Two cases own lifecycle today:

    - The app-secrets autogen template (charts/langwatch/templates/app/
      secrets.yaml) when autogen.enabled is true.
    - The gateway-auth template (gateway-auth-secret.yaml) whenever
      gateway.chartManaged is true. That template always materialises
      via lookup-or-rand, matching the clickhouse / redis / pg pattern,
      so on first install the Secret is created in the same upgrade and
      on subsequent upgrades the existing values are reused via lookup.
      Either way there is nothing for the preflight to verify ahead of
      time; checking would fail the upgrade before the materialiser
      runs and tell the operator to do something the chart is about
      to do for them.

  When the operator points the chart at an out-of-band Secret (the
  production path), this hook is the difference between "upgrade aborts
  in 5s with a clear list of missing keys" and "pods crashloop for an
  hour while on-call paginates kubectl logs".

  Helm hook contract: pre-install + pre-upgrade. pre-install catches
  a fresh-install operator who forgot to seed `secrets.existingSecret`
  / `gateway.secrets.existingSecretName` keys before `helm install`;
  pre-upgrade catches operator-key drift introduced by subsequent
  chart bumps that add a new required key. With autogen.enabled=true
  the autogen template materialises both Secrets in the same release
  so $appCheckSecret + $gwCheckSecret are both empty and this Job
  does not render. hook-delete-policy keeps failed runs around for
  post-mortem; succeeded runs get cleaned up automatically.
*/}}
{{- if .Values.preflight.enabled }}
{{- $appSecretFromExisting := .Values.secrets.existingSecret | default "" }}
{{- $appSecretFromAutogen := "" }}
{{- if .Values.autogen.enabled }}
{{-   $appSecretFromAutogen = .Values.autogen.secretNames.app | default (printf "%s-app-secrets" .Release.Name) }}
{{- end }}
{{/* Only verify when the operator brought their own Secret. With
     autogen.enabled=true the chart materialises the Secrets in the
     same release and there is nothing to validate ahead of time. */}}
{{- $appCheckSecret := $appSecretFromExisting }}

{{/* Gateway-auth: same shape as app-secrets. The gateway-auth
     template renders only when autogen.enabled=true, so when
     chartManaged=true and autogen is off the operator owns the
     Secret out-of-band and the preflight has to confirm both
     LW_GATEWAY_INTERNAL_SECRET and LW_GATEWAY_JWT_SECRET keys are
     present before pods roll. The chart-time validateSecrets helper
     already hard-fails if neither autogen.enabled nor
     gateway.secrets.existingSecretName is set, so by the time we get
     here we either have a Secret name or autogen will materialise. */}}
{{- $gw := .Values.gateway | default dict }}
{{- $gwSecrets := $gw.secrets | default dict }}
{{- $gwInternalKey := default "LW_GATEWAY_INTERNAL_SECRET" $gwSecrets.internalSecretKey }}
{{- $gwJwtKey := default "LW_GATEWAY_JWT_SECRET" $gwSecrets.jwtSecretKey }}
{{- $gwCheckSecret := "" }}
{{- if and $gw.chartManaged (not .Values.autogen.enabled) }}
{{-   $gwCheckSecret = $gwSecrets.existingSecretName | default "" }}
{{- end }}

{{- if or $appCheckSecret $gwCheckSecret }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-preflight
  labels:
    {{- include "langwatch.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-preflight
  labels:
    {{- include "langwatch.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-preflight
  labels:
    {{- include "langwatch.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-preflight
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-preflight
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-preflight-secrets
  labels:
    {{- include "langwatch.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 0
  activeDeadlineSeconds: {{ .Values.preflight.activeDeadlineSeconds | default 60 }}
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "langwatch.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Release.Name }}-preflight

      {{/* Inherit chart-wide pod security + scheduling defaults so PSP /
           Pod Security Admission strict clusters don't reject the hook,
           and so node taints / dedicated node pools defined globally
           still apply. Follows the same coalesce pattern langwatch_nlp,
           app, and workers templates use. */}}
      {{- with (coalesce .Values.preflight.podSecurityContext .Values.global.podSecurityContext) }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (coalesce .Values.preflight.nodeSelector .Values.global.scheduling.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (coalesce .Values.preflight.tolerations .Values.global.scheduling.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (coalesce .Values.preflight.affinity .Values.global.scheduling.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: preflight
          image: {{ .Values.preflight.image }}
          imagePullPolicy: {{ .Values.preflight.imagePullPolicy }}
          {{- with (coalesce .Values.preflight.containerSecurityContext .Values.global.containerSecurityContext) }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -u
              ns={{ .Release.Namespace | quote }}
              missing=""
              {{/* One kubectl call per Secret, then check every required
                   key against the local JSON via jq. alpine/k8s ships jq.
                   Two kubectl calls total (app + gateway) instead of one
                   per key, which gives the 60s activeDeadlineSeconds far
                   more headroom on slow API servers. */}}
              check_secret() {
                secret="$1"; shift
                json=$(kubectl -n "$ns" get secret "$secret" -o json 2>/dev/null || printf '{}')
                for key in "$@"; do
                  v=$(printf '%s' "$json" | jq -r --arg k "$key" '.data[$k] // empty')
                  if [ -z "$v" ]; then
                    missing="$(printf '%s\n  - %s / %s' "$missing" "$secret" "$key")"
                  fi
                done
              }
              {{/* Iterate .Values.secrets.secretKeys so adding a new
                   required key (in values.yaml + deployment + NOTES)
                   propagates here automatically. */}}
              {{- if $appCheckSecret }}
              check_secret {{ $appCheckSecret | quote }}{{- range $name, $value := .Values.secrets.secretKeys }} {{ $value | quote }}{{- end }}
              {{- end }}
              {{- if $gwCheckSecret }}
              check_secret {{ $gwCheckSecret | quote }} {{ $gwInternalKey | quote }} {{ $gwJwtKey | quote }}
              {{- end }}
              if [ -n "$missing" ]; then
                printf 'preflight: required Secret keys missing in namespace %s:%s\n\n' "$ns" "$missing" >&2
                printf 'Each missing key blocks the upgrade. Either add it to the existing Secret\n' >&2
                printf 'or switch to chart-managed via autogen.enabled=true (chart materialises\n' >&2
                printf 'both app-secrets and gateway-auth on first install). See NOTES.txt\n' >&2
                printf 'section 6 for the kubectl create / annotate commands.\n' >&2
                exit 1
              fi
              printf 'preflight: all required Secret keys present in namespace %s\n' "$ns"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
{{- end }}
{{- end }}
