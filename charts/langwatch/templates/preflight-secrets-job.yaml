{{/*
  Pre-upgrade preflight: verifies every Secret key the app + gateway
  pods mount already exists in the namespace before pods roll. Catches
  the postmortem trap (2026-05-21) where a chart bump added a required
  key (virtualKeyPepper / LW_GATEWAY_*) and the new pods crashlooped at
  boot with an opaque CreateContainerConfigError.

  Scope: only checks keys on the operator-managed app Secret. When
  autogen.enabled=true the app/secrets.yaml template materialises the
  Secret in the same release (per-key lookup-or-rand for new-key
  healing) and there is nothing to verify ahead of time. When the
  operator points the chart at an out-of-band Secret (the production
  path), this hook is the difference between "install aborts in 5s
  with a clear list of missing keys" and "pods crashloop for an hour
  while on-call paginates kubectl logs".

  Helm hook contract: pre-install + pre-upgrade. pre-install catches
  a fresh-install operator who forgot to seed `secrets.existingSecret`
  keys before `helm install`; pre-upgrade catches operator-key drift
  introduced by subsequent chart bumps that add a new required key.
  hook-delete-policy keeps failed runs around for post-mortem;
  succeeded runs get cleaned up automatically.
*/}}
{{- if .Values.preflight.enabled }}
{{/* this release collapsed gateway-auth into the umbrella's app Secret. One
     Secret holds every chart-materialised key + the AI gateway shared-
     auth keys when chartManaged=true. So this preflight has one Secret
     to check (the app Secret) and the key list extends to include
     LW_GATEWAY_* when chartManaged is on. With autogen.enabled=true
     the chart materialises the Secret in the same release and the
     preflight is a no-op (it would fail before the materialiser runs
     and tell the operator to do something the chart is about to do
     for them). */}}
{{- $appCheckSecret := .Values.secrets.existingSecret | default "" }}
{{- $gw := .Values.gateway | default dict }}
{{- $checkGatewayKeys := and $gw.chartManaged (not .Values.autogen.enabled) }}

{{- if $appCheckSecret }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-preflight
  labels:
    {{- include "langwatch.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-preflight
  labels:
    {{- include "langwatch.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-preflight
  labels:
    {{- include "langwatch.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-preflight
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-preflight
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-preflight-secrets
  labels:
    {{- include "langwatch.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 0
  activeDeadlineSeconds: {{ .Values.preflight.activeDeadlineSeconds | default 60 }}
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "langwatch.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Release.Name }}-preflight

      {{/* Inherit chart-wide pod security + scheduling defaults so PSP /
           Pod Security Admission strict clusters don't reject the hook,
           and so node taints / dedicated node pools defined globally
           still apply. Follows the same coalesce pattern langwatch_nlp,
           app, and workers templates use. */}}
      {{- with (coalesce .Values.preflight.podSecurityContext .Values.global.podSecurityContext) }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (coalesce .Values.preflight.nodeSelector .Values.global.scheduling.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (coalesce .Values.preflight.tolerations .Values.global.scheduling.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (coalesce .Values.preflight.affinity .Values.global.scheduling.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: preflight
          image: {{ .Values.preflight.image }}
          imagePullPolicy: {{ .Values.preflight.imagePullPolicy }}
          {{- with (coalesce .Values.preflight.containerSecurityContext .Values.global.containerSecurityContext) }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -u
              ns={{ .Release.Namespace | quote }}
              missing=""
              {{/* One kubectl call, check every required key against the
                   local JSON via jq. alpine/k8s ships jq. Single Secret
                   since this release collapsed gateway-auth into the app Secret. */}}
              check_secret() {
                secret="$1"; shift
                json=$(kubectl -n "$ns" get secret "$secret" -o json 2>/dev/null || printf '{}')
                for key in "$@"; do
                  v=$(printf '%s' "$json" | jq -r --arg k "$key" '.data[$k] // empty')
                  if [ -z "$v" ]; then
                    missing="$(printf '%s\n  - %s / %s' "$missing" "$secret" "$key")"
                  fi
                done
              }
              {{/* Iterate .Values.secrets.secretKeys so adding a new
                   required key (in values.yaml + deployment + NOTES)
                   propagates here automatically. Extend with the AI
                   gateway shared-auth keys when chartManaged=true. */}}
              check_secret {{ $appCheckSecret | quote }}{{- range $name, $value := .Values.secrets.secretKeys }} {{ $value | quote }}{{- end }}{{- if $checkGatewayKeys }} "LW_GATEWAY_INTERNAL_SECRET" "LW_GATEWAY_JWT_SECRET"{{- end }}
              if [ -n "$missing" ]; then
                printf 'preflight: required Secret keys missing in namespace %s:%s\n\n' "$ns" "$missing" >&2
                printf 'Each missing key blocks the upgrade. Either add it to the existing Secret\n' >&2
                printf 'or switch to chart-managed via autogen.enabled=true (chart materialises\n' >&2
                printf 'both app-secrets and gateway-auth on first install). See NOTES.txt\n' >&2
                printf 'section 7 for the kubectl create / annotate commands.\n' >&2
                exit 1
              fi
              printf 'preflight: all required Secret keys present in namespace %s\n' "$ns"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
{{- end }}
{{- end }}
