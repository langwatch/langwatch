# Deployment for the LangWatch Evaluations service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-langevals
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-langevals
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "langwatch.labels" . | nindent 4 }}
    {{- with .Values.langevals.deployment.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.langevals.deployment.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.langevals.replicaCount }}
  {{- if .Values.langevals.deployment.strategy }}
  strategy: 
    {{- toYaml .Values.langevals.deployment.strategy | nindent 8 }}
  {{- end }}
  {{- if hasKey (default (dict) .Values.langevals.deployment) "revisionHistoryLimit" }}
  revisionHistoryLimit: {{ .Values.langevals.deployment.revisionHistoryLimit }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}-langevals
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}-langevals
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- if .Values.langevals.pod.labels }}
        {{- toYaml .Values.langevals.pod.labels | nindent 8 }}
        {{- end }}
      annotations:
        {{- with (coalesce .Values.langevals.pod.annotations .Values.global.podAnnotations) }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      # Pod security context - https://kubespec.dev/v1/Pod#spec.securityContext
      {{- with (coalesce .Values.langevals.podSecurityContext .Values.global.podSecurityContext)}}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # Node selection - https://kubespec.dev/v1/Pod#spec.nodeSelector
      {{- with (coalesce .Values.langevals.nodeSelector .Values.global.scheduling.nodeSelector)}}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # Tolerations - https://kubespec.dev/v1/Pod#spec.tolerations
      {{- with (coalesce .Values.langevals.tolerations .Values.global.scheduling.tolerations)}}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # Affinity - https://kubespec.dev/v1/Pod#spec.affinity
      {{- with (coalesce .Values.langevals.affinity .Values.global.scheduling.affinity)}}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # Topology spread constraints - https://kubespec.dev/v1/Pod#spec.topologySpreadConstraints
      {{- with (coalesce .Values.langevals.topologySpreadConstraints .Values.global.scheduling.topologySpreadConstraints)}}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      initContainers:
        {{- with .Values.langevals.extraInitContainers}}
        {{- toYaml . | nindent 8 }}
        {{- end }}

      containers:
        {{- with .Values.langevals.extraContainers}}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        - name: {{ .Release.Name }}-langevals
          securityContext:
            {{- toYaml (coalesce .Values.langevals.containerSecurityContext .Values.global.containerSecurityContext) | nindent 12 }}
          image: "{{ .Values.images.langevals.repository }}:{{ .Values.images.langevals.tag }}"
          imagePullPolicy: {{ .Values.images.langevals.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.langevals.service.port }}
              protocol: TCP

          # Environment variables for the LangEvals service
          env:
            {{- with .Values.langevals.extraEnvs}}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          {{- if .Values.langevals.extraLifecycle}}
          lifecycle:
            {{- with .Values.langevals.extraLifecycle}}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.langevals.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /healthcheck
              port: http
            failureThreshold: 18
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            {{- with .Values.langevals.extraVolumeMounts}}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            - name: tmp-dir
              mountPath: /tmp
            - name: cache-dir
              mountPath: /.cache
      volumes:
      {{- with .Values.langevals.extraVolumes}}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        - name: tmp-dir
          emptyDir: {}
        - name: cache-dir
          emptyDir: {}
