{{- if .Values.redis.chartManaged }}
{{- if .Values.redis.auth.enabled }}
{{- if not .Values.redis.auth.existingSecret }}
{{- $secretName := printf "%s-redis" .Release.Name }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "langwatch.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
type: Opaque
data:
  {{- if $existingSecret }}
  redis-password: {{ index $existingSecret.data "redis-password" }}
  {{- else if .Values.redis.auth.password }}
  redis-password: {{ .Values.redis.auth.password | b64enc | quote }}
  {{- else }}
  redis-password: {{ randAlphaNum 24 | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
