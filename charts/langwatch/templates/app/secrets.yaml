{{- include "langwatch.validateSecrets" . }}
{{- if not .Values.secrets.existingSecret }}
{{- if .Values.autogen.enabled }}
{{- $secretName := include "langwatch.appSecretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $existingData := dict }}
{{- if and $existing $existing.data }}
{{-   $existingData = $existing.data }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "langwatch.labels" . | nindent 4 }}
type: Opaque
{{/*
  Per-key lookup-or-(value|rand) so a chart bump that adds a new
  required key (e.g. virtualKeyPepper in 3.3.0, LW_GATEWAY_* in the current release)
  heals an existing Secret in place: keys already present keep their
  current value, new keys generate. This matches the pattern the
  ClickHouse / PostgreSQL / Redis subcharts use and avoids the
  upgrade-time "pods crashloop because the existing Secret is missing
  the new key" trap.

  AI gateway shared-auth keys (LW_GATEWAY_INTERNAL_SECRET +
  LW_GATEWAY_JWT_SECRET) live alongside the app-only keys when
  gateway.chartManaged=true. Both langwatch-app and the gateway pod
  mount this Secret — one Secret to pre-create, one preflight check,
  one resource policy. The older split (separate langwatch-gateway-auth
  Secret) was collapsed in this release because there was no operational
  reason to keep them apart.
*/}}
data:
  {{- if .Values.app.credentialsEncryptionKey.value }}
  credentialsEncryptionKey: {{ default (.Values.app.credentialsEncryptionKey.value | b64enc) (index $existingData "credentialsEncryptionKey") | quote }}
  {{- else }}
  credentialsEncryptionKey: {{ default (include "langwatch.autogenSecretValue" .) (index $existingData "credentialsEncryptionKey") | quote }}
  {{- end }}
  {{- if .Values.app.cronApiKey.value }}
  cronApiKey: {{ default (.Values.app.cronApiKey.value | b64enc) (index $existingData "cronApiKey") | quote }}
  {{- else }}
  cronApiKey: {{ default (include "langwatch.autogenSecretValue" .) (index $existingData "cronApiKey") | quote }}
  {{- end }}
  {{- if .Values.app.nextAuth.secret.value }}
  nextAuthSecret: {{ default (.Values.app.nextAuth.secret.value | b64enc) (index $existingData "nextAuthSecret") | quote }}
  {{- else }}
  nextAuthSecret: {{ default (include "langwatch.autogenSecretValue" .) (index $existingData "nextAuthSecret") | quote }}
  {{- end }}
  {{- if .Values.app.virtualKeyPepper.value }}
  virtualKeyPepper: {{ default (.Values.app.virtualKeyPepper.value | b64enc) (index $existingData "virtualKeyPepper") | quote }}
  {{- else }}
  virtualKeyPepper: {{ default (include "langwatch.autogenSecretValue" .) (index $existingData "virtualKeyPepper") | quote }}
  {{- end }}
  {{- if (.Values.gateway).chartManaged }}
  LW_GATEWAY_INTERNAL_SECRET: {{ default (include "langwatch.autogenSecretValue" .) (index $existingData "LW_GATEWAY_INTERNAL_SECRET") | quote }}
  LW_GATEWAY_JWT_SECRET: {{ default (include "langwatch.autogenSecretValue" .) (index $existingData "LW_GATEWAY_JWT_SECRET") | quote }}
  {{- end }}
{{- end }}
{{- end }}
