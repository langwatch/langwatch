# Alert rules shipped with the chart (ADR-054). Loaded by the bundled
# Prometheus via rule_files (templates/prometheus.yaml); disable wholesale
# with prometheus.alerting.enabled=false. Routing to receivers is the
# operator's concern — these rules define what is wrong, not who hears it.
#
# Metric sources: langwatch/src/server/metrics.ts (es_*, topic_clustering_*)
# and src/server/event-sourcing/queues/groupQueue/metrics.ts (gq_*).
groups:
  - name: langwatch-process-substrate
    rules:
      - alert: EsProcessOutboxDeadLetter
        expr: sum by (process_name, intent_type) (increase(es_process_outbox_total{status="dead"}[15m])) > 0
        labels:
          severity: critical
        annotations:
          summary: "Process intent dead-lettered ({{ $labels.process_name }}/{{ $labels.intent_type }})"
          description: >-
            An outbox intent exhausted its delivery attempts and was retired
            dead. The work it carried will not happen until an operator
            replays it; for scheduled domains the process self-heals on its
            next wake, but the failed work itself is lost. Check the
            langwatch:event-sourcing:process-outbox logs for the error.

      - alert: EsProcessEvolutionFailures
        expr: sum by (process_name) (rate(es_process_manager_total{outcome="failed"}[10m])) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Process evolutions failing ({{ $labels.process_name }})"
          description: >-
            evolve() has been throwing for 15 minutes straight. Events are
            being redelivered and will pile up in the group queue; a
            poison event fails forever. Check
            langwatch:event-sourcing:process-manager logs for the event type
            and error.

      - alert: EsProcessWakeLagHigh
        expr: >-
          histogram_quantile(0.5,
            sum by (le, process_name)
            (rate(es_process_wake_lag_milliseconds_bucket[30m]))) > 900000
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Process wakes firing late ({{ $labels.process_name }})"
          description: >-
            The median wake for this process has been handled more than 15
            minutes after its scheduled instant, sustained for half an hour.
            One late wake after a deploy or recovery is normal; sustained lag
            means the wake worker is starved, the store query is slow, or
            worker replicas are down. Scheduled work (e.g. daily topic
            clustering) drifts accordingly.

      - alert: EsProcessOutboxDispatchLagHigh
        expr: >-
          histogram_quantile(0.5,
            sum by (le, process_name)
            (rate(es_process_outbox_dispatch_lag_milliseconds_bucket[30m]))) > 300000
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Outbox draining slowly ({{ $labels.process_name }})"
          description: >-
            Committed intents have been waiting more than 5 minutes (median)
            for their first dispatch, sustained for half an hour. The
            dispatcher is saturated or down; leases and stale-run windows are
            sized for prompt dispatch, so sustained lag risks work being
            abandoned as stale.

      - alert: EsProcessIntentsSuppressedSustained
        expr: sum by (process_name) (increase(es_process_intents_suppressed_total[1h])) > 10
        labels:
          severity: warning
        annotations:
          summary: "Intents repeatedly suppressed as duplicates ({{ $labels.process_name }})"
          description: >-
            Commits keep dropping intents because their messageKey was
            already dispatched. Occasional suppression is redelivery
            idempotency working; a sustained rate is the signature of a
            scheduling identity bug — state advances while no work is
            enqueued (this is exactly how a day of topic clustering was
            silently lost pre-release). Compare suppressed keys in the
            process-manager warn logs.

      - alert: GqGroupsPoisonParked
        expr: sum by (queue) (increase(gq_groups_poison_parked_total[15m])) > 0
        labels:
          severity: critical
        annotations:
          summary: "Group queue parked a poison group ({{ $labels.queue }})"
          description: >-
            A group exhausted retries and was parked; its tenant's events in
            that group stopped flowing until it is unparked. Investigate the
            failing job before unparking.

  - name: langwatch-topic-clustering
    rules:
      - alert: TopicClusteringRunFailedFinal
        expr: increase(topic_clustering_page_total{outcome="failed_final"}[1h]) > 0
        labels:
          severity: warning
        annotations:
          summary: "Topic clustering run failed after all retries"
          description: >-
            A clustering page exhausted its attempts and recorded run_failed.
            The affected project's schedule self-heals at its next daily
            wake, and user-actionable causes (missing model, bad credentials)
            surface in that project's settings — but repeated final failures
            mean a systemic problem (langevals down, provider outage).

      - alert: TopicClusteringNothingCompleting
        expr: >-
          sum(increase(topic_clustering_page_total{outcome="completed"}[24h])) == 0
          and
          sum(increase(topic_clustering_page_total{outcome="failed_final"}[24h])) > 3
        labels:
          severity: critical
        annotations:
          summary: "Topic clustering is failing fleet-wide"
          description: >-
            Multiple final failures and not a single completed page in 24
            hours — clustering is effectively down across the fleet, not for
            one misconfigured project. Check langevals availability and the
            outbox dead-letter alert.
