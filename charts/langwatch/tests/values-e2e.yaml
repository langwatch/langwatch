# values-e2e.yaml — CI e2e test values for the langwatch Helm chart.
#
# Skips private-registry images (app, workers, nlp, langevals) so the test
# can run without Docker Hub credentials.  Focuses on validating the
# infrastructure tier: ClickHouse, PostgreSQL, Redis, and chart wiring.
#
# Usage: helm install lw-test . -f tests/values-e2e.yaml -n lw-test --create-namespace

autogen:
  enabled: true

images:
  app:
    pullPolicy: Never

# ── Gateway: use locally-built image (kind-load'd by workflow), since ghcr's
# ── ai-gateway image is published only on release-please tags. ────────────────
gateway:
  image:
    repository: langwatch/ai-gateway
    tag: e2e
    pullPolicy: Never
  # autoscaling.customMetrics requires a metrics-adapter that isn't in the
  # CI kind cluster — drop to a single replica with HPA off so install can
  # converge on the test cluster.
  replicaCount: 1
  autoscaling:
    enabled: false
  # Kind cluster has no ingress controller; chart-default Ingress would
  # reference a non-existent IngressClass.
  ingress:
    enabled: false

# ── services that require private images — set to 0 replicas ─────────────────
app:
  replicaCount: 0
  # No app pod = no PVC consumer. WaitForFirstConsumer leaves the PVC
  # unbound and helm --wait times out. Disable the local-FS PVC in e2e —
  # the infra tier is what's being validated here.
  storedObjects:
    localFilesystem:
      enabled: false
  features:
    skipEnvValidation: true

workers:
  # e2e.sh asserts the workers Deployment is absent when enabled=false
  # (validates the gate added in c74fb13a3).
  enabled: false

# ── Dataset PG→S3 migration hook (ADR-032) — needs the private app image ──────
# It's a BLOCKING post-install hook, so unlike the 0-replica app/workers/nlp
# Deployments (which helm doesn't --wait on), a failed hook fails the whole
# release. The app image is never loaded into this infra-only cluster, so the
# hook would ErrImageNeverPull under pullPolicy: Never. Disable it here.
datasetS3Migration:
  enabled: false

langwatch_nlp:
  replicaCount: 0

langevals:
  replicaCount: 0

# ── ClickHouse (chart-managed, known password for testing) ───────────────────
clickhouse:
  chartManaged: true
  image:
    # Workflow builds the local clickhouse-serverless image as `:next`;
    # chart default `:0.2.0` would ErrImageNeverPull under pullPolicy: Never.
    tag: "next"
    pullPolicy: Never
  replicas: 1
  memory: 2Gi
  cpu: 1
  storage:
    size: 1Gi
  auth:
    password: "e2etest"

# ── PostgreSQL ─────────────────────────────────────────────────────────────────
postgresql:
  chartManaged: true
  auth:
    password: "e2etest"
    database: "langwatch"
  primary:
    persistence:
      size: 1Gi
    resources:
      requests: { cpu: 50m, memory: 128Mi }
      limits: { cpu: 250m, memory: 256Mi }

# ── Redis (no auth — simpler for testing) ────────────────────────────────────
redis:
  chartManaged: true
  auth:
    enabled: false
  master:
    persistence:
      size: 1Gi
    resources:
      requests: { cpu: 25m, memory: 32Mi }
      limits: { cpu: 100m, memory: 128Mi }

# ── Prometheus (disabled — not needed for infra testing) ───────────���─────────
prometheus:
  chartManaged: false

cronjobs:
  enabled: false
