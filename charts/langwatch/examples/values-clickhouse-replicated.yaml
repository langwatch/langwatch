# values-clickhouse-replicated.yaml — Overlay: 3-node replicated ClickHouse.
# Stack with any base: ./helm-safe.sh install lw . -f examples/values-local.yaml -f examples/values-clickhouse-replicated.yaml
clickhouse:
  chartManaged: true
  replicas: 3
  memory: 4Gi
  cpu: 2
  storage:
    size: 20Gi
