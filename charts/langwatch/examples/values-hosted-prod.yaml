# values-hosted-prod.yaml — Production on cloud Kubernetes.
#
# Same as:  -f overlays/size-prod.yaml -f overlays/access-ingress.yaml
#           -f overlays/postgres-external.yaml -f overlays/redis-external.yaml
#           + secrets configuration below
#
# Prerequisites — create secrets first:
#   kubectl create secret generic langwatch-secrets -n langwatch \
#     --from-literal=credentialsEncryptionKey=$(openssl rand -hex 32) \
#     --from-literal=cronApiKey=$(openssl rand -hex 16) \
#     --from-literal=nextAuthSecret=$(openssl rand -hex 16)
#
# Usage:
#   helm install langwatch . -f examples/values-hosted-prod.yaml -n langwatch --create-namespace

# --- Secrets (no autogen in production) ---
autogen: { enabled: false }
secrets:
  existingSecret: "langwatch-secrets"

# --- overlays/size-prod.yaml ---
app:
  replicaCount: 2
  resources:
    requests: { cpu: 500m, memory: 2Gi }
    limits:   { cpu: 2, memory: 4Gi }
  podDisruptionBudget: { minAvailable: 1 }
  http:
    baseHost: "https://langwatch.example.com"
    publicUrl: "https://langwatch.example.com"

workers:
  enabled: true
  replicaCount: 2
  resources:
    requests: { cpu: 500m, memory: 2Gi }
    limits:   { cpu: 2, memory: 4Gi }

langwatch_nlp:
  replicaCount: 1
  resources:
    requests: { cpu: 1, memory: 2Gi }
    limits:   { cpu: 2, memory: 4Gi }

langevals:
  replicaCount: 1
  resources:
    requests: { cpu: 1, memory: 4Gi }
    limits:   { cpu: 2, memory: 8Gi }

ingress:
  enabled: true
  className: "nginx"
  tls:
    - secretName: langwatch-tls
      hosts: [langwatch.example.com]
  hosts:
    - host: langwatch.example.com
      http:
        paths:
          - { path: /, pathType: Prefix }

# --- ClickHouse (chart-managed, single node) ---
clickhouse:
  chartManaged: true
  replicas: 1
  memory: 8Gi
  cpu: 4
  storage: { size: 100Gi }
  auth:
    existingSecret: "clickhouse-password"
    secretKeys: { passwordKey: "password" }

# --- overlays/postgres-external.yaml ---
postgresql:
  chartManaged: false
  external:
    connectionString:
      secretKeyRef: { name: "langwatch-db", key: "connectionString" }

# --- overlays/redis-external.yaml ---
redis:
  chartManaged: false
  external:
    architecture: standalone
    connectionString:
      secretKeyRef: { name: "langwatch-redis", key: "connectionString" }

prometheus:
  chartManaged: true
  server:
    retention: 30d
    persistentVolume: { size: 20Gi }

cronjobs: { enabled: true }
