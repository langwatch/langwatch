# values-dev.yaml — Local minikube, everything chart-managed, minimal resources.
# namespace: langwatch-dev
# Usage: ./examples/helm-safe.sh install lw . -f examples/values-dev.yaml
autogen:
  enabled: true

app:
  replicaCount: 1
  http:
    baseHost: "http://localhost:5560"
    publicUrl: "http://localhost:5560"
  resources:
    requests: { cpu: 100m, memory: 512Mi }
    limits:   { cpu: 500m, memory: 1Gi }

workers:
  enabled: true
  replicaCount: 1
  resources:
    requests: { cpu: 100m, memory: 512Mi }
    limits:   { cpu: 500m, memory: 1Gi }

langwatch_nlp:
  replicaCount: 1
  resources:
    requests: { cpu: 100m, memory: 512Mi }
    limits:   { cpu: 500m, memory: 1Gi }

langevals:
  replicaCount: 1
  resources:
    requests: { cpu: 100m, memory: 512Mi }
    limits:   { cpu: 500m, memory: 1Gi }

clickhouse:
  chartManaged: true
  managed:
    replicas: 1
    memory: 1Gi
    cpu: 1
    storage:
      size: 5Gi

postgresql:
  chartManaged: true
  auth:
    password: ""  # Bitnami subchart auto-generates when empty
    database: "langwatch"
  primary:
    persistence:
      size: 2Gi
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 500m, memory: 512Mi }

redis:
  chartManaged: true
  auth:
    password: ""  # Bitnami subchart auto-generates when empty
  master:
    persistence:
      size: 1Gi
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits:   { cpu: 250m, memory: 256Mi }

prometheus:
  chartManaged: true
  server:
    retention: 7d
    persistentVolume:
      size: 2Gi
    resources:
      requests: { cpu: 50m, memory: 128Mi }
      limits:   { cpu: 250m, memory: 512Mi }

cronjobs:
  enabled: true
