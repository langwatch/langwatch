# size-minimal.yaml — Absolute minimum resources for CI smoke tests.
#
# Everything runs but with tiny limits. Not suitable for real workloads.
#
# Usage:
#   helm install lw . \
#     -f examples/overlays/size-minimal.yaml \
#     -f examples/overlays/access-nodeport.yaml \
#     --set autogen.enabled=true

app:
  replicaCount: 1
  features:
    skipEnvValidation: true
  resources:
    requests: { cpu: 50m, memory: 256Mi }
    limits:   { cpu: 250m, memory: 512Mi }

workers:
  replicaCount: 1
  resources:
    requests: { cpu: 50m, memory: 256Mi }
    limits:   { cpu: 250m, memory: 512Mi }

langwatch_nlp:
  replicaCount: 1
  resources:
    requests: { cpu: 50m, memory: 256Mi }
    limits:   { cpu: 250m, memory: 512Mi }

langevals:
  replicaCount: 1
  resources:
    requests: { cpu: 50m, memory: 256Mi }
    limits:   { cpu: 250m, memory: 512Mi }
  extraEnvs:
    - { name: DISABLE_EVALUATORS_PRELOAD, value: "true" }
    - { name: WEB_CONCURRENCY, value: "1" }

clickhouse:
  chartManaged: true
  replicas: 1
  memory: 512Mi
  cpu: 1
  storage:
    size: 1Gi

postgresql:
  chartManaged: true
  auth:
    database: "langwatch"
  primary:
    persistence:
      size: 1Gi
    resources:
      requests: { cpu: 50m, memory: 128Mi }
      limits:   { cpu: 250m, memory: 256Mi }

redis:
  chartManaged: true
  master:
    persistence:
      size: 1Gi
    resources:
      requests: { cpu: 25m, memory: 32Mi }
      limits:   { cpu: 100m, memory: 128Mi }

prometheus:
  chartManaged: false

cronjobs:
  enabled: false
