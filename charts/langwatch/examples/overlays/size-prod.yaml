# size-prod.yaml — Production sizing. Single-node ClickHouse.
#
# 2 app replicas, 2 workers, PDBs, chart-managed ClickHouse.
# Combine with an access overlay and optionally external database overlays.
#
# Usage:
#   helm install lw . \
#     -f examples/overlays/size-prod.yaml \
#     -f examples/overlays/access-ingress.yaml

app:
  replicaCount: 2
  # Multi-pod: local-FS is unsafe (pods don't share filesystems). Combine
  # with cold-storage-s3.yaml or set app.dataplane.enabled=true.
  storedObjects:
    localFilesystem:
      enabled: false
  resources:
    requests: { cpu: 500m, memory: 2Gi }
    limits:   { cpu: 2, memory: 4Gi }
  podDisruptionBudget:
    minAvailable: 1

workers:
  enabled: true
  replicaCount: 2
  resources:
    requests: { cpu: 500m, memory: 2Gi }
    limits:   { cpu: 2, memory: 4Gi }

langwatch_nlp:
  replicaCount: 1
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits:   { cpu: 1, memory: 1Gi }

langevals:
  replicaCount: 1
  resources:
    requests: { cpu: 1, memory: 4Gi }
    limits:   { cpu: 2, memory: 8Gi }

clickhouse:
  chartManaged: true
  replicas: 1
  memory: 8Gi
  cpu: 4
  storage:
    size: 100Gi

postgresql:
  chartManaged: true
  auth:
    database: "langwatch"
  primary:
    persistence:
      size: 20Gi

redis:
  chartManaged: true
  master:
    persistence:
      size: 5Gi

prometheus:
  chartManaged: true
  server:
    retention: 30d
    persistentVolume:
      size: 20Gi

cronjobs:
  enabled: true
