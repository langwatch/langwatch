# values-scalable-prod.yaml — HA production with replicated ClickHouse, external PG/Redis.
# namespace: langwatch
# 3-node ClickHouse + Keeper cluster with S3 cold storage.
# Usage: helm install langwatch . -f examples/values-scalable-prod.yaml -n langwatch --create-namespace

autogen:
  enabled: false

secrets:
  existingSecret: "langwatch-secrets"

app:
  replicaCount: 3
  http:
    baseHost: "https://langwatch.example.com"
    publicUrl: "https://langwatch.example.com"
  resources:
    requests: { cpu: 1, memory: 4Gi }
    limits:   { cpu: 2, memory: 4Gi }
  podDisruptionBudget:
    minAvailable: 2

workers:
  enabled: true
  replicaCount: 3
  resources:
    requests: { cpu: 1, memory: 4Gi }
    limits:   { cpu: 2, memory: 4Gi }

langwatch_nlp:
  replicaCount: 2
  resources:
    requests: { cpu: 1, memory: 2Gi }
    limits:   { cpu: 2, memory: 4Gi }

langevals:
  replicaCount: 2
  resources:
    requests: { cpu: 1, memory: 4Gi }
    limits:   { cpu: 2, memory: 8Gi }

# Replicated ClickHouse — 3 nodes + Keeper + S3 cold storage
clickhouse:
  chartManaged: true
  managed:
    replicas: 3
    memory: 16Gi
    cpu: 4
    storage:
      size: 300Gi
      storageClass: "gp3"
    cold:
      enabled: true
      provider: s3
      bucket: "langwatch-clickhouse-cold"
      region: "eu-central-1"
      useEnvironmentCredentials: true  # IRSA
    backup:
      enabled: true
      schedule: "0 */12 * * *"
      retention: 7
  coldStorageEnabled: true
  coldStorageDefaultTtlDays: 30
  auth:
    existingSecret: "clickhouse-password"
  scheduling:
    tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "clickhouse"
        effect: "NoSchedule"

postgresql:
  chartManaged: false
  external:
    connectionString:
      secretKeyRef:
        name: "langwatch-db"
        key: "connectionString"

redis:
  chartManaged: false
  external:
    architecture: standalone
    connectionString:
      secretKeyRef:
        name: "langwatch-redis"
        key: "connectionString"

prometheus:
  chartManaged: true
  server:
    retention: 60d
    persistentVolume:
      size: 50Gi

ingress:
  enabled: true
  className: "nginx"
  tls:
    - secretName: langwatch-tls
      hosts:
        - langwatch.example.com
  hosts:
    - host: langwatch.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: langwatch-app
                port:
                  number: 5560

cronjobs:
  enabled: true
