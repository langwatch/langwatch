apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway.fullname" . }}
  labels: {{- include "gateway.labels" . | nindent 4 }}
data:
  GATEWAY_LISTEN_ADDR: ":5563"
  GATEWAY_LOG_LEVEL: {{ .Values.logging.level | quote }}
  GATEWAY_CONTROL_PLANE_URL: {{ .Values.controlPlane.baseUrl | quote }}
  GATEWAY_CONTROL_PLANE_TIMEOUT: {{ .Values.controlPlane.requestTimeout | quote }}
  GATEWAY_LONG_POLL_TIMEOUT: {{ .Values.controlPlane.longPollTimeout | quote }}
  GATEWAY_CACHE_LRU_SIZE: {{ .Values.cache.lruSize | quote }}
  GATEWAY_CACHE_REFRESH_INTERVAL: {{ .Values.cache.refreshInterval | quote }}
  GATEWAY_JWT_REFRESH_THRESHOLD: {{ .Values.cache.jwtRefreshThreshold | quote }}
  GATEWAY_CACHE_BOOTSTRAP_ALL_KEYS: {{ .Values.cache.bootstrapAllKeys | quote }}
  GATEWAY_BIFROST_POOL_SIZE: {{ .Values.bifrost.poolSize | quote }}
  GATEWAY_BIFROST_STREAM_BUFFER: {{ .Values.bifrost.streamBufferSize | quote }}
  {{- if .Values.otel.endpoint }}
  GATEWAY_OTEL_DEFAULT_ENDPOINT: {{ .Values.otel.endpoint | quote }}
  {{- end }}
  GATEWAY_OTEL_BATCH_TIMEOUT: {{ .Values.otel.batchTimeout | quote }}
  GATEWAY_OTEL_MAX_QUEUE: {{ .Values.otel.maxQueueSize | quote }}
  GATEWAY_ADMIN_ADDR: {{ .Values.admin.addr | quote }}
  GATEWAY_BUDGET_OUTBOX_FLUSH: {{ .Values.budget.outboxFlushInterval | quote }}
  GATEWAY_BUDGET_OUTBOX_RETRIES: {{ .Values.budget.outboxMaxRetries | quote }}
  LW_GATEWAY_BUDGET_LIVE_THRESHOLD: {{ .Values.budget.liveThresholdPct | quote }}
  LW_GATEWAY_BUDGET_LIVE_TIMEOUT: {{ .Values.budget.liveTimeout | quote }}
  GATEWAY_GUARDRAIL_PRE_TIMEOUT: {{ .Values.guardrails.preTimeout | quote }}
  GATEWAY_GUARDRAIL_POST_TIMEOUT: {{ .Values.guardrails.postTimeout | quote }}
  GATEWAY_GUARDRAIL_STREAM_WINDOW: {{ .Values.guardrails.streamChunkWindow | quote }}
  {{- if .Values.startup.netcheckHosts }}
  GATEWAY_STARTUP_NETCHECK_HOSTS: {{ join "," .Values.startup.netcheckHosts | quote }}
  {{- end }}
  GATEWAY_STARTUP_NETCHECK_TIMEOUT: {{ .Values.startup.netcheckTimeout | quote }}
  GATEWAY_MAX_REQUEST_BODY_BYTES: {{ printf "%d" (int64 .Values.security.maxRequestBodyBytes) | quote }}
  GATEWAY_SERVER_READ_HEADER_TIMEOUT: {{ .Values.security.readHeaderTimeout | quote }}
  GATEWAY_SERVER_READ_TIMEOUT: {{ .Values.security.readTimeout | quote }}
  GATEWAY_SERVER_IDLE_TIMEOUT: {{ .Values.security.idleTimeout | quote }}
  GATEWAY_SHUTDOWN_PRE_DRAIN_WAIT: {{ .Values.shutdown.preDrainWait | quote }}
  GATEWAY_SHUTDOWN_TIMEOUT: {{ .Values.shutdown.timeout | quote }}
