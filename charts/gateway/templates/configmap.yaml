apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway.fullname" . }}
  labels: {{- include "gateway.labels" . | nindent 4 }}
data:
  # Only env vars the gateway Go service actually reads land here.
  # `pkg/config.Hydrate` walks the Config struct in services/aigateway/config.go
  # and concatenates parent/child `env:"…"` tags with `_` — the names below
  # are the resolved canonical names. Knobs exposed in values.yaml that don't
  # appear here are aspirational (forward-compat for v1.1) — silently dropping
  # them avoids misleading operators into thinking they're tuning behavior.
  SERVER_ADDR: ":5563"
  LOG_LEVEL: {{ .Values.logging.level | quote }}
  LW_GATEWAY_BASE_URL: {{ .Values.controlPlane.baseUrl | quote }}
  {{- if .Values.otel.endpoint }}
  # Official OpenTelemetry name, plus the deprecated LangWatch-only name so
  # older gateway images keep reading their endpoint during upgrades. The
  # service accepts both being set as long as the values are equal.
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.otel.endpoint | quote }}
  OTEL_OTLP_ENDPOINT: {{ .Values.otel.endpoint | quote }}
  {{- end }}
  SERVER_MAX_REQUEST_BODY_BYTES: {{ printf "%d" (int64 .Values.security.maxRequestBodyBytes) | quote }}
  # Previously declared in values.yaml but never reached the container —
  # shutdown.preDrainWaitSeconds/timeoutSeconds looked configurable but did
  # nothing. Now actually wired to the fields serve.go reads.
  SERVER_DRAIN_DELAY_SECONDS: {{ .Values.shutdown.preDrainWaitSeconds | quote }}
  SERVER_GRACEFUL_SECONDS: {{ .Values.shutdown.timeoutSeconds | quote }}
  BLOCK_LOCAL_HTTP_CALLS: {{ .Values.security.blockLocalHTTPCalls | quote }}
  REQUIRE_HTTPS_CUSTOM_ENDPOINTS: {{ .Values.security.requireHTTPSCustomEndpoints | quote }}
  ALLOWED_PROXY_HOSTS: {{ join "," .Values.security.allowedProxyHosts | quote }}
