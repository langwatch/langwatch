apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gateway.fullname" . }}
  labels: {{- include "gateway.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels: {{- include "gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "gateway.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 5563
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "gateway.fullname" . }}
          env:
            - name: LW_GATEWAY_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecretName }}
                  key: {{ .Values.secrets.internalSecretKey }}
            - name: LW_GATEWAY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecretName }}
                  key: {{ .Values.secrets.jwtSecretKey }}
            {{- if .Values.secrets.jwtSecretPreviousKey }}
            - name: LW_GATEWAY_JWT_SECRET_PREVIOUS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecretName }}
                  key: {{ .Values.secrets.jwtSecretPreviousKey }}
            {{- end }}
            {{- /*
              GATEWAY_REDIS_URL, GATEWAY_ADMIN_AUTH_TOKEN, and
              GATEWAY_OTEL_DEFAULT_AUTH_TOKEN are intentionally NOT injected.
              The current Go gateway (services/aigateway/) does not have a
              Redis client (auth cache is in-process LRU), an admin/pprof
              listener, or an OTel auth-token field on its config struct.
              These values.yaml knobs remain as forward-compat surface for
              v1.1; wiring them at the env-var layer today would silently
              drop them and mislead operators into thinking they're tuning
              behavior. OTLP authentication for self-hosters is delivered
              via OTEL_OTLP_HEADERS (e.g. "Authorization=Bearer …") on the
              OTel struct in pkg/config/otel.go.
            */}}
          startupProbe:
            httpGet:
              path: /startupz
              port: http
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            successThreshold: {{ .Values.probes.readiness.successThreshold }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
