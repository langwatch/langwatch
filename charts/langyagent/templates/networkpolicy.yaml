{{- if .Values.networkPolicy.enabled }}
# NetworkPolicy for the Langy agent. Deny-by-default; only the rules below
# reach the pod.
#
# Ingress (who may talk TO the agent):
#   - ONLY the LangWatch control plane (langwatch-app) on the manager port.
#     Unlike the gateway, the agent has no public surface — there is no LB
#     or ingress-controller allow rule on purpose.
#
# Egress (what the agent may talk to):
#   - DNS (kube-system:53).
#   - Control plane (langwatch-app) — the per-session MCP server calls the
#     LangWatch API at LANGWATCH_ENDPOINT.
#   - AI gateway (langwatch-gateway) — OpenCode's LLM traffic goes out via
#     OPENAI_BASE_URL pointed at the gateway, not direct to providers.
#   - 443 to anywhere (optional, default on) — OpenCode may reach external
#     hosts (e.g. its own update/telemetry). Tighten by setting
#     networkPolicy.allowExternalHttps=false once egress needs are pinned.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "langyagent.fullname" . }}
  labels: {{- include "langyagent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "langyagent.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- with .Values.networkPolicy.ingressFrom }}
        {{- toYaml . | nindent 8 }}
        {{- else }}
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ .Release.Name }}-app
              app.kubernetes.io/instance: {{ .Release.Name }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.manager.port }}
  egress:
    # DNS — must resolve before anything else.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Control plane (LangWatch app) — MCP -> LangWatch API.
    - to:
        {{- with .Values.networkPolicy.egressToControlPlane }}
        {{- toYaml . | nindent 8 }}
        {{- else }}
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ .Release.Name }}-app
              app.kubernetes.io/instance: {{ .Release.Name }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.controlPlanePort }}
    # AI gateway — OpenCode LLM traffic (OPENAI_BASE_URL).
    - to:
        {{- with .Values.networkPolicy.egressToGateway }}
        {{- toYaml . | nindent 8 }}
        {{- else }}
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: gateway
              app.kubernetes.io/instance: {{ .Release.Name }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.gatewayPort }}
    {{- if .Values.networkPolicy.allowExternalHttps }}
    # External HTTPS (OpenCode update/telemetry, git/gh/npm over :443). This is
    # the pod's ONLY route to the public internet, and the most dangerous rule
    # in the policy — it is off by default (allowExternalHttps=false).
    #
    # ADR-043: FQDN bounding ("only github/npm/…") is enforced at L7 by the
    # per-worker egress adapter (worker tools egress via HTTPS_PROXY), NOT here —
    # L3/L4 policy cannot express FQDN egress. This rule stays the coarse
    # backstop; for bypass-proof datapath FQDN egress enable
    # `egress.cilium.enabled`.
    #
    # The ipBlock `except` lists (networkPolicy.privateExcept / privateExceptV6)
    # deny the private + link-local + CGNAT ranges so a compromised OpenCode
    # subprocess (RCE via prompt injection, supply chain) cannot use this
    # public-egress rule to reach internal services on :443 — the kube
    # apiserver, sidecars on the same node, neighbour pods (INCLUDING the
    # RFC 6598 100.64/10 CGNAT range EKS custom-networking uses for pods/nodes),
    # or the cloud metadata service (169.254.169.254, classic SSRF -> IAM
    # credential theft). Legitimate cluster-internal traffic (gateway, control
    # plane, DNS) is allowed via the explicit podSelector rules above.
    #
    # NOTE :80 is intentionally NOT allowed anywhere in this policy, so IMDSv2
    # over http://169.254.169.254 (port 80) is denied by default-deny regardless
    # of the list below. Keep it that way.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              {{- range .Values.networkPolicy.privateExcept }}
              - {{ . }}
              {{- end }}
        - ipBlock:
            cidr: ::/0
            except:
              {{- range .Values.networkPolicy.privateExceptV6 }}
              - {{ . }}
              {{- end }}
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
{{- end }}
