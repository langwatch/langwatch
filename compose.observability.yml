# Local observability stack — logs, traces and metrics for debugging local dev.
#
# One lightweight all-in-one container (grafana/otel-lgtm) that bundles:
#   - OpenTelemetry Collector  → OTLP on :4317 (gRPC) and :4318 (HTTP)
#   - Tempo                    → traces
#   - Loki                     → logs
#   - Prometheus               → metrics
#   - Grafana                  → :3000, datasources (Tempo/Loki/Prometheus) pre-wired
#
# The collector fans OTLP in: traces → Tempo, logs → Loki, metrics → Prometheus.
# Point your local services at :4318 and everything lands in Grafana, where an
# agent can read it over the Grafana MCP (see dev/docs/best_practices/local-observability.md).
#
# Start / stop:
#   make observability            # up -d + wait for healthy
#   make observability-down       # stop and DISCARD all telemetry
#   make observability-connect    # patch langwatch/.env + wire the Grafana MCP
#
# This is a SEPARATE compose project ("langwatch-observability") from the dev
# stack (compose.dev.yml), so it comes up/down independently and never collides
# with per-worktree volumes.
#
# Retention: data is EPHEMERAL by design — there is no persistent volume, so a
# `down` (or `down`/`up`) wipes everything. That keeps the footprint tiny and
# retention naturally low, which is all local debugging needs. To cap retention
# *while running* or to persist across restarts, see the commented block on the
# service below.

name: langwatch-observability

services:
  otel-lgtm:
    image: grafana/otel-lgtm:0.28.0
    container_name: langwatch-otel-lgtm
    # host:container. Override the Grafana port with LW_OBS_GRAFANA_PORT if 3000
    # is taken (e.g. LW_OBS_GRAFANA_PORT=3100 make observability).
    ports:
      - "${LW_OBS_OTLP_GRPC_PORT:-4317}:4317" # OTLP gRPC receiver
      - "${LW_OBS_OTLP_HTTP_PORT:-4318}:4318" # OTLP HTTP receiver
      - "${LW_OBS_GRAFANA_PORT:-3000}:3000"   # Grafana UI + API
    environment:
      # Deterministic admin creds so `make observability-connect` can mint the
      # Grafana service-account token for the MCP non-interactively. These are
      # local-only, non-secret — this stack is never exposed off-host.
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Let a browser (or the agent) read dashboards without logging in.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      # Quieter first-run: skip the new-version + news-feed checks.
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_NEWS_NEWS_FEED_ENABLED: "false"
    # Keep it light. otel-lgtm idles comfortably under this; bump if you push
    # very high span/log volume locally.
    deploy:
      resources:
        limits:
          memory: 1500m
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s
    restart: unless-stopped

    # --- Optional: persist across restarts + hard-cap retention -----------------
    # By default this service is ephemeral (lowest footprint). If you want data
    # to survive a restart AND stay bounded, uncomment a named volume and mount
    # trimmed configs. otel-lgtm reads these paths on boot:
    #   /otel-lgtm/tempo-config.yaml, loki-config.yaml, prometheus.yaml
    # e.g. set Prometheus `--storage.tsdb.retention.time=3h`, Loki
    # `retention_period: 3h`, Tempo `block_retention: 3h`.
    # volumes:
    #   - langwatch-observability-data:/data
    #   - ./dev/observability/prometheus.yaml:/otel-lgtm/prometheus.yaml:ro
    #   - ./dev/observability/loki-config.yaml:/otel-lgtm/loki-config.yaml:ro
    #   - ./dev/observability/tempo-config.yaml:/otel-lgtm/tempo-config.yaml:ro

# volumes:
#   langwatch-observability-data:
