# Development compose with profiles
#
# Setup:
#   cp langwatch/.env.example langwatch/.env        # Add your keys
#
# **Use `make quickstart` — not direct compose.** ADR-004 (2026-05, #3860)
# established `make quickstart` as the single entry point for local dev. It
# sets VOLUME_PREFIX via scripts/dev.sh so per-worktree volumes (goose_bin,
# app_modules, bullboard_modules, see line ~360) get isolated names; running
# `docker compose -f compose.dev.yml up` directly collapses every worktree
# onto the same volumes.
#
# Recommended:
#   make quickstart                # interactive: asks what you're working on
#   make quickstart frontend-only  # no compose, fastest
#   make quickstart backend-shared # postgres + redis + clickhouse + app
#   make quickstart nlp            # + NLP + langevals
#   make quickstart full-local     # everything
#   make quickstart-help           # full mode reference (non-interactive)
#
# Legacy targets `make dev`, `make dev-up`, `make dev-down`, `make dev-logs`
# still work for one release with a deprecation warning — they shim onto the
# new modes.
#
# Per-worktree ports (create .env.dev in your worktree):
#   APP_PORT=5560
#   BULLBOARD_PORT=6380
#   AI_SERVER_PORT=3456
#
# Debug logging (set in shell or .env.dev):
#   PINO_LOG_LEVEL=debug    # For verbose worker/app logs
#
# Per-service memory limits are configured below on each service.
#
# AI Gateway (Go data plane) — NOT in this compose:
#   The Go gateway runs on the host via `make service svc=aigateway`,
#   binding :5563. Sourced from langwatch/.env (same secrets as the app).
#   Start it in a second terminal alongside any compose profile above.
#
# Stop everything:
#   docker compose -f compose.dev.yml --profile full down

x-common-env: &common-env
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
  NODE_ENV: development
  SKIP_TIKTOKEN: 'true'
  # Prod-like dev: IS_SAAS=true (from langwatch/.env) requires SSRF blocking.
  BLOCK_LOCAL_HTTP_CALLS: "true"
  # NOTE: infrastructure URLs (DATABASE_URL, REDIS_URL, CLICKHOUSE_URL,
  # LANGWATCH_NLP_SERVICE, LANGEVALS_ENDPOINT) are NOT set here. The
  # contributor's `langwatch/.env` is the source of truth — `quickstart`
  # writes a per-mode overlay at `langwatch/.env.dev-up` that overrides
  # only the URLs whose services are starting locally for that mode
  # (#3860 AC#2 / AC#6).

services:
  # =============================================================================
  # INFRASTRUCTURE (always started)
  # =============================================================================

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: prisma
      POSTGRES_PASSWORD: prisma
    # No host port - accessed via docker network as "postgres:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prisma -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # Singleton across worktrees (#3860 AC#5). Exposed on a fixed host port so
  # parallel worktrees reuse the same container instead of spinning up their
  # own. Compose treats this as belonging to the first project that brings it
  # up; subsequent `quickstart`s detect the running container and reuse it.
  #
  # Prerequisite: no host-side redis-server may be holding 6379. `make
  # quickstart` calls `check_host_redis_collision` (scripts/dev.sh) which
  # detects this case and prints a clear hint. On macOS:
  # `brew services stop redis`. On Linux: `sudo systemctl stop redis-server`.
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.25"

  clickhouse:
    image: langwatch/clickhouse-serverless:0.2.0
    environment:
      CLICKHOUSE_PASSWORD: langwatch
    # No host port - accessed via docker network as "clickhouse:8123"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"

  # =============================================================================
  # INIT (installs dependencies once for Linux, all containers share)
  # =============================================================================

  init:
    image: node:24
    working_dir: /app
    volumes:
      - ./langwatch:/app
      - ./pnpm-workspace.yaml:/pnpm-workspace.yaml:ro
      - ./package.json:/package.json:ro
      - ./mcp-server:/mcp-server
      - ./langevals:/langevals
      - ./typescript-sdk:/typescript-sdk:ro
      - ./python-sdk:/python-sdk:ro
      - app_modules:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
      - goose_bin:/opt/goose-bin
    command: >
      sh -c "
        corepack enable &&
        pnpm config set store-dir /root/.local/share/pnpm/store &&
        mkdir -p /app/node_modules &&
        GOOSE_VERSION=v3.26.0 &&
        ARCH=$$(uname -m) &&
        if [ \"$$ARCH\" = \"aarch64\" ]; then GOOSE_ARCH=arm64; else GOOSE_ARCH=x86_64; fi &&
        GOOSE_MARKER=\"$$GOOSE_VERSION/$$GOOSE_ARCH\" &&
        if [ ! -x /opt/goose-bin/goose ] || [ \"$$(cat /opt/goose-bin/.goose-meta 2>/dev/null)\" != \"$$GOOSE_MARKER\" ]; then
          echo \"Installing goose $$GOOSE_VERSION ($$GOOSE_ARCH) for ClickHouse migrations...\" &&
          curl -fsSL \"https://github.com/pressly/goose/releases/download/$${GOOSE_VERSION}/goose_linux_$${GOOSE_ARCH}\" -o /opt/goose-bin/goose &&
          chmod +x /opt/goose-bin/goose &&
          printf '%s' \"$$GOOSE_MARKER\" > /opt/goose-bin/.goose-meta;
        fi &&
        (cd /mcp-server && pnpm install --ignore-scripts && pnpm run build) &&
        pnpm -w install &&
        pnpm -w exec prisma generate &&
        pnpm run types:zod:generate
      "
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      CI: "true"

  # =============================================================================
  # APP (mounted for hot reload)
  # =============================================================================

  app:
    image: node:24
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./langwatch:/app
      - ./pnpm-workspace.yaml:/pnpm-workspace.yaml:ro
      - ./package.json:/package.json:ro
      - ./mcp-server:/mcp-server
      - ./langevals:/langevals
      - ./typescript-sdk:/typescript-sdk:ro
      - ./python-sdk:/python-sdk:ro
      - app_modules:/app/node_modules
      - goose_bin:/opt/goose-bin:ro
    command: >
      sh -c "
        export PATH=/opt/goose-bin:$$PATH &&
        corepack enable &&
        pnpm -w exec prisma generate &&
        pnpm run types:zod:generate &&
        pnpm run start:prepare:db &&
        pnpm run dev
      "
    ports:
      - "${APP_PORT:-5560}:5560"
    environment:
      <<: *common-env
      # BASE_HOST/NEXTAUTH_URL intentionally override langwatch/.env so
      # worktree-isolated dev gets the correct dynamic APP_PORT (each
      # worktree picks a different free port). Set shell vars to point at
      # a proxied URL (e.g. BASE_HOST=https://langwatch-main.boxd.sh) —
      # shell wins over the localhost fallback.
      BASE_HOST: ${BASE_HOST:-http://localhost:${APP_PORT:-5560}}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:${APP_PORT:-5560}}
      # Enable scenarios UI in dev
      RELEASE_UI_SIMULATIONS_MENU_ENABLED: "1"
      RELEASE_UI_SUITES_ENABLED: "1"
      # Use email login for dev (no Auth0 dependency)
      NEXTAUTH_PROVIDER: "email"
    env_file:
      - langwatch/.env
      - path: langwatch/.env.dev-up
        required: false
    depends_on:
      init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    tty: true
    stdin_open: true
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"

  # =============================================================================
  # WORKERS (profile: workers)
  # =============================================================================
  # Started by quickstart presets: all-local, all-local-nlp, dev-storage, dev-infra, full-local.
  # Skipped by: frontend-only (which uses `pnpm dev` on the host with
  # START_WORKERS=true so workers run in-process there).
  # migration is a short-lived host-port stack for prisma/clickhouse migrate;
  # it never runs the app, so no workers.

  workers:
    image: node:24
    working_dir: /app
    profiles: [workers, scenarios, full]
    volumes:
      - ./langwatch:/app
      - ./pnpm-workspace.yaml:/pnpm-workspace.yaml:ro
      - ./package.json:/package.json:ro
      - ./mcp-server:/mcp-server
      - ./langevals:/langevals
      - ./typescript-sdk:/typescript-sdk:ro
      - ./python-sdk:/python-sdk:ro
      - app_modules:/app/node_modules
      - goose_bin:/opt/goose-bin:ro
    command: sh -c "export PATH=/opt/goose-bin:$$PATH && corepack enable && while true; do pnpm -w exec tsx --tsconfig tsconfig.workers.json src/workers.ts; sleep 1; done"
    environment:
      <<: *common-env
      # Override BASE_HOST for Docker networking - scenario child processes post events here
      BASE_HOST: http://app:5560
      LANGWATCH_ENDPOINT: http://app:5560
      # Override REDIS_URL: host app uses localhost:6379, workers must use compose service name
      REDIS_URL: redis://redis:6379
      PINO_LOG_LEVEL: ${PINO_LOG_LEVEL:-info}
      # To enable verbose scenario SDK logging, add: SCENARIO_VERBOSE: "true"
    env_file:
      - langwatch/.env
      - path: langwatch/.env.dev-up
        required: false
    depends_on:
      init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 1536m
          cpus: "0.5"

  # =============================================================================
  # NLP SERVICE (profile: nlp)
  # =============================================================================
  # nlpgo — the Go NLP engine (services/nlpgo, run as the `nlpgo` subcommand of
  # the cmd/service monobinary). Dockerfile.langwatch_nlp builds a static Go
  # binary; there is no Python uvicorn/litellm service anymore. The image still
  # publishes as langwatch/langwatch_nlp and binds :5561, so the app/workers
  # dial http://langwatch_nlp:5561 (LANGWATCH_NLP_SERVICE) unchanged.

  langwatch_nlp:
    image: langwatch/langwatch_nlp:latest
    profiles: [nlp, scenarios, full]
    # No host port - accessed via docker network as "langwatch_nlp:5561"
    environment:
      # nlpgo reads LANGWATCH_ENDPOINT for evaluator + agent-workflow callbacks
      # (falls back to it when NLPGO_ENGINE_LANGWATCH_BASE_URL is unset).
      LANGWATCH_ENDPOINT: http://app:5560
    deploy:
      resources:
        limits:
          memory: 1024m
          cpus: "0.5"

  langevals:
    image: langwatch/langevals:latest
    profiles: [nlp, full]
    # No host port - accessed via docker network as "langevals:5562"
    environment:
      DISABLE_EVALUATORS_PRELOAD: "true"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # =============================================================================
  # DEBUG TOOLS (profile: debug)
  # =============================================================================

  bullboard:
    image: node:24
    working_dir: /app
    profiles: [debug, scenarios, full]
    volumes:
      - ./bullboard:/app
      - bullboard_modules:/app/node_modules
    command: sh -c "corepack enable && pnpm -w install && pnpm start"
    ports:
      - "${BULLBOARD_PORT:-6380}:6380"
    environment:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # =============================================================================
  # TEST TOOLS (profile: test)
  # =============================================================================

  ai-server:
    image: node:24
    working_dir: /app
    profiles: [test, scenarios, full]
    volumes:
      - ./langwatch:/app
      - ./pnpm-workspace.yaml:/pnpm-workspace.yaml:ro
      - ./package.json:/package.json:ro
      - ./mcp-server:/mcp-server
      - ./langevals:/langevals
      - ./typescript-sdk:/typescript-sdk:ro
      - ./python-sdk:/python-sdk:ro
      - app_modules:/app/node_modules
    command: sh -c "corepack enable && pnpm -w exec tsx scripts/ai-server.ts"
    ports:
      - "${AI_SERVER_PORT:-3456}:3456"
    environment:
      <<: *common-env
      LANGWATCH_ENDPOINT: "http://app:5560/"
      # LANGWATCH_API_KEY comes from langwatch/.env via env_file below
      PINO_CONSOLE_LEVEL: "debug"
      LOG_LEVEL: "debug"
    env_file:
      - langwatch/.env
      - path: langwatch/.env.dev-up
        required: false
    depends_on:
      init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

volumes:
  # Stateful — shared across worktrees (#3860 AC#4 / AC#5).
  # Sign-up persists when switching worktrees; ClickHouse traces survive too.
  # Two worktrees can't have the same stateful container `up` simultaneously
  # (postgres locks the volume) — `scripts/dev.sh` detects and warns.
  db-data:
    name: langwatch-db-data
  redis-data:
    name: langwatch-redis-data
  clickhouse-data:
    name: langwatch-clickhouse-data
  # Per-worktree — Linux-vs-host platform isolation per ADR-004.
  # node_modules differs across branches with different lockfiles, so these
  # stay namespaced.
  goose_bin:
    name: ${VOLUME_PREFIX:-langwatch}-goose-bin
  app_modules:
    name: ${VOLUME_PREFIX:-langwatch}-app-modules
  bullboard_modules:
    name: ${VOLUME_PREFIX:-langwatch}-bullboard-modules
  # Always shared (cache only).
  pnpm_store:
    name: langwatch-pnpm-store
