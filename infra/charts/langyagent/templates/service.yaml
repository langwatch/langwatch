{{- /* ClusterIP is a security boundary, not a default — fail loudly rather
       than let a values override expose the manager auth surface. */ -}}
{{- if ne .Values.service.type "ClusterIP" }}
{{- fail "langyagent.service.type must be ClusterIP — the agent is never exposed outside the cluster" }}
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "langyagent.fullname" . }}
  labels: {{- include "langyagent.labels" . | nindent 4 }}
spec:
  # ClusterIP only — the agent is never exposed outside the cluster. The
  # control plane reaches it at http://<release>-langyagent:<port>.
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector: {{- include "langyagent.selectorLabels" . | nindent 4 }}
