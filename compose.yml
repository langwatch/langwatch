services:
  app:
    image: langwatch/langwatch:latest
    environment:
      SKIP_ENV_VALIDATION: true
      DISABLE_PII_REDACTION: true
      DATABASE_URL: postgresql://prisma:prisma@postgres:5432/mydb?schema=mydb
      CLICKHOUSE_URL: http://default:langwatch@clickhouse:8123/langwatch
      REDIS_URL: redis://redis:6379
      LANGWATCH_NLP_SERVICE: http://langwatch_nlp:5561
      LANGEVALS_ENDPOINT: http://langevals:5562
      LANGWATCH_ENDPOINT: http://app:5560
      INSTALL_METHOD: docker
      NODE_ENV: production
    env_file:
      - langwatch/.env
    pull_policy: always
    ports:
      - "5560:5560"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  workers:
    image: langwatch/langwatch:latest
    command: ["pnpm", "run", "start:workers"]
    working_dir: /app/langwatch
    environment:
      SKIP_ENV_VALIDATION: true
      DISABLE_PII_REDACTION: true
      DATABASE_URL: postgresql://prisma:prisma@postgres:5432/mydb?schema=mydb
      CLICKHOUSE_URL: http://default:langwatch@clickhouse:8123/langwatch
      REDIS_URL: redis://redis:6379
      LANGWATCH_NLP_SERVICE: http://langwatch_nlp:5561
      LANGEVALS_ENDPOINT: http://langevals:5562
      LANGWATCH_ENDPOINT: http://app:5560
      NODE_ENV: production
    env_file:
      - langwatch/.env
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: always

  langwatch_nlp:
    image: langwatch/langwatch_nlp:latest
    env_file:
      - langwatch/.env
    ports:
      - "5561:5561"
    restart: always
    pull_policy: always
    environment:
      - LANGWATCH_ENDPOINT=http://app:5560

  langevals:
    image: langwatch/langevals:latest
    ports:
      - "5562:5562"
    restart: always
    pull_policy: always
    environment:
      - DISABLE_EVALUATORS_PRELOAD=true

  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: prisma
      POSTGRES_PASSWORD: prisma
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prisma -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: langwatch/clickhouse-serverless:0.2.0
    environment:
      CLICKHOUSE_PASSWORD: langwatch
    ports:
      - "8123:8123"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always

volumes:
  db-data:
  redis-data:
  clickhouse-data:
