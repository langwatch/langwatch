version: 2

# The npm workspaces enforce pnpm's minimumReleaseAge (7 days) and the uv
# projects enforce exclude-newer = "7 days", so dependabot must not propose
# versions younger than that: the package manager would refuse to resolve
# them and the update run would fail. The cooldowns below keep candidate
# selection behind the same gate, with one extra day of margin.
updates:
  # The whole repo is a single pnpm workspace (root pnpm-workspace.yaml /
  # pnpm-lock.yaml), so one npm entry at the root covers every member package
  # (langwatch, typescript-sdk, mcp-server, skills, bullboard, agentic-e2e-tests,
  # packages/*, typescript-sdk/examples/*) in one place.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 50
    cooldown:
      default-days: 8

  - package-ecosystem: "uv"
    directory: "/python-sdk"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 50
    cooldown:
      default-days: 8

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 50

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 50
