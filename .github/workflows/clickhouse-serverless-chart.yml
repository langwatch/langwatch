name: clickhouse-serverless-chart

on:
  pull_request:
    paths:
      - "charts/clickhouse-serverless/**"
      - "charts/lib/**"
      - ".github/workflows/clickhouse-serverless-chart.yml"
  push:
    branches: [main]
    paths:
      - "charts/clickhouse-serverless/**"
      - "charts/lib/**"

permissions:
  contents: read

jobs:
  lint:
    name: lint + template
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: charts/clickhouse-serverless
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.12.0
      - run: make template

  e2e:
    name: kind e2e
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: charts/clickhouse-serverless
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.12.0
      - name: Build Docker image for Kind
        run: |
          docker build -t langwatch/clickhouse-serverless:next ../../clickhouse-serverless/
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: ch-test
      - name: Load image into Kind
        run: kind load docker-image langwatch/clickhouse-serverless:next --name ch-test
      - run: make test-e2e
        env:
          KEEP_CLUSTER: "true"
          TEST_REPLICATED: "true"
      - name: Show pod status on failure
        if: failure()
        run: |
          kubectl -n ch-test get pods -o wide 2>/dev/null || true
          kubectl -n ch-test get events --sort-by='.lastTimestamp' 2>/dev/null | tail -30 || true
