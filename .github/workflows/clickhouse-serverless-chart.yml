name: ClickHouse Serverless Chart

on:
  pull_request:
    paths:
      - "clickhouse-serverless/**"
      - "charts/clickhouse-serverless/**"
      - "charts/lib/**"
      - ".github/workflows/clickhouse-serverless-chart.yml"
  push:
    branches: [main]
    paths:
      - "clickhouse-serverless/**"
      - "charts/clickhouse-serverless/**"
      - "charts/lib/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint + Template
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: charts/clickhouse-serverless
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.12.0
      - run: make template

  e2e:
    name: E2E (Kind)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: charts/clickhouse-serverless
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.12.0
      - uses: helm/kind-action@v1
        with:
          cluster_name: ch-test
      - run: make test-e2e
        env:
          KEEP_CLUSTER: "true"
          TEST_REPLICATED: "true"
      - name: Show pod status on failure
        if: failure()
        run: |
          kubectl -n ch-test get pods -o wide 2>/dev/null || true
          kubectl -n ch-test get events --sort-by='.lastTimestamp' 2>/dev/null | tail -30 || true
