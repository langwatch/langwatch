name: release-clickhouse-serverless-chart

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0

      - name: Install chart-releaser
        run: |
          VERSION=1.7.0
          curl -sSLo cr.tar.gz "https://github.com/helm/chart-releaser/releases/download/v${VERSION}/chart-releaser_${VERSION}_linux_amd64.tar.gz"
          tar xzf cr.tar.gz cr
          sudo mv cr /usr/local/bin/cr

      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          helm package charts/clickhouse-serverless -d .cr-release-packages

      - name: Upload chart
        run: |
          cr upload \
            --owner "${{ github.repository_owner }}" \
            --git-repo "${{ github.event.repository.name }}" \
            --package-path .cr-release-packages \
            --skip-existing
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Update index
        run: |
          cr index \
            --owner "${{ github.repository_owner }}" \
            --git-repo "${{ github.event.repository.name }}" \
            --package-path .cr-release-packages \
            --push
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
