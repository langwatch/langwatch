name: clickhouse-serverless-docker

on:
  pull_request:
    paths:
      - "clickhouse-serverless/**"
      - ".github/workflows/clickhouse-serverless-docker.yml"
  push:
    branches: [main]
    paths:
      - "clickhouse-serverless/**"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  # ── Always: test + validate on every commit ──────────────────────────────
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clickhouse-serverless
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: clickhouse-serverless/go.sum
      - uses: azure/setup-helm@v4
        with:
          version: v3.12.0
      - run: make test
      - run: make lint

  e2e:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: clickhouse-serverless
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: clickhouse-serverless/go.sum
      - uses: docker/setup-buildx-action@v3
      - run: make e2e
      - run: make e2e-cold
      - run: make e2e-cold-move
      - run: make e2e-backup
      - name: Show logs on failure
        if: failure()
        run: |
          docker logs ch-e2e 2>&1 | tail -100 || true
          docker logs garage-e2e 2>&1 | tail -50 || true

  # ── Publish: only on release or manual dispatch ──────────────────────────
  publish-meta:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'clickhouse-serverless@'))
      || github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sha_short: ${{ steps.meta.outputs.sha_short }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${GITHUB_REF#refs/tags/clickhouse-serverless@}"
          else
            VERSION=$(python3 -c "import json; print(json.load(open('.github/.release-please-manifest.json'))['clickhouse-serverless'])")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "release" ]; then
            echo "is_prerelease=${{ github.event.release.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  publish-amd64:
    runs-on: ubuntu-latest
    needs: [e2e, publish-meta]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: clickhouse-serverless
          push: true
          platforms: linux/amd64
          tags: langwatch/clickhouse-serverless:${{ needs.publish-meta.outputs.version }}-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-arm64:
    name: Publish (arm64)
    runs-on: arm64-runner-32gb
    needs: [e2e, publish-meta]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: clickhouse-serverless
          push: true
          platforms: linux/arm64/v8
          tags: langwatch/clickhouse-serverless:${{ needs.publish-meta.outputs.version }}-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-manifest:
    runs-on: ubuntu-latest
    needs: [publish-meta, publish-amd64, publish-arm64]
    env:
      IMAGE: langwatch/clickhouse-serverless
      VERSION: ${{ needs.publish-meta.outputs.version }}
      SHA_SHORT: ${{ needs.publish-meta.outputs.sha_short }}
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest (version)
        run: |
          docker buildx imagetools create \
            -t "$IMAGE:$VERSION" \
            "$IMAGE:${VERSION}-amd64" \
            "$IMAGE:${VERSION}-arm64"

      - name: Create manifest (sha)
        run: |
          docker buildx imagetools create \
            -t "$IMAGE:$SHA_SHORT" \
            "$IMAGE:${VERSION}-amd64" \
            "$IMAGE:${VERSION}-arm64"

      - name: Create manifest (latest)
        if: needs.publish-meta.outputs.is_prerelease != 'true'
        run: |
          docker buildx imagetools create \
            -t "$IMAGE:latest" \
            "$IMAGE:${VERSION}-amd64" \
            "$IMAGE:${VERSION}-arm64"

      - name: Delete temporary arch-specific tags
        run: |
          TOKEN=$(curl -s -H "Content-Type: application/json" -X POST \
            -d '{"username": "${{ secrets.DOCKERHUB_USERNAME }}", "password": "${{ secrets.DOCKERHUB_TOKEN }}"}' \
            https://hub.docker.com/v2/users/login/ | jq -r .token)

          for tag in "${VERSION}-amd64" "${VERSION}-arm64"; do
            curl -s -X DELETE \
              -H "Authorization: JWT ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${tag}/"
          done

  # ── Release Helm chart after Docker images are published ─────────────────
  release-chart:
    runs-on: ubuntu-latest
    needs: [publish-meta, create-manifest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - uses: azure/setup-helm@v4
        with:
          version: v3.12.0

      - name: Install chart-releaser
        run: |
          VERSION=1.7.0
          curl -sSLo cr.tar.gz "https://github.com/helm/chart-releaser/releases/download/v${VERSION}/chart-releaser_${VERSION}_linux_amd64.tar.gz"
          tar xzf cr.tar.gz cr
          sudo mv cr /usr/local/bin/cr

      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          helm package charts/clickhouse-serverless -d .cr-release-packages

      - name: Upload chart
        run: |
          cr upload \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --package-path .cr-release-packages \
            --skip-existing
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Update index
        run: |
          cr index \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --package-path .cr-release-packages \
            --push
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
