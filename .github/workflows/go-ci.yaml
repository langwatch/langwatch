# Always-run workflow with internal path gating + aggregator. See #3223.
# Branch protection requires `go-ci-complete`. Upstream jobs skip when paths
# don't match, and `alls-green` reports the final consolidated status.
name: go-ci

on:
  push:
    branches: [main]
  pull_request:
  # Evaluate against the queued merge commit too, so the generated-code drift
  # check can gate the queue rather than only the PR head.
  merge_group:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: go-ci-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go || steps.force.outputs.go }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Only `pull_request` has a base to diff against. Every other event
      # (push, merge_group, workflow_dispatch) forces the filter true, so the
      # aggregator below always has a concrete result to require. See
      # .github/actions/detect-changes/action.yml for the same rule.
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        if: github.event_name == 'pull_request'
        id: filter
        with:
          filters: |
            # herrgen walks every Go file in the repo for herr code
            # declarations (tools/herrgen/parse.go::goFiles), so this filter has
            # to be a superset of that walk — not a list of the services that
            # happen to declare codes today. `**/*.go` is that superset, and it
            # is the only spelling that stays one: the earlier per-prefix list
            # left out `internal/**` and root-level `*.go`, so a code declared
            # there changed the generated artifact while the drift job skipped
            # and `go-ci-complete` went green on it. The whole `langwatch/` tree
            # is still deliberately NOT listed, since a frontend-only PR has no
            # Go to check.
            go:
              - '**/*.go'
              - 'services/**'
              - 'pkg/**'
              - 'cmd/**'
              - 'tools/**'
              - 'sdk-go/**'
              - 'clickhouse-serverless/**'
              - 'packages/handled-error/**'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - '.github/workflows/go-ci.yaml'
      - name: Force the filter true on non-PR events
        if: github.event_name != 'pull_request'
        id: force
        run: echo "go=true" >> "$GITHUB_OUTPUT"

  build:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go mod verify
      - run: go build ./cmd/...

  test:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go test -count=1 -race ./services/aigateway/... ./services/nlpgo/... ./pkg/... ./tools/migrationorder/... ./tools/herrgen/...

  lint:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.11.4
          args: ./services/aigateway/... ./services/nlpgo/... ./pkg/... ./cmd/... ./tools/migrationorder/... ./tools/herrgen/...

  vet:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go vet ./services/aigateway/... ./services/nlpgo/... ./pkg/... ./cmd/... ./tools/migrationorder/... ./tools/herrgen/...

  # packages/handled-error/src/codes.generated.ts mirrors the services' herr
  # codes; the TypeScript presentation registry is keyed off it, so a Go code
  # added without regenerating would silently ship with no customer copy.
  # Spec: specs/ci/herr-codes-generation.feature
  generated:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      # Through the Makefile, so the check CI runs and the check a developer
      # runs cannot drift apart.
      - run: make herrgen-check

  # The single required status check. Every job above is `if:`-gated and so
  # cannot be required directly — a skipped job never reports, and branch
  # protection would wait forever. This one always runs and consolidates them.
  go-ci-complete:
    needs: [changes, build, test, lint, vet, generated]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: build, test, lint, vet, generated
