# Always-run workflow with internal path gating + aggregator. See #3223.
# Branch protection requires `sdk-go-complete`; upstream jobs skip when
# paths don't match, and `alls-green` reports the consolidated status.
name: sdk-go-ci

on:
  push:
    branches:
      - main
  pull_request:
  pull_request_target:
    types: [labeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant || steps.force.outputs.relevant }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect relevant changes
        if: github.event_name == 'pull_request'
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            relevant:
              - 'sdk-go/**'
              - '.github/workflows/sdk-go-ci.yml'
              - '.github/.release-please-manifest.json'

      - name: Force relevant on non-PR events
        if: github.event_name != 'pull_request'
        id: force
        run: echo "relevant=true" >> "$GITHUB_OUTPUT"

  test:
    needs: changes
    if: >
      needs.changes.outputs.relevant == 'true'
      && (github.event_name != 'pull_request_target'
          || (github.event.label.name == 'approved-ci'
              && github.event.pull_request.user.login == 'dependabot[bot]'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.24'
          cache: true

      - name: Install dependencies
        working-directory: ./sdk-go
        run: go mod download

      - name: Run tests
        working-directory: ./sdk-go
        run: go test -v ./...

      - name: Install examples dependencies
        working-directory: ./sdk-go/examples
        run: go mod download

      - name: Run filtering example
        working-directory: ./sdk-go/examples
        run: go run ./filtering

      - name: Install e2e dependencies
        working-directory: ./sdk-go/e2e
        run: go mod download

      - name: Run e2e examples
        if: github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
        working-directory: ./sdk-go/e2e
        run: go run cmd/main.go --ci run-examples
        env:
          LANGWATCH_API_KEY: ${{ secrets.GO_SDK_LANGWATCH_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.GO_SDK_OPENAI_API_KEY }}

  typecheck:
    needs: changes
    if: >
      needs.changes.outputs.relevant == 'true'
      && (github.event_name != 'pull_request_target'
          || (github.event.label.name == 'approved-ci'
              && github.event.pull_request.user.login == 'dependabot[bot]'))
    runs-on: ubuntu-latest
    steps:
      - run: echo "no typechecking is needed for go"

  build:
    needs: changes
    if: >
      needs.changes.outputs.relevant == 'true'
      && (github.event_name != 'pull_request_target'
          || (github.event.label.name == 'approved-ci'
              && github.event.pull_request.user.login == 'dependabot[bot]'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.24'
          cache: true

      - name: Install dependencies
        working-directory: ./sdk-go
        run: go mod download

      - name: Build
        working-directory: ./sdk-go
        run: go build -v ./...

  sdk-go-complete:
    needs: [changes, test, typecheck, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: test, typecheck, build
