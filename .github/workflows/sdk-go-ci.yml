# Always-run workflow with internal path gating + aggregator. See #3223.
# Branch protection requires `sdk-go-complete`; upstream jobs skip when
# paths don't match, and `alls-green` reports the consolidated status.
name: sdk-go-ci

on:
  push:
    branches:
      - main
  pull_request:
  pull_request_target:
    types: [labeled]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: ./.github/actions/detect-changes
        id: detect
        with:
          filters: |
            relevant:
              - 'sdks/go/**'
              - '.github/workflows/sdk-go-ci.yml'
              - '.github/.release-please-manifest.json'

  test:
    needs: changes
    if: >
      needs.changes.outputs.relevant == 'true'
      && (github.event_name != 'pull_request_target'
          || github.event.label.name == 'approved-ci')
    runs-on: ubuntu-latest
    # The repo-root go.work targets a newer Go than the SDK's floor; the SDK
    # must build standalone at its declared go directive, so ignore the workspace.
    env:
      GOWORK: off
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies
        working-directory: ./sdks/go
        run: go mod download

      - name: Run tests
        working-directory: ./sdks/go
        run: go test -v ./...

      - name: Install examples dependencies
        working-directory: ./sdks/go/examples
        run: go mod download

      - name: Run filtering example
        working-directory: ./sdks/go/examples
        run: go run ./filtering

      - name: Install e2e dependencies
        working-directory: ./sdks/go/e2e
        run: go mod download

      - name: Run e2e examples
        # Fork and Dependabot PRs don't receive repository secrets, so a
        # secret-backed run can only fail on a missing key. Skip it there;
        # same-repo PRs, pushes, and label-approved pull_request_target run.
        if: >
          (github.event_name != 'pull_request'
           || github.event.pull_request.head.repo.full_name == github.repository)
          && (github.event_name != 'pull_request'
           || github.actor != 'dependabot[bot]')
        working-directory: ./sdks/go/e2e
        run: go run cmd/main.go --ci run-examples
        env:
          LANGWATCH_API_KEY: ${{ secrets.GO_SDK_LANGWATCH_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.GO_SDK_OPENAI_API_KEY }}

  typecheck:
    needs: changes
    if: >
      needs.changes.outputs.relevant == 'true'
      && (github.event_name != 'pull_request_target'
          || github.event.label.name == 'approved-ci')
    runs-on: ubuntu-latest
    steps:
      - run: echo "no typechecking is needed for go"

  build:
    needs: changes
    if: >
      needs.changes.outputs.relevant == 'true'
      && (github.event_name != 'pull_request_target'
          || github.event.label.name == 'approved-ci')
    runs-on: ubuntu-latest
    # The repo-root go.work targets a newer Go than the SDK's floor; the SDK
    # must build standalone at its declared go directive, so ignore the workspace.
    env:
      GOWORK: off
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies
        working-directory: ./sdks/go
        run: go mod download

      - name: Build
        working-directory: ./sdks/go
        run: go build -v ./...

  sdk-go-complete:
    needs: [changes, test, typecheck, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: test, typecheck, build
