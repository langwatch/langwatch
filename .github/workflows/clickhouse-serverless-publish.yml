name: clickhouse-serverless-publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'clickhouse-serverless@') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${GITHUB_REF#refs/tags/clickhouse-serverless@}
          else
            VERSION=$(python3 -c "import json; print(json.load(open('.github/.release-please-manifest.json'))['clickhouse-serverless'])")
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@68827325e0b33c7199eb18aa4212338bb5f9575d # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: clickhouse-serverless
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            langwatch/clickhouse-serverless:${{ steps.version.outputs.version }}
            langwatch/clickhouse-serverless:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
