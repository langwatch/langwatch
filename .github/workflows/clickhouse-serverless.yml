# Always-run workflow with internal path gating + aggregator. See #3223.
# Branch protection can require `clickhouse-serverless-complete` as a
# single check. Jobs skip cleanly when the paths aren't relevant.
name: clickhouse-serverless

on:
  pull_request:
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: ./.github/actions/detect-changes
        id: detect
        with:
          filters: |
            relevant:
              - 'clickhouse-serverless/**'
              - 'charts/clickhouse-serverless/**'
              - '.github/workflows/clickhouse-serverless.yml'

  test:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    name: go tests + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clickhouse-serverless
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
          cache-dependency-path: clickhouse-serverless/go.sum
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: v3.12.0
      - run: make test
      - run: make lint

  e2e:
    needs: [changes, test]
    if: needs.changes.outputs.relevant == 'true'
    name: docker e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clickhouse-serverless
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"
          cache-dependency-path: clickhouse-serverless/go.sum
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - run: make e2e
      - run: make e2e-cold
      - run: make e2e-cold-move
      - run: make e2e-backup
      - name: Show logs on failure
        if: failure()
        run: |
          docker logs ch-e2e 2>&1 | tail -100 || true
          docker logs garage-e2e 2>&1 | tail -50 || true

  clickhouse-serverless-complete:
    needs: [changes, test, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: test, e2e
