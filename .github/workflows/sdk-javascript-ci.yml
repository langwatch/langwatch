# Always-run workflow with internal path gating + aggregator. See #3223.
# Branch protection requires `sdk-javascript-complete`; upstream jobs
# skip when paths don't match, and `alls-green` reports the final status.
name: sdk-javascript-ci

on:
  push:
    branches:
      - main
  pull_request:
  pull_request_target:
    types: [labeled]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  LANGWATCH_API_KEY: sk-lw-1234567890
  LANGWATCH_ENDPOINT: http://localhost:5560

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/detect-changes
        id: detect
        with:
          filters: |
            relevant:
              - 'typescript-sdk/**'
              - '.github/workflows/sdk-javascript-ci.yml'
              - '.github/.release-please-manifest.json'

  ci:
    needs: changes
    if: >
      needs.changes.outputs.relevant == 'true'
      && (github.event_name != 'pull_request_target'
          || (github.event.label.name == 'approved-ci'
              && github.event.pull_request.user.login == 'dependabot[bot]'))
    runs-on: ubuntu-latest
    # Run lint, typecheck, tests, and build for TypeScript SDK
    defaults:
      run:
        working-directory: typescript-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: ./.github/actions/setup-pnpm-node
        with:
          cache-dependency-path: "typescript-sdk/pnpm-lock.yaml"
          install-dir: typescript-sdk

      - name: Install TypeScript Native Preview
        run: pnpm install -D @typescript/native-preview

      - name: Run lint check
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Run tests
        if: github.actor != 'dependabot[bot]' || github.event_name == 'pull_request_target'
        env:
          LANGWATCH_ENDPOINT: ${{ secrets.TYPESCRIPT_SDK_LANGWATCH_ENDPOINT }}
          OPENAI_API_KEY: ${{ secrets.TYPESCRIPT_SDK_OPENAI_API_KEY }}
          LANGWATCH_API_KEY: ${{ secrets.TYPESCRIPT_SDK_LANGWATCH_API_KEY }}
        run: pnpm test

  e2e:
    needs: changes
    if: >
      needs.changes.outputs.relevant == 'true'
      && (github.event_name != 'pull_request_target'
          || (github.event.label.name == 'approved-ci'
              && github.event.pull_request.user.login == 'dependabot[bot]'))
    runs-on: ubuntu-latest

    env:
      # LangWatch server config (aligned with e2e-ci.yml)
      DATABASE_URL: "postgresql://langwatch_ci:ci_password@localhost:5432/langwatch_test"
      BASE_HOST: "localhost:5560"
      NEXTAUTH_SECRET: "nextauth-secret-for-ci-testing"
      NEXTAUTH_URL: "http://localhost:5560"
      API_TOKEN_JWT_SECRET: "api-jwt-secret-for-ci-testing"
      CLICKHOUSE_URL: "http://default:ci_password@localhost:8123/langwatch"
      REDIS_URL: "redis://localhost:6379"
      NODE_ENV: "test"
      SKIP_ENV_VALIDATION: "true"
      DISABLE_PII_REDACTION: "true"
      LANGWATCH_LICENSE_PUBLIC_KEY: ${{ secrets.TEST_LICENSE_PUBLIC_KEY }}

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 8123:8123
        env:
          CLICKHOUSE_DB: default
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ci_password
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: langwatch_ci
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: langwatch_test
        options: >-
          --health-cmd "PGPASSWORD=ci_password psql -U langwatch_ci -d langwatch_test -c 'select 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: typescript-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b # v2
        with:
          version: 10.24.0

      # Single setup-node call covers all three pnpm lockfiles used by the
      # e2e job (typescript-sdk, langwatch app, mcp-server). Calling
      # setup-node twice silently discards the first cache config.
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: |
            typescript-sdk/pnpm-lock.yaml
            langwatch/pnpm-lock.yaml
            mcp-server/pnpm-lock.yaml

      - name: Build mcp-server
        working-directory: mcp-server
        run: pnpm install --frozen-lockfile && pnpm run build

      - name: Install LangWatch app dependencies
        working-directory: langwatch
        run: CI=true pnpm install --frozen-lockfile

      - name: Prepare LangWatch files
        working-directory: langwatch
        run: pnpm start:prepare:files

      - name: Setup database
        working-directory: langwatch
        run: pnpm prisma:migrate

      - name: Seed test project
        working-directory: langwatch
        run: pnpm prisma:seed

      - name: Install goose
        run: bash .github/scripts/install-goose.sh

      - name: Setup ClickHouse
        working-directory: langwatch
        run: pnpm clickhouse:migrate

      # Build the app so we can run a production server (dev mode is
      # unreliable in CI — turbopack JIT compilation can hang under
      # memory pressure, causing the server to become unresponsive).
      - name: Build LangWatch app
        working-directory: langwatch
        run: NODE_ENV=test pnpm build

      - name: Start LangWatch server and worker
        working-directory: langwatch
        run: |
          NODE_ENV=production pnpm run start &
          # Start the worker process so the event-sourcing pipeline
          # consumes traces from Redis and writes them to ClickHouse
          pnpm run start:workers &
          # Wait for server to be ready
          timeout 60 bash -c 'until curl -f http://localhost:5560 2>/dev/null | grep -q "LangWatch\|<!DOCTYPE"; do sleep 2; done'
          echo "✅ LangWatch server is ready"

      - name: Install SDK dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm run build

      - name: Run e2e tests
        if: github.actor != 'dependabot[bot]' || github.event_name == 'pull_request_target'
        env:
          OPENAI_API_KEY: ${{ secrets.TYPESCRIPT_SDK_OPENAI_API_KEY }}
          E2E_TIMEOUT: 120000
          E2E_POLL_TIMEOUT: 120000
        run: pnpm test:e2e

  sdk-javascript-complete:
    needs: [changes, ci, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: ci, e2e
