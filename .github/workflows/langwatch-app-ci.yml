# Always-run workflow with internal path gating + aggregator. See #3223.
# Branch protection requires `langwatch-app-complete`. Upstream jobs
# skip when paths don't match, and `alls-green` reports the final
# consolidated status — no per-step `if:` guards needed.
name: langwatch-app-ci

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:

env:
  NODE_ENV: "test"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
      feature-parity: ${{ steps.detect.outputs.feature-parity }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/detect-changes
        id: detect
        with:
          filters: |
            relevant:
              - 'langwatch/**'
              - '.github/workflows/langwatch-app-ci.yml'
              - '.github/.release-please-manifest.json'
              - '.github/scripts/**'
            # The parity scanner binds @scenario annotations from test files
            # across many roots, not just specs/ and langwatch/. This list MUST
            # cover every root the scanner reads (DEFAULT_TEST_ROOTS,
            # DEFAULT_GO_TEST_ROOTS, DEFAULT_PYTHON_TEST_ROOTS,
            # DEFAULT_BATS_TEST_ROOTS in langwatch/scripts/check-feature-parity.ts),
            # otherwise a binding change in an unlisted root merges without the
            # gate ever running and silently breaks parity on main (e.g. #5143
            # edited only scripts/__tests__/*.bats and slipped through).
            feature-parity:
              - 'specs/**'
              - 'langwatch/**'
              - 'mcp-server/**'
              - 'typescript-sdk/**'
              - 'python-sdk/**'
              - 'services/**'
              - 'pkg/**'
              - 'langevals/**'
              - 'langwatch_server/**'
              - 'scripts/**'
              - '.github/workflows/langwatch-app-ci.yml'

  typecheck:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-pnpm-node
        with:
          cache-dependency-path: "langwatch/pnpm-lock.yaml"
          install-dir: langwatch

      - name: Prepare files
        working-directory: langwatch
        run: pnpm start:prepare:files

      - name: Run typecheck
        working-directory: langwatch
        run: pnpm typecheck

      - name: Notify Slack on failure
        if: failure() && github.ref == 'refs/heads/main'
        env:
          SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL: ${{ secrets.SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/notify-slack-job-failure.sh typecheck

  test-unit:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      VITEST_MAX_WORKERS: "4" # physical core count on GitHub-hosted ubuntu runners
      DATABASE_URL: "postgresql://langwatch_ci:ci_password@localhost:5432/langwatch_test"
      BASE_HOST: "localhost:3000"
      NEXTAUTH_SECRET: "nextauth-secret-for-ci-testing"
      NEXTAUTH_URL: "http://localhost:3000"
      API_TOKEN_JWT_SECRET: "api-jwt-secret-for-ci-testing"
      REDIS_URL: "redis://localhost:6379"
      BUILD_TIME: "true"

    runs-on: ubuntu-latest
    # Same fail-fast cap as test-integration: a worker that wedges post-test
    # (open handle, coverage finalize, etc.) should fail in ~25 min instead of
    # burning the 6h default.
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-pnpm-node
        with:
          cache-dependency-path: "langwatch/pnpm-lock.yaml"
          install-dir: langwatch

      - name: Prepare files
        working-directory: langwatch
        run: pnpm start:prepare:files

      - name: Run unit tests with coverage (shard ${{ matrix.shard }}/4)
        id: unit-tests
        working-directory: langwatch
        run: |
          pnpm test:unit --run --shard=${{ matrix.shard }}/4 \
            --coverage --coverage.reporter=lcov --coverage.reporter=text \
            --reporter=default --reporter=json --outputFile=test-results.json \
            --dangerouslyIgnoreUnhandledErrors

      - name: Extract test failures
        if: failure()
        working-directory: langwatch
        run: bash ../.github/scripts/extract-failures.sh test-results.json test-failures.txt

      - name: Notify Slack on new failure
        if: failure() && github.ref == 'refs/heads/main'
        env:
          SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL: ${{ secrets.SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
        working-directory: langwatch
        run: bash ../.github/scripts/notify-slack-test-failure.sh test-unit

      - name: Upload unit test coverage to Codecov
        if: always() && hashFiles('langwatch/coverage/lcov.info') != ''
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          files: langwatch/coverage/lcov.info
          flags: unit
          name: unit-tests-shard-${{ matrix.shard }}
          fail_ci_if_error: false

  test-integration:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
    env:
      # Several integration suites (groupQueue, scripts, loopPrevention,
      # traceparent) call redis.flushall() directly in afterEach against the
      # shared Redis — the shared cleanup helper is tenant-scoped to avoid this
      # race, but these suites aren't. vitest.integration.config.ts sets
      # fileParallelism: false but does NOT cap the worker pool, so on CI
      # multiple workers raced on those FLUSHALLs and wiped each other's
      # in-flight queue state. Force a single worker to serialize them.
      VITEST_MAX_WORKERS: "1"
      # Required environment variables for integration tests
      DATABASE_URL: "postgresql://langwatch_ci:ci_password@localhost:5432/langwatch_test"
      BASE_HOST: "localhost:3000"
      NEXTAUTH_SECRET: "nextauth-secret-for-ci-testing"
      NEXTAUTH_URL: "http://localhost:3000"
      API_TOKEN_JWT_SECRET: "api-jwt-secret-for-ci-testing"
      CLICKHOUSE_URL: "http://default:ci_password@localhost:8123/test_langwatch"
      CI_REDIS_URL: "redis://localhost:6379"
      CI_CLICKHOUSE_URL: "http://default:ci_password@localhost:8123/test_langwatch"
      BUILD_TIME: "true"
      CI: "true"

    runs-on: ubuntu-latest
    # Belt-and-suspenders: per-shard coverage accumulation in the single fork
    # worker can wedge post-test (worker fails to exit). Cap the per-job wait
    # so a wedge fails fast in ~25 min instead of burning the 6h default.
    timeout-minutes: 25

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: langwatch_ci
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: langwatch_test
        options: >-
          --health-cmd "PGPASSWORD=ci_password psql -U langwatch_ci -d langwatch_test -c 'select 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-pnpm-node
        with:
          cache-dependency-path: "langwatch/pnpm-lock.yaml"
          install-dir: langwatch

      - name: Prepare files
        working-directory: langwatch
        run: pnpm start:prepare:files

      - name: Setup database
        working-directory: langwatch
        run: pnpm prisma:migrate

      - name: Install Goose migration tool
        run: bash .github/scripts/install-goose.sh

      - name: Start ClickHouse with storage policy
        env:
          CLICKHOUSE_PASSWORD: ci_password
        run: bash .github/scripts/start-clickhouse-with-storage-policy.sh

      - name: Run ClickHouse migrations
        working-directory: langwatch
        # ClickHouse's HTTP probe can answer SELECT 1 via curl while the
        # Node @clickhouse/client still sees ECONNREFUSED on its first
        # connect (IPv6/IPv4 dual-stack bind race under --network host).
        # Retry the whole migrate step a couple of times to absorb the
        # cold-start window. Observed flake: run 24930819915 shard 3.
        run: |
          for i in 1 2 3; do
            if pnpm clickhouse:migrate; then
              exit 0
            fi
            if [ "$i" -lt 3 ]; then
              echo "clickhouse:migrate attempt $i failed; sleeping 5s and retrying"
              sleep 5
            fi
          done
          exit 1

      - name: Run integration tests with coverage (shard ${{ matrix.shard }}/6)
        id: integration-tests
        working-directory: langwatch
        # Integration files run sequentially in a single long-lived fork worker
        # (fileParallelism:false, for Redis contention), so v8 coverage data
        # accumulates across every file in the shard. Two levers keep that
        # accumulation manageable: the shard count bounds files-per-worker, and
        # the raised --max-old-space-size gives the worker enough headroom to
        # finalize coverage and exit. NODE_OPTIONS is inherited by the fork
        # worker (execArgv is not), so it raises the heap where it's needed.
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          pnpm test:integration --shard=${{ matrix.shard }}/6 \
            --coverage --coverage.reporter=lcov --coverage.reporter=text \
            --reporter=default --reporter=json --outputFile=test-results.json

      - name: Extract test failures
        if: failure()
        working-directory: langwatch
        run: bash ../.github/scripts/extract-failures.sh test-results.json test-failures.txt

      - name: Notify Slack on new failure
        if: failure() && github.ref == 'refs/heads/main'
        env:
          SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL: ${{ secrets.SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
        working-directory: langwatch
        run: bash ../.github/scripts/notify-slack-test-failure.sh test-integration

      - name: Upload integration test coverage to Codecov
        if: always() && hashFiles('langwatch/coverage/lcov.info') != ''
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          files: langwatch/coverage/lcov.info
          flags: integration
          name: integration-tests-shard-${{ matrix.shard }}
          fail_ci_if_error: false

  lint:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: mongolyy/reviewdog-action-biome@cdea4bd64ef0291fba37174f9684c9770a9573fc # v2
        with:
          reporter: github-pr-review
          fail_level: error
          # The action resolves the Biome version (from the lockfile) and runs
          # Biome inside workdir, so biome_flags paths are relative to it.
          workdir: langwatch
          biome_flags: "./src"

      - name: Notify Slack on failure
        if: failure() && github.ref == 'refs/heads/main'
        env:
          SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL: ${{ secrets.SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/notify-slack-job-failure.sh lint

  feature-parity:
    needs: changes
    if: needs.changes.outputs.feature-parity == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-pnpm-node
        with:
          cache-dependency-path: "langwatch/pnpm-lock.yaml"
          install-dir: langwatch

      - name: Check feature-file parity
        working-directory: langwatch
        run: pnpm check:feature-parity

      - name: Notify Slack on failure
        if: failure() && github.ref == 'refs/heads/main'
        env:
          SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL: ${{ secrets.SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/notify-slack-job-failure.sh feature-parity

  build:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    env:
      # Disable telemetry and optimize build for CI
      NEXT_TELEMETRY_DISABLED: 1
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.24.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      # Use pnpm store caching instead of node_modules for better cache efficiency
      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('langwatch/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # Cache Prisma client separately for faster regeneration
      - name: Cache Prisma client
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: langwatch/node_modules/.prisma
          key: ${{ runner.os }}-prisma-${{ hashFiles('langwatch/prisma/schema.prisma') }}

      # Cache Vite build artifacts
      - name: Cache Vite
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            langwatch/node_modules/.vite
          key: ${{ runner.os }}-vite-${{ hashFiles('langwatch/pnpm-lock.yaml') }}-${{ hashFiles('langwatch/src/**/*', 'langwatch/vite.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-vite-${{ hashFiles('langwatch/pnpm-lock.yaml') }}-
            ${{ runner.os }}-vite-

      # Cache Turbo build outputs
      - name: Cache Turbo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: langwatch/.turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      # node-pty@1.1.0 only ships prebuilds for darwin/win32, so on Linux
      # its postinstall always falls back to `node-gyp rebuild`. With
      # pnpm/action-setup v6's npm-bootstrap path, node-gyp isn't on PATH
      # by default — install it globally before any install that hits
      # mcp-server's onlyBuiltDependencies allowlist.
      - name: Install node-gyp (for node-pty postinstall)
        run: npm install -g node-gyp@12.3.0

      - name: Build mcp-server
        working-directory: mcp-server
        run: pnpm install --frozen-lockfile && pnpm run build

      - name: Install dependencies
        working-directory: langwatch
        run: CI=true pnpm install --frozen-lockfile

      - name: Build
        working-directory: langwatch
        run: pnpm build

      # A successful `vite build` only proves the bundle compiles, not that it
      # boots. Serve the built output and load it in a headless browser to
      # catch runtime boot failures (white screens from chunk-init errors).
      # Uses the runner's preinstalled Google Chrome (no browser download).
      - name: Boot smoke test
        working-directory: langwatch
        env:
          SMOKE_BROWSER_CHANNEL: chrome
        run: |
          pnpm exec vite preview --port 4173 --outDir dist/client &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://localhost:4173/ && break
            sleep 1
          done
          # Under the runner's `bash -e`, a non-zero exit here fails the step
          # (the gate we want); the EXIT trap still stops the preview server.
          node scripts/smoke-boot.mjs

      - name: Notify Slack on failure
        if: failure() && github.ref == 'refs/heads/main'
        env:
          SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL: ${{ secrets.SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/notify-slack-job-failure.sh build

  ci-scripts-test:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Test extract-failures.sh
        run: bash .github/scripts/__tests__/extract-failures.test.sh

      - name: Test start-clickhouse-with-storage-policy.sh
        run: bash .github/scripts/__tests__/start-clickhouse-with-storage-policy.test.sh

  ci-self-test:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-pnpm-node
        with:
          cache-dependency-path: "langwatch/pnpm-lock.yaml"
          install-dir: langwatch

      - name: Stage canary fixture inside vitest root
        working-directory: langwatch
        run: cp ../.github/scripts/__fixtures__/intentional-failure.test.ts ./_ci_canary.test.ts

      - name: Run intentional failure
        id: canary
        continue-on-error: true
        working-directory: langwatch
        run: |
          pnpm vitest run _ci_canary.test.ts \
            --reporter=default --reporter=json --outputFile=test-results.json

      - name: Extract failures
        if: always()
        working-directory: langwatch
        run: bash ../.github/scripts/extract-failures.sh test-results.json test-failures.txt

      - name: Assert detection worked
        if: always()
        run: |
          if [ "${{ steps.canary.outcome }}" != "failure" ]; then
            echo "FAIL: canary step should have failed (vitest should exit non-zero for a failing test), got outcome=${{ steps.canary.outcome }}"
            exit 1
          fi
          if [ ! -s langwatch/test-failures.txt ]; then
            echo "FAIL: test-failures.txt is missing or empty — failure extraction did not work"
            exit 1
          fi
          echo "PASS: canary failed as expected and failures were extracted"
          cat langwatch/test-failures.txt

  langwatch-app-complete:
    needs: [changes, typecheck, test-unit, test-integration, lint, feature-parity, build, ci-scripts-test, ci-self-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: typecheck, test-unit, test-integration, lint, feature-parity, build, ci-scripts-test, ci-self-test
