# Always-run workflow with internal path gating + aggregator. See #3223.
# Branch protection requires `langwatch-app-complete`. Upstream jobs
# skip when paths don't match, and `alls-green` reports the final
# consolidated status — no per-step `if:` guards needed.
name: langwatch-app-ci

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:

env:
  NODE_ENV: "test"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
      feature-parity: ${{ steps.detect.outputs.feature-parity }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/detect-changes
        id: detect
        with:
          filters: |
            relevant:
              - 'langwatch/**'
              - '.github/workflows/langwatch-app-ci.yml'
              - '.github/.release-please-manifest.json'
              - '.github/scripts/**'
            feature-parity:
              - 'langwatch/**'
              - 'specs/**'
              - '.github/workflows/langwatch-app-ci.yml'

  typecheck:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-pnpm-node
        with:
          cache-dependency-path: "langwatch/pnpm-lock.yaml"
          install-dir: langwatch

      - name: Prepare files
        working-directory: langwatch
        run: pnpm start:prepare:files

      - name: Run typecheck
        working-directory: langwatch
        run: pnpm typecheck

      - name: Notify Slack on failure
        if: failure() && github.ref == 'refs/heads/main'
        env:
          SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL: ${{ secrets.SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/notify-slack-job-failure.sh typecheck

  test-unit:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      VITEST_MAX_WORKERS: "4" # physical core count on GitHub-hosted ubuntu runners
      DATABASE_URL: "postgresql://langwatch_ci:ci_password@localhost:5432/langwatch_test"
      BASE_HOST: "localhost:3000"
      NEXTAUTH_SECRET: "nextauth-secret-for-ci-testing"
      NEXTAUTH_URL: "http://localhost:3000"
      API_TOKEN_JWT_SECRET: "api-jwt-secret-for-ci-testing"
      ELASTICSEARCH_NODE_URL: "http://localhost:9200"
      REDIS_URL: "redis://localhost:6379"
      BUILD_TIME: "true"

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-pnpm-node
        with:
          cache-dependency-path: "langwatch/pnpm-lock.yaml"
          install-dir: langwatch

      - name: Prepare files
        working-directory: langwatch
        run: pnpm start:prepare:files

      - name: Run unit tests with coverage (shard ${{ matrix.shard }}/4)
        id: unit-tests
        working-directory: langwatch
        run: |
          pnpm test:unit --run --shard=${{ matrix.shard }}/4 \
            --coverage --coverage.reporter=lcov --coverage.reporter=text \
            --reporter=default --reporter=json --outputFile=test-results.json \
            --dangerouslyIgnoreUnhandledErrors

      - name: Extract test failures
        if: failure()
        working-directory: langwatch
        run: bash ../.github/scripts/extract-failures.sh test-results.json test-failures.txt

      - name: Notify Slack on new failure
        if: failure() && github.ref == 'refs/heads/main'
        env:
          SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL: ${{ secrets.SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
        working-directory: langwatch
        run: bash ../.github/scripts/notify-slack-test-failure.sh test-unit

      - name: Upload unit test coverage to Codecov
        if: always()
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          files: langwatch/coverage/lcov.info
          flags: unit
          name: unit-tests-shard-${{ matrix.shard }}
          fail_ci_if_error: false

  test-integration:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      VITEST_MAX_WORKERS: "4" # physical core count on GitHub-hosted ubuntu runners
      # Required environment variables for integration tests
      DATABASE_URL: "postgresql://langwatch_ci:ci_password@localhost:5432/langwatch_test"
      BASE_HOST: "localhost:3000"
      NEXTAUTH_SECRET: "nextauth-secret-for-ci-testing"
      NEXTAUTH_URL: "http://localhost:3000"
      API_TOKEN_JWT_SECRET: "api-jwt-secret-for-ci-testing"
      ELASTICSEARCH_NODE_URL: "http://localhost:9200"
      CLICKHOUSE_URL: "http://default:ci_password@localhost:8123/test_langwatch"
      CI_REDIS_URL: "redis://localhost:6379"
      CI_CLICKHOUSE_URL: "http://default:ci_password@localhost:8123/test_langwatch"
      LANGWATCH_NLP_SERVICE: "http://localhost:5561"
      LANGWATCH_ENDPOINT: "http://localhost:3000"
      BUILD_TIME: "true"
      CI: "true"

    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # ClickHouse is started manually via docker run (after checkout) to mount storage policy config
      # See "Start ClickHouse with storage policy" step below

      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
        ports:
          - 9200:9200
        env:
          discovery.type: single-node
          xpack.security.enabled: false
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 5

      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: langwatch_ci
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: langwatch_test
        options: >-
          --health-cmd "PGPASSWORD=ci_password psql -U langwatch_ci -d langwatch_test -c 'select 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-pnpm-node
        with:
          cache-dependency-path: "langwatch/pnpm-lock.yaml"
          install-dir: langwatch

      - name: Prepare files
        working-directory: langwatch
        run: pnpm start:prepare:files

      - name: Setup database
        working-directory: langwatch
        run: pnpm prisma:migrate

      - name: Setup Elasticsearch
        working-directory: langwatch
        run: pnpm elastic:migrate

      - name: Install Goose migration tool
        run: bash .github/scripts/install-goose.sh

      - name: Start ClickHouse with storage policy
        env:
          CLICKHOUSE_PASSWORD: ci_password
        run: bash .github/scripts/start-clickhouse-with-storage-policy.sh

      - name: Run ClickHouse migrations
        working-directory: langwatch
        # ClickHouse's HTTP probe can answer SELECT 1 via curl while the
        # Node @clickhouse/client still sees ECONNREFUSED on its first
        # connect (IPv6/IPv4 dual-stack bind race under --network host).
        # Retry the whole migrate step a couple of times to absorb the
        # cold-start window. Observed flake: run 24930819915 shard 3.
        run: |
          for i in 1 2 3; do
            if pnpm clickhouse:migrate; then
              exit 0
            fi
            if [ "$i" -lt 3 ]; then
              echo "clickhouse:migrate attempt $i failed; sleeping 5s and retrying"
              sleep 5
            fi
          done
          exit 1

      - name: Run integration tests with coverage (shard ${{ matrix.shard }}/4)
        id: integration-tests
        working-directory: langwatch
        run: |
          pnpm test:integration --shard=${{ matrix.shard }}/4 \
            --coverage --coverage.reporter=lcov --coverage.reporter=text \
            --reporter=default --reporter=json --outputFile=test-results.json

      - name: Extract test failures
        if: failure()
        working-directory: langwatch
        run: bash ../.github/scripts/extract-failures.sh test-results.json test-failures.txt

      - name: Notify Slack on new failure
        if: failure() && github.ref == 'refs/heads/main'
        env:
          SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL: ${{ secrets.SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
        working-directory: langwatch
        run: bash ../.github/scripts/notify-slack-test-failure.sh test-integration

      - name: Upload integration test coverage to Codecov
        if: always()
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          files: langwatch/coverage/lcov.info
          flags: integration
          name: integration-tests-shard-${{ matrix.shard }}
          fail_ci_if_error: false

  lint:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: mongolyy/reviewdog-action-biome@cdea4bd64ef0291fba37174f9684c9770a9573fc # v2
        with:
          reporter: github-pr-review
          fail_level: error
          biome_flags: "./src"

      - name: Notify Slack on failure
        if: failure() && github.ref == 'refs/heads/main'
        env:
          SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL: ${{ secrets.SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/notify-slack-job-failure.sh lint

  feature-parity:
    needs: changes
    if: needs.changes.outputs.feature-parity == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-pnpm-node
        with:
          cache-dependency-path: "langwatch/pnpm-lock.yaml"
          install-dir: langwatch

      - name: Check feature-file parity
        working-directory: langwatch
        run: pnpm check:feature-parity

      - name: Notify Slack on failure
        if: failure() && github.ref == 'refs/heads/main'
        env:
          SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL: ${{ secrets.SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/notify-slack-job-failure.sh feature-parity

  build:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    env:
      # Disable telemetry and optimize build for CI
      NEXT_TELEMETRY_DISABLED: 1
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b # v2
        with:
          version: 10.24.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      # Use pnpm store caching instead of node_modules for better cache efficiency
      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('langwatch/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # Cache Prisma client separately for faster regeneration
      - name: Cache Prisma client
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: langwatch/node_modules/.prisma
          key: ${{ runner.os }}-prisma-${{ hashFiles('langwatch/prisma/schema.prisma') }}

      # Cache Vite build artifacts
      - name: Cache Vite
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            langwatch/node_modules/.vite
          key: ${{ runner.os }}-vite-${{ hashFiles('langwatch/pnpm-lock.yaml') }}-${{ hashFiles('langwatch/src/**/*', 'langwatch/vite.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-vite-${{ hashFiles('langwatch/pnpm-lock.yaml') }}-
            ${{ runner.os }}-vite-

      # Cache Turbo build outputs
      - name: Cache Turbo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: langwatch/.turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build mcp-server
        working-directory: mcp-server
        run: pnpm install --frozen-lockfile && pnpm run build

      - name: Install dependencies
        working-directory: langwatch
        run: CI=true pnpm install --frozen-lockfile

      - name: Build
        working-directory: langwatch
        run: pnpm build

      - name: Notify Slack on failure
        if: failure() && github.ref == 'refs/heads/main'
        env:
          SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL: ${{ secrets.SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/notify-slack-job-failure.sh build

  ci-scripts-test:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Test extract-failures.sh
        run: bash .github/scripts/__tests__/extract-failures.test.sh

      - name: Test start-clickhouse-with-storage-policy.sh
        run: bash .github/scripts/__tests__/start-clickhouse-with-storage-policy.test.sh

  ci-self-test:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-pnpm-node
        with:
          cache-dependency-path: "langwatch/pnpm-lock.yaml"
          install-dir: langwatch

      - name: Stage canary fixture inside vitest root
        working-directory: langwatch
        run: cp ../.github/scripts/__fixtures__/intentional-failure.test.ts ./_ci_canary.test.ts

      - name: Run intentional failure
        id: canary
        continue-on-error: true
        working-directory: langwatch
        run: |
          pnpm vitest run _ci_canary.test.ts \
            --reporter=default --reporter=json --outputFile=test-results.json

      - name: Extract failures
        if: always()
        working-directory: langwatch
        run: bash ../.github/scripts/extract-failures.sh test-results.json test-failures.txt

      - name: Assert detection worked
        if: always()
        run: |
          if [ "${{ steps.canary.outcome }}" != "failure" ]; then
            echo "FAIL: canary step should have failed (vitest should exit non-zero for a failing test), got outcome=${{ steps.canary.outcome }}"
            exit 1
          fi
          if [ ! -s langwatch/test-failures.txt ]; then
            echo "FAIL: test-failures.txt is missing or empty — failure extraction did not work"
            exit 1
          fi
          echo "PASS: canary failed as expected and failures were extracted"
          cat langwatch/test-failures.txt

  langwatch-app-complete:
    needs: [changes, typecheck, test-unit, test-integration, lint, feature-parity, build, ci-scripts-test, ci-self-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: typecheck, test-unit, test-integration, lint, feature-parity, build, ci-scripts-test, ci-self-test
