name: go-services

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  packages: write

concurrency:
  group: go-services-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      service: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.service }}
      chart: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.chart }}
      langyagent: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.langyagent }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        if: github.event_name != 'workflow_dispatch'
        id: filter
        with:
          filters: |
            service:
              - 'services/aigateway/**'
              - 'pkg/**'
              - 'cmd/**'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile.go_service'
              - '.github/workflows/go-services.yaml'
            chart:
              - 'charts/gateway/**'
              - '.github/workflows/go-services.yaml'
            langyagent:
              # The langyagent image bakes in the langwatch CLI, and that CLI is
              # generated AT IMAGE-BUILD TIME from inputs OUTSIDE the Go tree:
              # typescript-sdk/ + skills/ + feature-map.json + a handful of
              # langwatch/langevals source files (typescript-sdk/copy-types.sh +
              # generate-skills-bundle.mjs). A change to any of those can break
              # `docker build -f Dockerfile.langyagent` with no Go source
              # touched — exactly the gap that shipped a broken build once
              # (a new copy-types.sh input was never COPYed into the image).
              # Validate the image build whenever any build input moves.
              - 'services/langyagent/**'
              - 'pkg/**'
              - 'cmd/**'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile.langyagent'
              - 'typescript-sdk/**'
              - 'packages/cli-cards/**'
              - 'skills/**'
              - 'feature-map.json'
              - 'langwatch/src/server/tracer/types.ts'
              - 'langwatch/src/server/filters/types.ts'
              - 'langwatch/src/server/evaluations/types.ts'
              - 'langwatch/src/server/modelProviders/llmModels.json'
              - 'langwatch/src/app/api/openapiLangWatch.json'
              - 'langevals/ts-integration/evaluators.generated.ts'
              - '.github/workflows/go-services.yaml'

  docker:
    needs: changes
    if: ${{ needs.changes.outputs.service == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          driver-opts: image=moby/buildkit:buildx-stable-1

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          repo_lower=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${repo_lower}/ai-gateway" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v6
        with:
          context: .
          file: Dockerfile.go_service
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          platforms: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          build-args: |
            VERSION=${{ steps.meta.outputs.sha_tag }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,scope=gateway,mode=max

  langyagent:
    needs: changes
    if: ${{ needs.changes.outputs.langyagent == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          driver-opts: image=moby/buildkit:buildx-stable-1

      # Build-only guard: this image is NEVER pushed from here. The langyagent
      # image is published solely by publish-docker-app.yml on a `langwatch@*`
      # release; this job exists to fail a PR fast when a build input breaks the
      # image, not to produce an artifact. amd64 only — the failure modes we're
      # guarding (a missing copy-types.sh input, an unresolved generated import,
      # a broken Go compile) are arch-independent, so an emulated arm64 build
      # would triple the runtime for no extra signal. Shares the release
      # workflow's amd64 cache scope so PR builds warm from it.
      - name: Build langyagent image (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v6
        with:
          context: .
          file: Dockerfile.langyagent
          push: false
          platforms: linux/amd64
          build-args: |
            SERVICE_VERSION=${{ github.sha }}
          cache-from: type=gha,scope=langyagent-amd64
          cache-to: type=gha,scope=langyagent-amd64,mode=max

  helm:
    needs: changes
    if: ${{ needs.changes.outputs.chart == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v4
        with:
          version: v3.18.0

      - name: helm lint (gateway)
        working-directory: charts/gateway
        run: helm lint .

      - name: helm template (gateway defaults)
        working-directory: charts/gateway
        run: helm template gateway . --dry-run > /tmp/defaults.yaml

      - name: helm template (gateway network policy on)
        working-directory: charts/gateway
        run: helm template gateway . --set networkPolicy.enabled=true --set redis.url=redis://test:6379 --dry-run > /tmp/netpol.yaml

      - name: Assert NetworkPolicy renders when enabled
        run: |
          if ! grep -q "kind: NetworkPolicy" /tmp/netpol.yaml; then
            echo "NetworkPolicy missing from rendered template"; exit 1
          fi
          if grep -q "kind: NetworkPolicy" /tmp/defaults.yaml; then
            echo "NetworkPolicy should NOT render by default"; exit 1
          fi

      - name: helm dependency update (umbrella)
        working-directory: charts/langwatch
        run: helm dependency update

      - name: helm template (umbrella includes gateway)
        working-directory: charts/langwatch
        run: |
          helm template langwatch . --set autogen.enabled=true --dry-run > /tmp/umbrella.yaml

      - name: Assert gateway subchart renders under the umbrella
        run: |
          if ! grep -q "app.kubernetes.io/name: gateway" /tmp/umbrella.yaml; then
            echo "umbrella chart did NOT include the gateway subchart — dependency broken?"
            exit 1
          fi
          if ! grep -q "targetPort: 5563" /tmp/umbrella.yaml; then
            echo "gateway Service targetPort !=5563 under the umbrella"
            exit 1
          fi

      - name: helm template (umbrella gateway disabled)
        working-directory: charts/langwatch
        run: |
          helm template langwatch . --set autogen.enabled=true --set gateway.chartManaged=false --dry-run > /tmp/umbrella-no-gw.yaml

      - name: Assert opt-out drops the gateway
        run: |
          if grep -q "app.kubernetes.io/name: gateway" /tmp/umbrella-no-gw.yaml; then
            echo "gateway.chartManaged=false should suppress the subchart"
            exit 1
          fi
