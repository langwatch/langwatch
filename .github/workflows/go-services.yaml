name: go-services

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  packages: write

concurrency:
  group: go-services-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      service: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.service }}
      chart: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.chart }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        if: github.event_name != 'workflow_dispatch'
        id: filter
        with:
          filters: |
            service:
              - 'services/aigateway/**'
              - 'pkg/**'
              - 'cmd/**'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile.go_service'
              - '.github/workflows/go-services.yaml'
            chart:
              - 'charts/gateway/**'
              - '.github/workflows/go-services.yaml'

  docker:
    needs: changes
    if: ${{ needs.changes.outputs.service == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3
        with:
          driver-opts: image=moby/buildkit:buildx-stable-1

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          repo_lower=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${repo_lower}/ai-gateway" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v6
        with:
          context: .
          file: Dockerfile.go_service
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          platforms: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          build-args: |
            VERSION=${{ steps.meta.outputs.sha_tag }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,scope=gateway,mode=max

  helm:
    needs: changes
    if: ${{ needs.changes.outputs.chart == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install helm
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4
        with:
          version: v3.18.0

      - name: helm lint (gateway)
        working-directory: charts/gateway
        run: helm lint .

      - name: helm template (gateway defaults)
        working-directory: charts/gateway
        run: helm template gateway . --dry-run > /tmp/defaults.yaml

      - name: helm template (gateway network policy on)
        working-directory: charts/gateway
        run: helm template gateway . --set networkPolicy.enabled=true --set redis.url=redis://test:6379 --dry-run > /tmp/netpol.yaml

      - name: Assert NetworkPolicy renders when enabled
        run: |
          if ! grep -q "kind: NetworkPolicy" /tmp/netpol.yaml; then
            echo "NetworkPolicy missing from rendered template"; exit 1
          fi
          if grep -q "kind: NetworkPolicy" /tmp/defaults.yaml; then
            echo "NetworkPolicy should NOT render by default"; exit 1
          fi

      - name: helm dependency update (umbrella)
        working-directory: charts/langwatch
        run: helm dependency update

      - name: helm template (umbrella includes gateway)
        working-directory: charts/langwatch
        run: |
          helm template langwatch . --set autogen.enabled=true --dry-run > /tmp/umbrella.yaml

      - name: Assert gateway subchart renders under the umbrella
        run: |
          if ! grep -q "app.kubernetes.io/name: gateway" /tmp/umbrella.yaml; then
            echo "umbrella chart did NOT include the gateway subchart — dependency broken?"
            exit 1
          fi
          if ! grep -q "targetPort: 5563" /tmp/umbrella.yaml; then
            echo "gateway Service targetPort !=5563 under the umbrella"
            exit 1
          fi

      - name: helm template (umbrella gateway disabled)
        working-directory: charts/langwatch
        run: |
          helm template langwatch . --set autogen.enabled=true --set gateway.chartManaged=false --dry-run > /tmp/umbrella-no-gw.yaml

      - name: Assert opt-out drops the gateway
        run: |
          if grep -q "app.kubernetes.io/name: gateway" /tmp/umbrella-no-gw.yaml; then
            echo "gateway.chartManaged=false should suppress the subchart"
            exit 1
          fi
