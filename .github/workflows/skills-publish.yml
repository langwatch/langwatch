name: skills-publish

on:
  push:
    branches: [main]
    paths:
      - 'skills/*/SKILL.md'
      - 'skills/recipes/*/SKILL.md'
      - 'skills/version.txt'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Read version
        id: version
        run: echo "version=$(cat skills/version.txt)" >> $GITHUB_OUTPUT

      - name: Checkout skills repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: langwatch/skills
          path: _skills-publish
          token: ${{ secrets.SKILLS_PUBLISH_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Sync skills
        run: npx --yes tsx skills/_publish/sync.ts _skills-publish

      - name: Commit and push
        run: |
          if [ ! -d _skills-publish/.git ]; then
            echo "::error::_skills-publish/.git missing — sync likely wiped the checkout. Refusing to commit into the wrong repo."
            exit 1
          fi
          cd _skills-publish
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          VERSION="${{ steps.version.outputs.version }}"
          git commit -m "chore: sync skills v${VERSION} from langwatch/langwatch"
          git tag "v${VERSION}" || true
          git push
          git push --tags || true
