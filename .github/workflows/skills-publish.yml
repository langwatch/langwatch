name: Publish Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/*/SKILL.md'
      - 'skills/recipes/*/SKILL.md'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout skills repo
        uses: actions/checkout@v4
        with:
          repository: langwatch/skills
          path: _skills-publish
          token: ${{ secrets.SKILLS_PUBLISH_TOKEN }}

      - name: Sync skills
        run: bash skills/_publish/sync.sh _skills-publish

      - name: Commit and push
        run: |
          cd _skills-publish
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi
          git commit -m "chore: sync skills from langwatch/langwatch"
          git push
