name: skynet-ci

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "skynet/**"
      - ".github/workflows/skynet-ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: skynet/package-lock.json

      - name: Install dependencies
        working-directory: skynet
        run: npm ci

      - name: Run typecheck
        working-directory: skynet
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: skynet/package-lock.json

      - name: Install dependencies
        working-directory: skynet
        run: npm ci

      - name: Run unit tests
        working-directory: skynet
        run: npm run test:unit

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: skynet/package-lock.json

      - name: Install dependencies
        working-directory: skynet
        run: npm ci

      - name: Build
        working-directory: skynet
        run: npm run build
