name: skynet-ci

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "skynet/**"
      - ".github/workflows/skynet-ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: skynet/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: skynet
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        working-directory: skynet
        run: pnpm exec tsc --noEmit

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: skynet/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: skynet
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: skynet
        run: pnpm run build
