# Always-run workflow with internal path gating + aggregator. See #3223.
#
# Why: branch protection on `main` requires specific checks to pass on
# every PR. A top-level `paths:` filter would make this workflow silently
# absent on unrelated PRs, leaving any required check stuck pending. So
# the workflow always runs; `changes` decides whether jobs do real work
# or skip; `sdk-python-complete` aggregates and reports one final status
# that branch protection requires.
name: sdk-python-ci

on:
  push:
    branches:
      - main
  pull_request:
  pull_request_target:
    types: [labeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Decides whether downstream jobs do real work. On non-PR events we
  # always run; on PR events we diff the paths that matter.
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant || steps.force.outputs.relevant }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect relevant changes
        if: github.event_name == 'pull_request'
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            relevant:
              - 'python-sdk/**'
              - '!python-sdk/src/langwatch/__version__.py'
              - '.github/workflows/sdk-python-ci.yml'
              - '.github/.release-please-manifest.json'

      - name: Force relevant on non-PR events
        if: github.event_name != 'pull_request'
        id: force
        run: echo "relevant=true" >> "$GITHUB_OUTPUT"

  test:
    needs: changes
    if: >
      needs.changes.outputs.relevant == 'true'
      && (github.event_name != 'pull_request_target'
          || (github.event.label.name == 'approved-ci'
              && github.event.pull_request.user.login == 'dependabot[bot]'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup UV
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "python-sdk/uv.lock"

      - name: Setup Python UV
        working-directory: python-sdk
        run: uv sync --all-groups --all-extras

      - name: Run unit tests
        working-directory: python-sdk
        env:
          LANGWATCH_DEBUG: "true"
        run: make test-unit

      - name: Run e2e tests
        if: github.actor != 'dependabot[bot]' || github.event_name == 'pull_request_target'
        working-directory: python-sdk
        env:
          LANGWATCH_DEBUG: "true"
          LANGWATCH_API_KEY: ${{ secrets.PYTHON_SDK_LANGWATCH_API_KEY }}
          LANGWATCH_PROMPT_ID: ${{ secrets.PYTHON_SDK_LANGWATCH_PROMPT_ID }}
          TEST_EVALUATION_SLUG: "test-evaluation"
          AZURE_OPENAI_API_KEY: ${{ secrets.PYTHON_SDK_AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.PYTHON_SDK_AZURE_OPENAI_ENDPOINT }}
          GEMINI_API_KEY: ${{ secrets.PYTHON_SDK_GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.PYTHON_SDK_GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.PYTHON_SDK_OPENAI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.PYTHON_SDK_CEREBRAS_API_KEY }}
        run: |
          make test-e2e
          make cli-examples
          make test-examples

  build:
    needs: changes
    if: >
      needs.changes.outputs.relevant == 'true'
      && (github.event_name != 'pull_request_target'
          || (github.event.label.name == 'approved-ci'
              && github.event.pull_request.user.login == 'dependabot[bot]'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup UV
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "python-sdk/uv.lock"

      - name: Setup Python UV
        working-directory: python-sdk
        run: uv sync --all-groups --all-extras && uv pip install build

      - name: Build package
        working-directory: python-sdk
        run: uv run python -m build

  # One required check for the whole workflow. Reports success if every
  # upstream job either passed or was legitimately skipped (paths didn't
  # match). Reports failure if any upstream job failed. Uses `alls-green`
  # because GitHub's default `needs:` semantics treat skipped needs as
  # satisfied — that's the silent-success footgun we want to avoid.
  sdk-python-complete:
    needs: [changes, test, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: test, build
