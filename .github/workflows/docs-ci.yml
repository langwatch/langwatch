# Always-run workflow with internal path gating + aggregator. See #3223.
# Branch protection can require `docs-complete` as a single check.
name: docs-ci

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/detect-changes
        id: detect
        with:
          filters: |
            relevant:
              - 'docs/**'
              - 'skills/**'
              - '.github/workflows/docs-ci.yml'

  check_links:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check for broken links
        run: |
          # Pipe `continue\n` to dismiss any first-run interactive prompt
          # (Mintlify CLI in a fresh CI runner can prompt about config / version
          # before producing output, exiting nonzero from inside $() under
          # `set -eo pipefail` and killing the step before the broken-links
          # report ever runs). `|| true` keeps us from short-circuiting on
          # CLI nonzero; we drive pass/fail purely from the captured output
          # so a real broken-link report still fails the step.
          output=$(printf 'continue\n' | npx mintlify broken-links 2>&1 || true)
          echo "$output"
          if echo "$output" | grep -qi "found.*broken links in"; then
            echo "Broken links detected!"
            exit 1
          fi
          if echo "$output" | grep -qi "no broken links found"; then
            echo "No broken links found"
            exit 0
          fi
          echo "Mintlify CLI did not report success or broken-links — treating as failure."
          exit 1

  check_generated_files:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: langwatch

      # `--ignore-workspace`: same gotcha as agentic-e2e-tests in e2e-ci.yml.
      # The repo-root pnpm-workspace.yaml introduced by @langwatch/server in
      # packages/ shadows skills/ unless we tell pnpm to ignore it. Without
      # this, `pnpm install` here does "Scope: all N workspace projects"
      # (only `packages/*`) and skills/node_modules never gets `unified`,
      # `tsx` deps, etc. — the next sync-prompts.sh step then dies with
      # ERR_MODULE_NOT_FOUND on `unified` from skills/_lib/mdx-inline.ts.
      - name: Install skill tooling
        run: pnpm install --frozen-lockfile --ignore-workspace
        working-directory: skills

      - name: Regenerate prompts-data.jsx
        run: bash docs/scripts/sync-prompts.sh

      - name: Regenerate llms.txt
        run: cd docs && node llms.txt.cjs

      - name: Check for stale generated files
        run: |
          if ! git diff --exit-code docs/snippets/prompts-data.jsx docs/llms.txt docs/llms-full.txt; then
            echo ""
            echo "ERROR: Generated files are stale. Please run:"
            echo "  bash docs/scripts/sync-prompts.sh"
            echo "  cd docs && node llms.txt.cjs"
            echo "Then commit the updated files."
            exit 1
          fi

  docs-complete:
    needs: [changes, check_links, check_generated_files]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: check_links, check_generated_files
