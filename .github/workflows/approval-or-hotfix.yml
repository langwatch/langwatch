name: approval-or-hotfix

on:
  pull_request_target:
    types: [labeled, unlabeled, opened, synchronize, reopened]
  pull_request_review:
    types: [submitted, dismissed]

concurrency:
  group: approval-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-approval-or-label:
    # Skip pull_request_review for fork PRs — the read-only token would 403
    # and the concurrency group could cancel a passing pull_request_target run.
    if: >-
      github.event_name != 'pull_request_review' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      checks: write

    steps:
      - name: Check for approval or exception labels
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Fetch current labels from the API instead of the event payload,
            // because labels added by GITHUB_TOKEN actions don't trigger new
            // workflow runs, so the payload may be stale.
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
            });

            const labelNames = labels.map(l => l.name);

            // "firefighting" can be added by anyone (human override for urgent fixes)
            // Helper: write a passing check run so the result sticks
            // regardless of which event type triggered this workflow.
            async function passCheck(reason) {
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: pr.head.sha,
                name: "check-approval-or-label",
                status: "completed",
                conclusion: "success",
                output: { title: "Approved", summary: reason },
              });
              core.info(reason);
            }

            if (labelNames.includes("firefighting")) {
              await passCheck("PR has firefighting label. Passing check.");
              return;
            }

            // "low-risk-change" is only valid when the *most recent* labeling
            // was done by the bot. This prevents: bot adds → human removes →
            // human re-adds, which would leave a stale bot event in history.
            if (labelNames.includes("low-risk-change")) {
              const events = await github.paginate(github.rest.issues.listEvents, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
              });

              // Find the most recent labeled/unlabeled event for low-risk-change
              const labelEvents = events.filter(e =>
                (e.event === "labeled" || e.event === "unlabeled") &&
                e.label?.name === "low-risk-change"
              );

              const latest = labelEvents[labelEvents.length - 1];

              if (latest?.event === "labeled" && latest?.actor?.login === "github-actions[bot]") {
                await passCheck("PR has low-risk-change label applied by automation. Passing check.");
                return;
              }

              core.warning("low-risk-change label was not last applied by automation. Ignoring it.");
            }

            // Get PR reviews
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            // Count unique approvals
            const approvedUsers = new Set();
            for (const review of reviews.data) {
              if (review.state === "APPROVED") {
                approvedUsers.add(review.user.login);
              }
            }

            const approvalCount = approvedUsers.size;

            if (approvalCount >= 1) {
              await passCheck(`PR has ${approvalCount} approval(s). Passing check.`);
              return;
            }

            const failReason = "PR requires at least 1 approval, or a label: firefighting (manual) / low-risk-change (automation only).";
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: pr.head.sha,
              name: "check-approval-or-label",
              status: "completed",
              conclusion: "failure",
              output: { title: "Review required", summary: failReason },
            });
            core.setFailed(failReason);
