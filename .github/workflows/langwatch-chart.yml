name: LangWatch Chart

on:
  pull_request:
    paths:
      - "charts/langwatch/**"
      - "charts/clickhouse-serverless/**"
      - "charts/lib/**"
      - ".github/workflows/langwatch-chart.yml"
  push:
    branches: [main]
    paths:
      - "charts/langwatch/**"
      - "charts/clickhouse-serverless/**"

jobs:
  lint-template:
    name: "Template: ${{ matrix.name }}"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: charts/langwatch
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            flags: "--set autogen.enabled=true"
          - name: local
            flags: "-f examples/values-local.yaml"
          - name: test
            flags: "-f examples/values-test.yaml"
          - name: hosted-dev
            flags: "-f examples/values-hosted-dev.yaml"
          - name: hosted-prod
            flags: "-f examples/values-hosted-prod.yaml"
          - name: scalable-prod
            flags: "-f examples/values-scalable-prod.yaml"
          - name: external-ch
            flags: "-f examples/values-clickhouse-external.yaml --set autogen.enabled=true"
          - name: replicated-ch
            flags: "-f examples/values-local.yaml -f examples/values-clickhouse-replicated.yaml"
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.12.0
      - run: helm dependency update .
      - name: "helm template (${{ matrix.name }})"
        run: helm template lw . ${{ matrix.flags }} > /dev/null

  e2e:
    name: E2E (Kind)
    runs-on: ubuntu-latest
    needs: lint-template
    defaults:
      run:
        working-directory: charts/langwatch
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.12.0
      - name: Build clickhouse-serverless image
        run: docker build -t langwatch/clickhouse-serverless:0.1.0 ../../clickhouse-serverless/
      - name: Build app image
        run: docker build -t langwatch/langwatch:2.6.0 ../..
      - uses: helm/kind-action@v1
        with:
          cluster_name: lw-test
      - name: Load images into Kind
        run: |
          kind load docker-image langwatch/clickhouse-serverless:0.1.0 --name lw-test
          kind load docker-image langwatch/langwatch:2.6.0 --name lw-test
      - run: make test-e2e
        env:
          KEEP_CLUSTER: "true"
      - name: Show pod status on failure
        if: failure()
        run: |
          kubectl -n lw-test get pods -o wide 2>/dev/null || true
          kubectl -n lw-test describe pods -n lw-test 2>/dev/null | tail -80 || true
          kubectl -n lw-test get events --sort-by='.lastTimestamp' 2>/dev/null | tail -30 || true
