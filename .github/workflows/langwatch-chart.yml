name: LangWatch Chart

on:
  pull_request:
    paths:
      - "charts/langwatch/**"
      - "charts/clickhouse-serverless/**"
      - "charts/lib/**"
      - ".github/workflows/langwatch-chart.yml"
  push:
    branches: [main]
    paths:
      - "charts/langwatch/**"
      - "charts/clickhouse-serverless/**"
      - "charts/lib/**"
      - ".github/workflows/langwatch-chart.yml"

jobs:
  lint-template:
    name: "Template: ${{ matrix.name }}"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: charts/langwatch
    strategy:
      fail-fast: false
      matrix:
        include:
          # Overlays
          - name: default
            flags: "--set autogen.enabled=true"
          - name: dev+nodeport
            flags: "--set autogen.enabled=true -f examples/overlays/size-dev.yaml -f examples/overlays/access-nodeport.yaml"
          - name: minimal+nodeport
            flags: "--set autogen.enabled=true -f examples/overlays/size-minimal.yaml -f examples/overlays/access-nodeport.yaml"
          - name: prod+ingress
            flags: "--set autogen.enabled=true -f examples/overlays/size-prod.yaml -f examples/overlays/access-ingress.yaml"
          - name: ha+ingress+replicated
            flags: "--set autogen.enabled=true -f examples/overlays/size-ha.yaml -f examples/overlays/access-ingress.yaml -f examples/overlays/clickhouse-replicated.yaml"
          - name: prod+external-ch
            flags: "--set autogen.enabled=true -f examples/overlays/size-prod.yaml -f examples/overlays/clickhouse-external.yaml"
          - name: prod+ext-pg+ext-redis
            flags: "--set autogen.enabled=true -f examples/overlays/size-prod.yaml -f examples/overlays/access-ingress.yaml -f examples/overlays/postgres-external.yaml -f examples/overlays/redis-external.yaml"
          # Profiles
          - name: local
            flags: "-f examples/values-local.yaml"
          - name: hosted-prod
            flags: "-f examples/values-hosted-prod.yaml"
          - name: scalable-prod
            flags: "-f examples/values-scalable-prod.yaml"
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.12.0
      - run: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
      - run: helm dependency build .
      - name: "helm template (${{ matrix.name }})"
        run: helm template lw . ${{ matrix.flags }} > /dev/null

  e2e:
    name: "E2E: ${{ matrix.name }}"
    runs-on: ubuntu-latest
    needs: lint-template
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: infra
            script: make test-e2e
            cluster: lw-test
            build_app: true
          - name: overlays
            script: make test-e2e-overlays
            cluster: lw-overlay
            build_app: false
    defaults:
      run:
        working-directory: charts/langwatch
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.12.0
      - name: Build clickhouse-serverless image
        run: docker build -t langwatch/clickhouse-serverless:0.1.0 ../../clickhouse-serverless/
      - name: Build app image
        if: matrix.build_app
        run: docker build -t langwatch/langwatch:2.6.0 ../..
      - uses: helm/kind-action@v1
        with:
          cluster_name: ${{ matrix.cluster }}
      - name: Load images into Kind
        run: |
          kind load docker-image langwatch/clickhouse-serverless:0.1.0 --name ${{ matrix.cluster }}
          if [ "${{ matrix.build_app }}" = "true" ]; then
            kind load docker-image langwatch/langwatch:2.6.0 --name ${{ matrix.cluster }}
          fi
      - run: ${{ matrix.script }}
        env:
          KEEP_CLUSTER: "true"
          CLUSTER_NAME: ${{ matrix.cluster }}
      - name: Show pod status on failure
        if: failure()
        run: |
          NS=$(kubectl get ns -o name 2>/dev/null | grep -o 'lw-test\|lw-overlay' | head -1)
          [ -z "$NS" ] && exit 0
          kubectl -n "$NS" get pods -o wide 2>/dev/null || true
          kubectl -n "$NS" get events --sort-by='.lastTimestamp' 2>/dev/null | tail -30 || true
