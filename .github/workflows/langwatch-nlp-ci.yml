# Always-run workflow with internal path gating + aggregator. See #3223.
# Branch protection requires `langwatch-nlp-complete` (includes docker-build).
# `pull_request_target` runs real tests on `approved-ci` labeled dependabot
# PRs (per-job `if:` guards); that event forces `relevant=true`.
name: langwatch-nlp-ci

on:
  push:
    branches:
      - main
  pull_request:
  pull_request_target:
    types: [labeled]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/detect-changes
        id: detect
        with:
          filters: |
            relevant:
              - 'langwatch_nlp/**'
              - 'python-sdk/**'
              - '.github/workflows/langwatch-nlp-ci.yml'

  lint:
    needs: changes
    if: >
      needs.changes.outputs.relevant == 'true'
      && (github.event_name != 'pull_request_target'
          || (github.event.label.name == 'approved-ci'
              && github.event.pull_request.user.login == 'dependabot[bot]'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup UV
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "langwatch_nlp/uv.lock"

      - name: Setup Python UV
        working-directory: langwatch_nlp
        run: uv sync --all-extras

      # FIXME: Re-enable linting and formatting checks
      # - name: Run linting and formatting checks
      #   working-directory: langwatch_nlp
      #   run: make lint

  test:
    needs: changes
    if: >
      needs.changes.outputs.relevant == 'true'
      && (github.event_name != 'pull_request_target'
          || (github.event.label.name == 'approved-ci'
              && github.event.pull_request.user.login == 'dependabot[bot]'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup UV
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "langwatch_nlp/uv.lock"

      - name: Setup Python UV
        working-directory: langwatch_nlp
        run: uv sync --all-extras

      - name: Run unit tests
        working-directory: langwatch_nlp
        run: make test

  test-integration:
    needs: changes
    if: >
      needs.changes.outputs.relevant == 'true'
      && (github.event_name != 'pull_request_target'
          || (github.event.label.name == 'approved-ci'
              && github.event.pull_request.user.login == 'dependabot[bot]'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup UV
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "langwatch_nlp/uv.lock"

      - name: Setup Python UV
        working-directory: langwatch_nlp
        run: uv sync --all-extras

      - name: Run integration tests
        if: github.actor != 'dependabot[bot]' || github.event_name == 'pull_request_target'
        working-directory: langwatch_nlp
        env:
          OPENAI_API_KEY: ${{ secrets.PYTHON_SDK_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.PYTHON_SDK_AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.PYTHON_SDK_AZURE_OPENAI_API_KEY }}
        run: make test-integration

  docker-build:
    needs: changes
    if: >
      needs.changes.outputs.relevant == 'true'
      && (github.event_name != 'pull_request_target'
          || (github.event.label.name == 'approved-ci'
              && github.event.pull_request.user.login == 'dependabot[bot]'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.langwatch_nlp
          push: false
          tags: langwatch/langwatch_nlp:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  langwatch-nlp-complete:
    needs: [changes, lint, test, test-integration, docker-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: lint, test, test-integration, docker-build
