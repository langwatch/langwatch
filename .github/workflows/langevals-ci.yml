# Always-run workflow with internal path gating + aggregator. See #3223.
# Branch protection requires `langevals-complete` (includes docker-build).
# `pull_request_target` runs real tests on `approved-ci` labeled dependabot
# PRs (per-job `if:` guards); that event forces `relevant=true`.
name: langevals-ci

on:
  push:
    branches:
      - main
  pull_request:
  pull_request_target:
    types: [labeled]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/detect-changes
        id: detect
        with:
          filters: |
            relevant:
              - 'langevals/**'
              - '.github/workflows/langevals-ci.yml'

  lint:
    needs: changes
    if: >
      needs.changes.outputs.relevant == 'true'
      && (github.event_name != 'pull_request_target'
          || (github.event.label.name == 'approved-ci'
              && github.event.pull_request.user.login == 'dependabot[bot]'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup UV
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "langevals/uv.lock"

      - name: Install dependencies
        working-directory: langevals
        run: uv sync --all-extras --all-groups

      - name: Run type checking
        working-directory: langevals
        run: uv run python -m py_compile langevals/server.py

  test:
    needs: changes
    if: >
      needs.changes.outputs.relevant == 'true'
      && (github.event_name != 'pull_request_target'
          || (github.event.label.name == 'approved-ci'
              && github.event.pull_request.user.login == 'dependabot[bot]'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup UV
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "langevals/uv.lock"

      - name: Install dependencies
        working-directory: langevals
        run: uv sync --all-extras --all-groups

      - name: Run tests
        working-directory: langevals
        env:
          OPENAI_API_KEY: ${{ secrets.PYTHON_SDK_OPENAI_API_KEY }}
          AZURE_API_KEY: ${{ secrets.PYTHON_SDK_AZURE_OPENAI_API_KEY }}
          AZURE_API_BASE: ${{ secrets.PYTHON_SDK_AZURE_OPENAI_ENDPOINT }}
          AZURE_CONTENT_SAFETY_ENDPOINT: ${{ secrets.LANGEVALS_AZURE_CONTENT_SAFETY_ENDPOINT }}
          AZURE_CONTENT_SAFETY_KEY: ${{ secrets.LANGEVALS_AZURE_CONTENT_SAFETY_KEY }}
        run: uv run pytest -x -v --ignore=evaluators/legacy/

  docker-build:
    needs: changes
    if: >
      needs.changes.outputs.relevant == 'true'
      && (github.event_name != 'pull_request_target'
          || (github.event.label.name == 'approved-ci'
              && github.event.pull_request.user.login == 'dependabot[bot]'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.langevals
          push: false
          tags: langwatch/langevals:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  langevals-complete:
    needs: [changes, lint, test, docker-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: lint, test, docker-build
