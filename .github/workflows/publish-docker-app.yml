name: publish-docker-app

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Custom image tag (default: "next")'
        required: false
        default: 'next'

jobs:
  extract-version:
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.event.release.tag_name, 'langwatch@')
      || github.event_name == 'workflow_dispatch'
    outputs:
      short_hash: ${{ steps.extract_version.outputs.short_hash }}
      version: ${{ steps.extract_version.outputs.version }}
      is_release: ${{ steps.extract_version.outputs.is_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version and short hash
        id: extract_version
        run: |
          SHORT_HASH=$(git rev-parse --short HEAD)
          echo "short_hash=${SHORT_HASH}" >> $GITHUB_OUTPUT

          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${GITHUB_REF#refs/tags/langwatch@v}
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT

            # Draft releases must use a semver prerelease suffix (e.g., 1.0.0-rc.1) or "next"
            if [ "${{ github.event.release.draft }}" = "true" ]; then
              if [ "${VERSION}" != "next" ] && ! echo "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-.+'; then
                echo "::error::Draft releases require a semver prerelease suffix (e.g., 1.0.0-rc.1) or 'next'"
                exit 1
              fi
            fi
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: langwatch
            dockerfile: Dockerfile
            platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - image: langwatch
            dockerfile: Dockerfile
            platform: linux/arm64/v8
            runner: arm64-runner-32gb
            arch: arm64
          - image: langwatch_nlp
            dockerfile: Dockerfile.langwatch_nlp
            platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - image: langwatch_nlp
            dockerfile: Dockerfile.langwatch_nlp
            platform: linux/arm64/v8
            runner: ubuntu-24.04-arm
            arch: arm64
          - image: langevals
            dockerfile: Dockerfile.langevals
            platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - image: langevals
            dockerfile: Dockerfile.langevals
            platform: linux/arm64/v8
            runner: ubuntu-24.04-arm
            arch: arm64
          - image: ai-gateway
            dockerfile: Dockerfile.go_service
            platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - image: ai-gateway
            dockerfile: Dockerfile.go_service
            platform: linux/arm64/v8
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }} (${{ matrix.arch }})
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}
          tags: |
            langwatch/${{ matrix.image }}:${{ needs.extract-version.outputs.short_hash }}-${{ matrix.arch }}

  create-manifest:
    runs-on: ubuntu-latest
    needs: [extract-version, build-and-push]

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create multi-arch manifests (short hash)
        run: |
          HASH="${{ needs.extract-version.outputs.short_hash }}"
          for IMAGE in langwatch langwatch_nlp langevals ai-gateway; do
            docker buildx imagetools create -t langwatch/${IMAGE}:${HASH} \
              langwatch/${IMAGE}:${HASH}-amd64 \
              langwatch/${IMAGE}:${HASH}-arm64
          done

      - name: Create multi-arch manifests (custom tag)
        if: needs.extract-version.outputs.is_release != 'true'
        env:
          TAG: ${{ inputs.tag || 'next' }}
          HASH: ${{ needs.extract-version.outputs.short_hash }}
        run: |
          for IMAGE in langwatch langwatch_nlp langevals ai-gateway; do
            docker buildx imagetools create -t langwatch/${IMAGE}:${TAG} \
              langwatch/${IMAGE}:${HASH}-amd64 \
              langwatch/${IMAGE}:${HASH}-arm64
          done

      - name: Create multi-arch manifests (version + latest)
        if: needs.extract-version.outputs.is_release == 'true'
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          HASH="${{ needs.extract-version.outputs.short_hash }}"

          for IMAGE in langwatch langwatch_nlp langevals ai-gateway; do
            # Version tag
            docker buildx imagetools create -t langwatch/${IMAGE}:${VERSION} \
              langwatch/${IMAGE}:${HASH}-amd64 \
              langwatch/${IMAGE}:${HASH}-arm64

            # Latest tag (skip for prerelease versions with a hyphen suffix)
            if ! echo "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-.+'; then
              docker buildx imagetools create -t langwatch/${IMAGE}:latest \
                langwatch/${IMAGE}:${HASH}-amd64 \
                langwatch/${IMAGE}:${HASH}-arm64
            fi
          done

      - name: Delete temporary architecture-specific tags
        run: |
          TOKEN=$(curl -s -H "Content-Type: application/json" -X POST \
            -d '{"username": "${{ secrets.DOCKERHUB_USERNAME }}", "password": "${{ secrets.DOCKERHUB_TOKEN }}"}' \
            https://hub.docker.com/v2/users/login/ | jq -r .token)

          HASH="${{ needs.extract-version.outputs.short_hash }}"
          for IMAGE in langwatch langwatch_nlp langevals ai-gateway; do
            for ARCH in amd64 arm64; do
              curl -s -X DELETE \
                -H "Authorization: JWT ${TOKEN}" \
                "https://hub.docker.com/v2/repositories/langwatch/${IMAGE}/tags/${HASH}-${ARCH}/"
            done
          done

  sign-and-attest:
    runs-on: ubuntu-latest
    needs: [extract-version, create-manifest]
    permissions:
      contents: write # upload SBOMs to GitHub release assets
      id-token: write # keyless OIDC signing via Sigstore
    env:
      COSIGN_YES: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Pin to cosign 2.x. cosign 3.x defaults to the new bundle format (OCI 1.1
          # referrers), which Docker Hub does not reliably serve, so cosign verify
          # reports "no signatures found" immediately after a successful cosign sign.
          # The 2.x line writes the tag-based signature format Docker Hub supports.
          cosign-release: v2.6.3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Sign manifests and attach per-platform CycloneDX SBOMs
        env:
          HASH: ${{ needs.extract-version.outputs.short_hash }}
          IS_RELEASE: ${{ needs.extract-version.outputs.is_release }}
          VERSION: ${{ needs.extract-version.outputs.version }}
          CERT_IDENTITY_REGEX: ^https://github\.com/langwatch/langwatch/
          CERT_OIDC_ISSUER: https://token.actions.githubusercontent.com
        run: |
          set -euo pipefail
          mkdir -p sboms
          for IMAGE in langwatch langwatch_nlp langevals ai-gateway; do
            REF="langwatch/${IMAGE}:${HASH}"
            INSPECT=$(docker buildx imagetools inspect "${REF}" --format '{{ json . }}')

            INDEX_DIGEST=$(echo "${INSPECT}" | jq -r '.manifest.digest')
            if [ -z "${INDEX_DIGEST}" ] || [ "${INDEX_DIGEST}" = "null" ]; then
              echo "::error::Could not resolve index digest for ${REF}"
              exit 1
            fi
            echo "Signing multi-arch index langwatch/${IMAGE}@${INDEX_DIGEST}"
            cosign sign "langwatch/${IMAGE}@${INDEX_DIGEST}"

            echo "Verifying index signature for langwatch/${IMAGE}@${INDEX_DIGEST}"
            cosign verify "langwatch/${IMAGE}@${INDEX_DIGEST}" \
              --certificate-identity-regexp "${CERT_IDENTITY_REGEX}" \
              --certificate-oidc-issuer "${CERT_OIDC_ISSUER}" > /dev/null

            # Release tags (VERSION + optionally latest) and the HASH tag should all point
            # at the same multi-arch manifest digest, but assert it explicitly so that any
            # future registry-side normalization that produces a different digest is signed
            # rather than silently leaving an unsigned tag.
            EXTRA_TAGS=""
            if [ "${IS_RELEASE}" = "true" ]; then
              EXTRA_TAGS="${VERSION}"
              if ! echo "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-.+'; then
                EXTRA_TAGS="${EXTRA_TAGS} latest"
              fi
            fi
            for TAG in ${EXTRA_TAGS}; do
              TAG_DIGEST=$(docker buildx imagetools inspect "langwatch/${IMAGE}:${TAG}" --format '{{ json . }}' | jq -r '.manifest.digest')
              if [ "${TAG_DIGEST}" != "${INDEX_DIGEST}" ]; then
                echo "::warning::langwatch/${IMAGE}:${TAG} digest ${TAG_DIGEST} differs from :${HASH} digest ${INDEX_DIGEST}; signing separately"
                cosign sign "langwatch/${IMAGE}@${TAG_DIGEST}"
                cosign verify "langwatch/${IMAGE}@${TAG_DIGEST}" \
                  --certificate-identity-regexp "${CERT_IDENTITY_REGEX}" \
                  --certificate-oidc-issuer "${CERT_OIDC_ISSUER}" > /dev/null
              fi
            done

            PLATFORMS_JSON=$(echo "${INSPECT}" | jq -c '[.manifest.manifests[] | select(.platform.os != "unknown") | {digest: .digest, os: .platform.os, arch: .platform.architecture}]')
            COUNT=$(echo "${PLATFORMS_JSON}" | jq 'length')
            if [ "${COUNT}" -eq 0 ]; then
              echo "::error::No platform manifests found in index for ${REF}"
              exit 1
            fi

            for i in $(seq 0 $((COUNT - 1))); do
              ENTRY=$(echo "${PLATFORMS_JSON}" | jq -c ".[$i]")
              PDIGEST=$(echo "${ENTRY}" | jq -r '.digest')
              POS=$(echo "${ENTRY}" | jq -r '.os')
              PARCH=$(echo "${ENTRY}" | jq -r '.arch')
              PDREF="langwatch/${IMAGE}@${PDIGEST}"
              SBOM_FILE="sboms/${IMAGE}-${POS}-${PARCH}.cdx.json"

              echo "Generating CycloneDX SBOM for ${PDREF} (${POS}/${PARCH})"
              syft "registry:${PDREF}" -o cyclonedx-json="${SBOM_FILE}"

              echo "Signing platform manifest ${PDREF}"
              cosign sign "${PDREF}"

              echo "Attesting SBOM for ${PDREF}"
              cosign attest --predicate "${SBOM_FILE}" --type cyclonedx "${PDREF}"

              echo "Verifying signature and SBOM attestation for ${PDREF}"
              cosign verify "${PDREF}" \
                --certificate-identity-regexp "${CERT_IDENTITY_REGEX}" \
                --certificate-oidc-issuer "${CERT_OIDC_ISSUER}" > /dev/null
              cosign verify-attestation "${PDREF}" \
                --type cyclonedx \
                --certificate-identity-regexp "${CERT_IDENTITY_REGEX}" \
                --certificate-oidc-issuer "${CERT_OIDC_ISSUER}" > /dev/null
            done
          done

      - name: Upload SBOMs as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sboms-${{ needs.extract-version.outputs.short_hash }}
          path: sboms/*.cdx.json
          retention-days: 90

      - name: Attach SBOMs to GitHub release
        if: needs.extract-version.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          gh release upload "${RELEASE_TAG}" sboms/*.cdx.json --clobber --repo "${GITHUB_REPOSITORY}"

  notify:
    runs-on: ubuntu-latest
    needs: [extract-version, create-manifest, sign-and-attest]
    if: needs.extract-version.outputs.is_release == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Notify Slack
        env:
          SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL: ${{ secrets.SLACK_RELEASE_NOTIFICATION_WEBHOOK_URL }}
        run: |
          bash .github/scripts/notify-slack-release.sh \
            CHANGELOG.md \
            "LangWatch" \
            "${{ needs.extract-version.outputs.version }}"
