# Always-run workflow with internal path gating + aggregator. See #3223.
# Branch protection can require `es-migration-e2e-complete` as a single
# check. The e2e job skips cleanly when paths don't match.
name: es-migration-e2e

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/detect-changes
        id: detect
        with:
          filters: |
            relevant:
              - 'langwatch/packages/es-migration/**'
              - 'langwatch/src/server/event-sourcing/**'
              - 'langwatch/src/server/app-layer/traces/**'
              - 'langwatch/src/server/app-layer/evaluations/**'
              - 'langwatch/src/server/app-layer/dspy-steps/**'
              - 'langwatch/src/server/clickhouse/migrations/**'
              - 'langwatch/elastic/migrations/**'
              - '.github/workflows/es-migration-e2e.yml'

  e2e:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    name: Seed ES → Run Migration → Validate CH
    runs-on: ubuntu-latest

    env:
      ELASTICSEARCH_NODE_URL: "http://localhost:9200"
      CLICKHOUSE_URL: "http://default:ci_password@localhost:8123/default"
      E2E_TENANT_ID: "e2e-test-project"
      E2E_TRACE_COUNT: "5"
      E2E_SIMULATION_COUNT: "3"
      # The elastic:migrate and clickhouse:migrate scripts run under pnpm task,
      # which the main app wires up via env — these match langwatch-app-ci.yml.
      DATABASE_URL: "postgresql://langwatch_ci:ci_password@localhost:5432/langwatch_test"
      NEXTAUTH_SECRET: "nextauth-secret-for-ci-testing"
      NEXTAUTH_URL: "http://localhost:3000"
      API_TOKEN_JWT_SECRET: "api-jwt-secret-for-ci-testing"
      BASE_HOST: "localhost:3000"
      BUILD_TIME: "true"
      SKIP_ENV_VALIDATION: "true"

    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
        ports:
          - 9200:9200
        env:
          discovery.type: single-node
          xpack.security.enabled: false
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 5

      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: langwatch_ci
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: langwatch_test
        options: >-
          --health-cmd "pg_isready -U langwatch_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-pnpm-node
        with:
          cache-dependency-path: "langwatch/pnpm-lock.yaml"
          install-dir: langwatch

      - name: Prepare generated files
        working-directory: langwatch
        run: pnpm start:prepare:files

      - name: Setup Prisma database
        working-directory: langwatch
        run: pnpm prisma:migrate

      - name: Create ES indices and aliases
        working-directory: langwatch
        run: pnpm elastic:migrate

      - name: Install Goose migration tool
        run: bash .github/scripts/install-goose.sh

      - name: Start ClickHouse
        run: |
          docker run -d \
            --name clickhouse \
            --network host \
            -e CLICKHOUSE_DB=default \
            -e CLICKHOUSE_USER=default \
            -e CLICKHOUSE_PASSWORD=ci_password \
            clickhouse/clickhouse-server:latest

          echo "Waiting for ClickHouse to be ready..."
          for i in {1..60}; do
            if curl -sf "http://localhost:8123/?user=default&password=ci_password" -d "SELECT 1" >/dev/null 2>&1; then
              echo "ClickHouse is ready"
              break
            fi
            echo "Attempt $i: Waiting for ClickHouse..."
            sleep 1
          done

      - name: Run ClickHouse migrations
        working-directory: langwatch
        run: pnpm clickhouse:migrate

      - name: Seed Elasticsearch with sample traces and scenario events
        working-directory: langwatch/packages/es-migration
        run: pnpm tsx test/e2e/seed.ts

      - name: Run es-migration — traces target
        working-directory: langwatch/packages/es-migration
        run: pnpm tsx src/index.ts traces --single-batch

      - name: Run es-migration — simulations target
        working-directory: langwatch/packages/es-migration
        run: pnpm tsx src/index.ts simulations --single-batch

      - name: Validate ClickHouse contents match seeded data
        working-directory: langwatch/packages/es-migration
        run: pnpm tsx test/e2e/validate.ts

      - name: Dump ClickHouse tables on failure
        if: failure()
        run: |
          echo "=== event_log by AggregateType ==="
          curl -s "http://localhost:8123/?user=default&password=ci_password" \
            -d "SELECT AggregateType, count() FROM default.event_log WHERE TenantId = '${{ env.E2E_TENANT_ID }}' GROUP BY AggregateType FORMAT TabSeparated" || true
          echo "=== trace_summaries ==="
          curl -s "http://localhost:8123/?user=default&password=ci_password" \
            -d "SELECT count() FROM default.trace_summaries WHERE TenantId = '${{ env.E2E_TENANT_ID }}'" || true
          echo "=== stored_spans ==="
          curl -s "http://localhost:8123/?user=default&password=ci_password" \
            -d "SELECT count() FROM default.stored_spans WHERE TenantId = '${{ env.E2E_TENANT_ID }}'" || true
          echo "=== simulation_runs ==="
          curl -s "http://localhost:8123/?user=default&password=ci_password" \
            -d "SELECT count(DISTINCT ScenarioRunId) FROM default.simulation_runs WHERE TenantId = '${{ env.E2E_TENANT_ID }}'" || true

  es-migration-e2e-complete:
    needs: [changes, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: e2e
