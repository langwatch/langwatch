# Always-run workflow with internal path gating + aggregator. See #3223.
# Branch protection requires `mcp-javascript-complete`; upstream jobs
# skip when paths don't match, and `alls-green` reports the final status.
name: mcp-javascript-ci

on:
  push:
    branches:
      - main
  pull_request:
  pull_request_target:
    types: [labeled]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/detect-changes
        id: detect
        with:
          filters: |
            relevant:
              - 'mcp-server/**'
              - '.github/workflows/mcp-javascript-ci.yml'
              - '.github/.release-please-manifest.json'

  typecheck:
    needs: changes
    if: >
      needs.changes.outputs.relevant == 'true'
      && (github.event_name != 'pull_request_target'
          || (github.event.label.name == 'approved-ci'
              && github.event.pull_request.user.login == 'dependabot[bot]'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: ./.github/actions/setup-pnpm-node
        with:
          cache-dependency-path: "mcp-server/pnpm-lock.yaml"
          install-dir: mcp-server

      - name: Run typecheck
        working-directory: mcp-server
        run: ./node_modules/.bin/tsgo --noEmit --project ./tsconfig.json

  build_and_test:
    needs: changes
    if: >
      needs.changes.outputs.relevant == 'true'
      && (github.event_name != 'pull_request_target'
          || (github.event.label.name == 'approved-ci'
              && github.event.pull_request.user.login == 'dependabot[bot]'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: ./.github/actions/setup-pnpm-node
        with:
          cache-dependency-path: "mcp-server/pnpm-lock.yaml"
          install-dir: mcp-server

      - name: Build
        working-directory: mcp-server
        run: pnpm run build

      - name: Run tests
        if: github.actor != 'dependabot[bot]' || github.event_name == 'pull_request_target'
        working-directory: mcp-server
        env:
          LANGWATCH_API_KEY: ${{ secrets.MCP_SERVER_LANGWATCH_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.MCP_SERVER_ANTHROPIC_API_KEY }}
        run: pnpm run test

  mcp-javascript-complete:
    needs: [changes, typecheck, build_and_test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: typecheck, build_and_test
