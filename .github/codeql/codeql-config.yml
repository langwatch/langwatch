name: "LangWatch CodeQL Config"

# Suppress js/insufficient-password-hash on API key token utilities.
#
# These functions hash machine-generated 286-bit secrets (48 chars from
# a 62-char alphabet), not user-chosen passwords. HMAC-SHA256 with a
# server-side pepper is the industry standard for API key verification
# (same pattern as Stripe, GitHub, OpenAI). A slow KDF (bcrypt/argon2)
# would cap throughput at ~10 req/s on the hot auth path.
#
# The legacy plain SHA-256 path exists only to verify keys created before
# the HMAC upgrade — it auto-upgrades on first use and will eventually
# be removed.
query-filters:
  - exclude:
      id: js/insufficient-password-hash
      paths:
        - "langwatch/src/server/api-key/api-key-token.utils.ts"
